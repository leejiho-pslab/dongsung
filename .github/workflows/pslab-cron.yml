name: pslab autopilot

# 무인 선순환 루프: 토큰점검 → 예약 자동발행 → 성과수집·학습 → 대시보드
#  1) check-tokens     : 토큰 만료 임박 시 대시보드에 경고
#  2) publish-plan --due: 예정시각(매일 18:00 KST) 지난 항목 자동 발행 (DRY_RUN=false일 때만 실제)
#  3) collect-insights : 발행물 성과 수집 + 디자인/소재 자체 학습 갱신
#  4) dashboard        : 결과를 대시보드(GitHub Pages)에 반영
# 매일 한국시간 18:00 에 자동발행 (GitHub cron은 UTC 기준 → KST-9)
#  18:00 발행 + 18:30 보정(누락 대비·대시보드 갱신). publish-plan은 멱등이라 중복발행 없음.
on:
  schedule:
    - cron: '0 9 * * *'    # 09:00 UTC = 18:00 KST — 매일 자동발행
    - cron: '30 9 * * *'   # 09:30 UTC = 18:30 KST — 누락 시 보정·대시보드 갱신
  workflow_dispatch: {}     # 저장소에서 수동 실행 버튼

permissions:
  contents: write           # 사이클 이력(data/) 커밋·푸시용
  pages: write              # GitHub Pages 배포용
  id-token: write           # deploy-pages 인증용

concurrency:
  group: pslab-autopilot
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Pages 배포(deploy-pages@v4)에 필요한 환경
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Seoul
      # ⏸ 자동발행 홀드 (2026-07-10 운영자 요청) — 실제 발행 없이 시뮬레이션만.
      # 대시보드·성과수집·렌더는 계속 동작. 재개하려면 이 값을 원래대로
      # "vars.PSLAB_DRY_RUN || 'true'" 표현식으로 되돌리면 된다 (git log 참고).
      PSLAB_DRY_RUN: 'true'
      PSLAB_LOG_LEVEL: info
      # --- AI 글 생성 ---
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PSLAB_CLAUDE_MODEL: ${{ vars.PSLAB_CLAUDE_MODEL || 'claude-opus-4-8' }}
      # --- AI 이미지 생성 (Gemini 나노바나나 + imgbb 호스팅) ---
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      PSLAB_GEMINI_IMAGE_MODEL: ${{ vars.PSLAB_GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
      # --- Instagram ---
      PSLAB_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.PSLAB_INSTAGRAM_ACCESS_TOKEN }}
      PSLAB_INSTAGRAM_IG_USER_ID: ${{ secrets.PSLAB_INSTAGRAM_IG_USER_ID }}
      # --- Threads ---
      PSLAB_THREADS_ACCESS_TOKEN: ${{ secrets.PSLAB_THREADS_ACCESS_TOKEN }}
      PSLAB_THREADS_THREADS_USER_ID: ${{ secrets.PSLAB_THREADS_THREADS_USER_ID }}
      # 토큰 만료일 계산용 앱 자격(선택) — 없으면 라이브 핑만 수행
      PSLAB_FB_APP_ID: ${{ secrets.PSLAB_FB_APP_ID }}
      PSLAB_FB_APP_SECRET: ${{ secrets.PSLAB_FB_APP_SECRET }}
      PSLAB_THREADS_APP_ID: ${{ secrets.PSLAB_THREADS_APP_ID }}
      PSLAB_THREADS_APP_SECRET: ${{ secrets.PSLAB_THREADS_APP_SECRET }}
      # --- 네이버 블로그 ---
      PSLAB_NAVER_BLOG_CLIENT_ID: ${{ secrets.PSLAB_NAVER_BLOG_CLIENT_ID }}
      PSLAB_NAVER_BLOG_CLIENT_SECRET: ${{ secrets.PSLAB_NAVER_BLOG_CLIENT_SECRET }}
      PSLAB_NAVER_BLOG_ACCESS_TOKEN: ${{ secrets.PSLAB_NAVER_BLOG_ACCESS_TOKEN }}
      PSLAB_NAVER_BLOG_BLOG_ID: ${{ secrets.PSLAB_NAVER_BLOG_BLOG_ID }}
      # --- 구글 블로그 (Blogger API v3, OAuth2 자동발행) ---
      PSLAB_BLOGGER_CLIENT_ID: ${{ secrets.PSLAB_BLOGGER_CLIENT_ID }}
      PSLAB_BLOGGER_CLIENT_SECRET: ${{ secrets.PSLAB_BLOGGER_CLIENT_SECRET }}
      PSLAB_BLOGGER_REFRESH_TOKEN: ${{ secrets.PSLAB_BLOGGER_REFRESH_TOKEN }}
      PSLAB_BLOGGER_BLOG_ID: ${{ secrets.PSLAB_BLOGGER_BLOG_ID }}
      # --- YouTube ---
      PSLAB_YOUTUBE_CLIENT_ID: ${{ secrets.PSLAB_YOUTUBE_CLIENT_ID }}
      PSLAB_YOUTUBE_CLIENT_SECRET: ${{ secrets.PSLAB_YOUTUBE_CLIENT_SECRET }}
      PSLAB_YOUTUBE_REFRESH_TOKEN: ${{ secrets.PSLAB_YOUTUBE_REFRESH_TOKEN }}
      PSLAB_YOUTUBE_CHANNEL_ID: ${{ secrets.PSLAB_YOUTUBE_CHANNEL_ID }}
      # --- LinkedIn ---
      PSLAB_LINKEDIN_ACCESS_TOKEN: ${{ secrets.PSLAB_LINKEDIN_ACCESS_TOKEN }}
      PSLAB_LINKEDIN_AUTHOR_URN: ${{ secrets.PSLAB_LINKEDIN_AUTHOR_URN }}
      # --- 푸시 알림 (텔레그램) ---
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # 배경 실사진(선택) — 없으면 무료 Pollinations AI 사용
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치 + 빌드
        run: |
          npm ci
          npm run build

      # 1) 토큰 건강검진 — 만료 임박 시 대시보드에 경고 (죽기 전에 알림)
      - name: 토큰 점검
        continue-on-error: true
        run: node dist/cli.js check-tokens --client dongsung

      # 2) 예약 자동발행 — 예정시각이 지난 승인 기획안을 자동 발행
      #    (PSLAB_DRY_RUN=true면 시뮬레이션만. 실제 발행은 Variables에서 false로)
      - name: 예약 자동발행 (publish-plan --due)
        id: publish
        continue-on-error: true
        run: node dist/cli.js publish-plan --client dongsung --due

      # 3) 성과 수집 + 인사이트 코멘트 + 자체 학습
      - name: 성과 수집·학습 (collect-insights)
        continue-on-error: true
        run: node dist/cli.js collect-insights --client dongsung

      # 3-1) 매주 월요일 — 지난주 종합 평가 리포트 + 텔레그램 푸시 (멱등: 주1회만 푸시)
      - name: 주간 리포트 (월요일)
        continue-on-error: true
        run: |
          if [ "$(date +%u)" = "1" ]; then
            node dist/cli.js weekly-report --client dongsung
          else
            echo "월요일 아님 — 주간 리포트 생략"
          fi

      # 3-2) 네이버 키워드도구 월간검색수 수집 → keyword-trends.json (블로그 기획 우선순위)
      #      NAVER_AD_API_KEY/SECRET/CUSTOMER_ID 시크릿 있으면 실제 검색량, 없으면 기존 유지
      - name: 네이버 키워드 검색량 수집
        continue-on-error: true
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET: ${{ secrets.NAVER_AD_SECRET }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        run: node scripts/fetch-keywords.mjs --client dongsung

      # 4) 배경 사진 수집 (인물·배경·상황) — Pexels(키 있으면) → Pollinations(무료)
      - name: 배경 사진 수집
        continue-on-error: true
        run: node scripts/fetch-photos.mjs --client dongsung

      # 카드 렌더 (배경 사진 위에 텍스트 합성. Chromium 없으면 skip → 커밋본 유지)
      - name: 매거진 카드 렌더
        continue-on-error: true
        run: node scripts/render-cards.mjs --client dongsung

      # 이미지 전면형 인스타 렌더 (실사/AI 배경 위 한글 타이틀 오버레이 — slidePhotos 항목만)
      - name: 인스타 이미지카드 렌더
        continue-on-error: true
        run: node scripts/render-ig.mjs --client dongsung

      # 블로그 본문 이미지 렌더 (네이버/구글 블로그 삽입용)
      - name: 블로그 이미지 렌더
        continue-on-error: true
        run: node scripts/render-blog-images.mjs --client dongsung

      # 유튜브 쇼츠 슬라이드 렌더 + 영상 합성 (ffmpeg, 다운로드용)
      - name: 쇼츠 슬라이드 렌더
        continue-on-error: true
        run: node scripts/render-shorts.mjs --client dongsung
      - name: ffmpeg 설치 (영상 합성용)
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 쇼츠 영상 합성 (ffmpeg)
        continue-on-error: true
        run: node scripts/build-shorts-video.mjs --client dongsung

      - name: 대시보드 생성 (실시간 현황)
        run: node dist/cli.js dashboard --out docs/index.html

      # 주의: 커밋 메시지에 [skip ci]를 넣지 말 것!
      # docs/ 변경은 pages-build-deployment(자동)를 트리거해 실제 사이트에 배포된다.
      # [skip ci]를 붙이면 Pages 배포까지 막혀 대시보드가 라이브에 반영되지 않는다.
      # (pslab 워크플로는 schedule/dispatch로만 돌아 push 루프 위험이 없다.)
      # 같은 브랜치에 다른 작업이 동시 push할 수 있어 rebase 후 재시도.
      # push가 실패해도 아래 Pages 배포는 계속되도록 continue-on-error.
      - name: 이력·대시보드 커밋
        continue-on-error: true
        run: |
          git config user.name "pslab-bot"
          git config user.email "actions@users.noreply.github.com"
          touch docs/.nojekyll
          git add -f data/ docs/index.html docs/.nojekyll docs/cards docs/blog docs/shorts docs/bg 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음"; exit 0
          fi
          git commit -m "chore(pslab): 발행·성과·대시보드 갱신"
          for i in 1 2 3 4 5; do
            git pull --rebase origin claude/eager-lamport-mX0eT && git push && { echo "push 성공"; exit 0; }
            echo "push 재시도 $i (동시 push 충돌)"; sleep 4
          done
          echo "push 실패 — 그래도 Pages 배포는 진행"

      # GitHub Pages 라이브 배포 — pslab이 docs/를 단독 배포(다른 프로젝트와 분리)
      # (Settings → Pages → Source 를 "GitHub Actions"로 설정해야 동작)
      - name: Pages 설정
        uses: actions/configure-pages@v5
      - name: Pages 아티팩트 업로드 (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

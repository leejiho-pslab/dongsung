name: yt privacy (전체 공개 전환)

# 채널의 일부공개/비공개 유튜브 영상을 전부 전체 공개(public)로 전환한다.
# 개발 환경엔 유튜브 시크릿이 없으므로 CI에서 실행.
on:
  push:
    branches: [claude/eager-mayer-tknneh]
    paths:
      - 'scripts/yt-make-public.mjs'
      - '.github/workflows/yt-privacy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: yt-privacy
  cancel-in-progress: false

jobs:
  makepublic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PSLAB_YOUTUBE_CLIENT_ID: ${{ secrets.PSLAB_YOUTUBE_CLIENT_ID }}
      PSLAB_YOUTUBE_CLIENT_SECRET: ${{ secrets.PSLAB_YOUTUBE_CLIENT_SECRET }}
      PSLAB_YOUTUBE_REFRESH_TOKEN: ${{ secrets.PSLAB_YOUTUBE_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 전체 공개 전환
        run: node scripts/yt-make-public.mjs

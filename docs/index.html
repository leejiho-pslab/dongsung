경험을 설계할 때 좋아요.\n· 내지(트레이) 구성: 종이 트레이, 스폰지, EVA 등으로 제품을 딱 맞게 앉혀요. 병·앰플처럼 흔들리면 안 되는 제품은 내지 설계가 반이에요.\n\n[여기에 특수인쇄를 더하면]\n싸바리의 겉지 위에 금박·은박·홀로그램박으로 로고를 앉히거나, 형압(양각·음각)으로 눌러 새기고, 부분 실크·에폭시로 포인트를 주면 같은 구조라도 완성도가 완전히 달라져요. 저희는 특수인쇄와 패키지 제조를 한 공장에서 원스톱으로 진행하기 때문에, 구조와 후가공을 처음부터 같이 설계해 드립니다.\n\n[견적은 어떻게 잡히나요?]\n싸바리 견적은 크게 네 가지로 구성돼요.\n1. 개발비: 목형(칼틀)과 박용 동판 제작비 — 최초 1회만 들어가요.\n2. 자재: 합지 두께, 겉지 종류(수입지냐 일반지냐)에 따라 달라져요.\n3. 후가공: 박·형압·에폭시 등 공정이 늘수록 올라가요.\n4. 수량: 개발비가 고정이라, 수량이 늘수록 개당 단가는 뚝 떨어집니다.\n그래서 같은 박스도 500개와 3,000개의 개당 가격이 크게 달라요. 저희는 생산성 검토와 원가 개선까지 컨설팅해 드리니, 예산을 먼저 말씀해 주시면 그 안에서 가장 좋은 조합을 찾아드려요.\n\n[납기는 얼마나 걸리나요?]\n싸바리는 손이 많이 가는 공정이라 보통 1~2주를 보셔야 해요(표지바리 1~3주, 조립가공 패키지는 2~4주). 여기에 디자인 확정, 가제본 샘플 확인 시간까지 더하면 실제로는 한 달 가까이 잡는 게 안전합니다. 명절 선물세트처럼 날짜가 정해진 프로젝트라면 꼭 역산해서 미리 문의 주세요.\n\n[샘플 없이 대량 제작, 불안하지 않으세요?]\n저희는 본 제작 전에 가제본(실물 샘플)으로 색상과 후가공 느낌을 확인받고, 인쇄 단계에서는 고객이 직접 공장에서 색을 보는 인쇄 감리도 진행해요. 포장상자 구조 관련 실용신안도 다수 등록해 둔 만큼, 구조 설계부터 검수까지 믿고 맡기실 수 있게 프로세스로 증명하겠습니다 :)\n\n[자주 묻는 질문]\nQ. 소량도 가능한가요? — 네, 최소수량은 조율 가능하고 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요.\nQ. 겉지는 어떻게 고르나요? — 차분한 무드면 무광 수입지, 화사하면 펄지, 내추럴하면 크라프트 계열. 상담 오시면 지류 샘플을 만져보며 함께 골라요.\nQ. 디자인이 아직 없는데요? — 구조와 사양을 먼저 잡고 디자인을 입히는 순서도 가능해요. 패키지디자인 연구·개발 문의도 전문가가 직접 상담해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#싸바리박스 #패키지제작 #박스제작 #고급박스 #선물세트박스 #화장품박스 #합지박스 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-cosmetic","topic":"화장품박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"SEO · 「화장품박스 / 단상자」","headline":"화장품 박스 제작, 단상자 구조와 후가공 조합이 8할입니다 — 발주 전 체크리스트","sub":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","dayLabel":"","captionNote":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","captionBody":"[3줄 요약]\n· 화장품 박스의 완성도는 지기구조(상자 구조) 선택과 후가공 조합에서 8할이 정해져요.\n· 단상자는 맞뚜껑·십자조립·삼면접착(오토) 세 구조가 기본 — 제품 무게와 포장 방식으로 골라요.\n· 발주 전 파일 검토(칼선·여백·해상도)와 가제본 샘플 확인을 거치면 실패가 없습니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 화장품은 패키지 산업에서 가장 화려한 분야예요. 금박·형압·부분UV 같은 특수 후가공을 제일 정교하게 쓰는 곳이 바로 화장품 박스거든요. 처음 브랜드를 준비하시는 담당자님들이 \"뭐부터 정해야 하죠?\"라고 물으시면 저는 늘 이렇게 답해요. 구조 먼저, 후가공은 그다음이요.\n\n[1단계 — 지기구조: 상자의 골격을 정해요]\n단상자(한 장의 종이를 접어 만드는 상자)는 바닥 구조에 따라 크게 셋으로 나뉘어요.\n· 맞뚜껑: 위아래가 같은 방식으로 열리는 기본형. 가볍고 단정해서 크림·쿠션 등 가벼운 제품에 좋아요.\n· 십자조립: 바닥을 십자로 끼워 조립해요. 맞뚜껑보다 견고해서 유리 용기도 안심이에요.\n· 삼면접착(오토바닥): 옆을 누르면 바닥이 자동으로 펴져요. 접은 상태로 납품돼 보관·물류가 편하고, 포장 라인에서 속도가 나요. 물량이 있는 브랜드의 표준이죠.\n앰플·에센스처럼 병이 흔들리면 안 되는 제품은 내지(칸막이·트레이)까지 함께 설계해요. 이 구조 설계(지기구조)가 저희 패키지 컨설팅의 핵심이고, 구조에 따라 목형(칼틀)이 새로 제작됩니다.\n\n[2단계 — 후가공: 브랜드의 인상을 입혀요]\n구조가 몸이라면 후가공은 표정이에요. 화장품 박스에서 검증된 조합을 소개할게요.\n· 무광 코팅 + 금박 로고: 가장 실패 없는 클래식. 차분한 바탕에 로고만 빛나요.\n· 형압(엠보/디보스): 로고를 볼록(양각)하거나 오목(음각)하게 눌러 새겨요. 만졌을 때의 고급감은 형압을 못 이겨요.\n· 부분UV: 무광 바탕에 특정 부분만 유광을 올려 은은한 대비를 만들어요. 미니멀 브랜드에 잘 어울려요.\n· 에폭시·부분실크: 포인트 부분을 도톰하게 올려 촉감까지 설계해요.\n박은 금·은뿐 아니라 홀로그램박, 먹박 등 색이 다양하고, 로고 모양대로 동판을 떠서 열과 압력으로 앉히는 공정이라 디자인 단계에서 박 영역을 미리 정해두는 게 좋아요.\n\n[3단계 — 파일 검토: 사고를 미리 막아요]\n디자인 파일을 받으면 저희가 가장 먼저 하는 일이 검토예요. 칼선(재단선)과 접는 선이 맞는지, 가장자리 여백은 충분한지, 이미지 해상도가 인쇄에 적합한지, 박·형압 영역이 공정 가능하게 분리돼 있는지를 확인하고, 원하시는 느낌에 맞는 종이 재질과 인쇄 기법을 제안해 드려요. 이 단계에서 조율이 잘 되면 재작업이 없어요.\n\n[4단계 — 가제본 샘플로 확인하고 갑니다]\n대량 인쇄 전에 디지털 시안을 크로스 체크하고, 필요하면 실물 가제본을 만들어 색상과 후가공 느낌을 직접 확인받아요. 고가·대량 작업이라면 인쇄 당일 공장에서 색을 함께 보는 인쇄 감리도 가능해요. 최소수량도 조율 가능하고 낱개 샘플까지 제작해 드려요.\n\n[보너스 — 종이 한 장이 브랜드 톤을 바꿔요]\n같은 구조·같은 후가공이라도 종이가 다르면 완성품이 달라져요. 매트한 무광 계열은 지문이 덜 남고 차분해서 스킨케어 라인에, 은은히 반짝이는 펄지는 메이크업·기프트 라인에, 크라프트 계열은 비건·내추럴 컨셉에 잘 어울려요. 종이 값이 조금 올라가도 후가공을 줄여 총비용을 맞추는 조합 설계도 가능하답니다.\n\n[정리 — 발주 전 체크리스트]\n① 제품 무게·용기 형태 확인 ② 포장 방식 확인(수작업이면 맞뚜껑도 OK, 라인 포장이면 오토바닥) ③ 후가공은 최대 2가지 조합으로 절제 ④ 박·형압 영역은 디자인 단계에서 확정 ⑤ 가제본 샘플로 최종 확인. 이 다섯 개만 지키면 첫 발주도 실패 없어요 :)\n\n[한 가지 더 — 색상 사고 예방]\n화장품 박스는 시리즈 컬러가 생명이에요. 1차 발주와 2차 발주의 색이 미묘하게 다르면 매대에서 바로 티가 나죠. 저희는 초도 생산 때 컬러칩(기준 색 샘플)을 보관해 재발주 때도 같은 색을 맞춰드려요. 리뉴얼로 색을 바꿀 때도 기존 칩과 비교하며 조정하니 안심하세요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#화장품박스 #단상자 #패키지제작 #박스제작 #지기구조 #금박인쇄 #형압 #부분UV #인쇄후가공 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-chuseok","topic":"선물세트박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"SEO · 「선물세트박스」 · 시의성","headline":"추석 선물세트 패키지, 7월에 발주해야 하는 이유 — 납기 역산 캘린더 공개","sub":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","dayLabel":"","captionNote":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","captionBody":"[3줄 요약]\n· 추석 선물세트 패키지는 제작 물량이 몰리기 전인 7월이 발주 골든타임이에요.\n· 싸바리 1~2주, 조립가공 2~4주 + 디자인·샘플 확인까지 역산하면 지금 시작해야 여유가 있어요.\n· 홍삼·건기식 세트는 내지(트레이·스폰지) 설계와 보자기·쇼핑백까지 한 번에 준비하세요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 7월 중순, 아직 한여름인데 벌써 추석 이야기냐고요? 네, 패키지 공장의 달력은 두 달 빨리 갑니다. 매년 8월 중순이 되면 명절 선물세트 박스 주문이 한꺼번에 몰려서, 늦게 출발한 브랜드는 원하는 사양을 포기하거나 납기에 쫓기게 되거든요. 오늘은 홍삼·건강기능식품·식품 브랜드 담당자님을 위해 추석 패키지 역산 캘린더를 공개할게요.\n\n[먼저, 제작 기간부터 볼게요]\n패키지 사양별 표준 제작 기간이에요(디자인 확정 후 기준).\n· 접지류(단상자 등): 3~10일 / · 골판지류: 1~2주 / · 싸바리박스: 1~2주 / · 표지바리: 1~3주 / · 조립가공 패키지(내지·부자재 포함): 2~4주\n선물세트는 대부분 싸바리+내지+쇼핑백 구성이라, 실제로는 조립가공 기준으로 보시는 게 안전해요.\n\n[추석 역산 캘린더 (9월 말 추석 기준)]\n· 7월 중~말: 구조·사양 상담, 견적, 디자인 시작 ← 지금 여기!\n· 8월 초: 디자인 확정, 가제본 샘플 확인\n· 8월 중: 본 제작 진입(이때부터 공장 성수기 시작)\n· 9월 초: 납품 완료, 제품 조립·물류 시작\n· 9월 중: 백화점·온라인 입점 및 판매 개시\n8월에 상담을 시작하면 이 일정이 전부 뒤로 밀려요. 특히 싸바리는 손 공정이 많아 성수기엔 슬롯이 먼저 마감됩니다.\n\n[선물세트 패키지, 체크리스트 5]\n1. 구성품 확정: 병 몇 개, 스틱 몇 포인지에 따라 내지(트레이·스폰지·EVA) 설계가 달라져요.\n2. 구조 선택: 상하짝 싸바리가 클래식, 자석형은 개봉감, 서랍형은 진열감이 좋아요.\n3. 후가공: 금박 로고+형압 조합이 명절 세트의 정석. 홀로그램박은 젊은 타깃에 잘 먹혀요.\n4. 부자재: 쇼핑백(자동·수동), 보자기, 리본까지 같은 톤으로 맞추면 완성도가 확 올라가요.\n5. 수량 전략: 목형·동판 개발비는 1회성이라, 설·추석 물량을 함께 계획하면 개당 단가가 내려가요.\n\n[구성 예시 — 홍삼 스틱 30포 세트라면]\n①상하짝 싸바리(무광 수입지, 딥레드) ②금박 로고 + 형압 라인 ③종이 트레이 내지(스틱 3단 배열) ④같은 톤의 자동 쇼핑백 — 이렇게 구성하는 게 정석이에요. 예산을 줄이려면 겉지를 국산 고급지로 바꾸거나 형압을 빼고, 더 높이려면 자석형 구조나 보자기 포장을 더해요. 이런 사양 조율이 저희 컨설팅의 일이에요.\n\n[자주 묻는 질문]\nQ. 설과 추석 물량을 같이 계약할 수 있나요? — 네, 목형·동판 개발비가 1회성이라 두 시즌을 묶으면 개당 단가가 유리해져요.\nQ. 구성품이 아직 확정 전인데요? — 후보 구성 2~3안으로 내지만 다르게 설계하는 방법도 있어요. 확정 전에 상담을 시작하셔도 됩니다.\nQ. 입점 일정이 더 빠른데요? — 일정 먼저 알려주시면 사양을 역산으로 조정해 드려요.\n\n추석 준비, 빠를수록 선택지가 많아집니다. 이번 주에 구성품 리스트만 들고 연락 주셔도 좋아요!\n\n[늦게 시작했다면 — 플랜 B]\n\"벌써 8월인데 어떡하죠?\" 하는 분들을 위한 차선책도 있어요. 싸바리 대신 고급 합지박스로 구조를 바꾸면 납기를 1주 이상 줄일 수 있고, 규격 사이즈 목형을 활용하면 개발 기간이 빠져요. 후가공을 금박 하나로 절제해도 명절 세트의 품격은 지킬 수 있습니다. 늦었다고 포기하지 마시고 일정부터 알려주세요 — 사양을 역산으로 맞춰드릴게요.\n\n💡 실장의 한 줄 팁: 상담 예약 때 \"추석 세트\"라고만 말씀하셔도 저희가 역산 캘린더를 바로 그려드려요. 올해 일정표를 프린트해서 팀 회의에 쓰셔도 좋습니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#선물세트박스 #추석선물세트 #홍삼패키지 #건강기능식품박스 #싸바리박스 #패키지제작 #명절선물포장 #쇼핑백제작 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-shoppingbag","topic":"쇼핑백제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-21T09:00:00.000Z","kicker":"SEO · 「쇼핑백 제작」","headline":"쇼핑백 제작, 자동과 수동의 차이부터 손잡이·사이즈까지 — 브랜드 쇼핑백 완전 가이드","sub":"자동쇼핑백 vs 수동쇼핑백, 손잡이 종류, 박스와 톤 맞추기, 견적 포인트","dayLabel":"","captionNote":"자동쇼핑백 vs 수동쇼핑백, 손잡이 종류, 박스와 톤 맞추기, 견적 포인트","captionBody":"[3줄 요약]\n· 쇼핑백은 \"걸어다니는 광고판\" — 박스와 톤을 맞추면 브랜드 완성도가 확 올라가요.\n· 자동(기계) 쇼핑백은 대량·단가에 유리하고, 수동(수제) 쇼핑백은 소량·특수 사양에 유리해요.\n· 손잡이·종이·후가공 조합, 그리고 제품이 들어가는 실측 사이즈 확인이 견적의 핵심입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 매장에서 나온 손님이 들고 걷는 쇼핑백, 사실 브랜드 입장에선 돈 주고도 못 사는 광고예요. 거리에서, 지하철에서, 카페 테이블 위에서 계속 노출되니까요. 그런데 의외로 쇼핑백은 박스 다 만들고 나서 \"아 맞다, 쇼핑백!\" 하고 급하게 준비하는 경우가 많아요. 오늘은 후회 없는 쇼핑백 제작 가이드를 정리해 드릴게요.\n\n[자동 쇼핑백 vs 수동 쇼핑백, 뭐가 다른가요?]\n· 자동 쇼핑백: 기계로 접착·성형까지 하는 방식이에요. 수량이 많을수록 단가가 안정적이고 납기도 빨라요. 규격 사이즈 안에서 고르면 가장 경제적입니다.\n· 수동(수제) 쇼핑백: 사람 손으로 접고 붙여요. 두꺼운 종이, 특수지, 비규격 사이즈, 특별한 손잡이 같은 \"기계가 못 하는 사양\"이 전부 가능해요. 소량 프리미엄 쇼핑백은 대부분 수동으로 만듭니다.\n백화점 명품관 쇼핑백이 유독 단단하고 고급스러운 이유가 바로 수동 공정 + 두꺼운 지류 + 후가공 조합이에요.\n\n[손잡이 하나로 급이 달라져요]\n· 종이 트위스트: 가장 기본, 경제적이에요.\n· 리본(새틴·그로그랭): 손에 닿는 감촉이 부드러워 화장품·기프트에 인기예요.\n· 면끈·PP끈: 캐주얼하거나 무거운 제품에 좋아요.\n· 아일렛(금속 링) 마감: 구멍 둘레를 금속으로 잡아줘 오래 들어도 튼튼하고, 디테일이 살아요.\n\n[종이와 후가공 조합]\n쇼핑백 몸통은 보통 아트지나 수입지에 무광·유광 코팅을 하고, 로고에 금박·형압을 더해요. 박스와 같은 지류·같은 박 색으로 맞추면 세트 완성도가 확 올라갑니다. 바닥과 입구를 보강하는 속판을 넣으면 무거운 제품도 안심이에요.\n\n[사이즈, 실측이 전부예요]\n쇼핑백 실패의 90%는 사이즈예요. 박스가 들어가긴 하는데 꽉 껴서 안 예쁘거나, 반대로 헐렁해서 제품이 놀거나요. 저희는 실제 박스(또는 가제본)를 놓고 여유 폭을 계산해 도면을 잡아드려요. 박스와 쇼핑백을 같은 곳에서 만들면 이 과정이 한 번에 끝나는 것도 장점이죠.\n\n[견적 포인트]\n쇼핑백 견적은 ①종이 종류·평량 ②사이즈(비규격 여부) ③손잡이 종류 ④후가공(코팅·박·형압) ⑤수량으로 잡혀요. 박용 동판은 1회성 개발비라 박스와 로고 동판을 공유하면 비용이 절약되는 경우도 있어요. 이런 디테일까지 저희가 함께 계산해 드립니다.\n\n[이런 순서로 준비하세요]\n① 박스(제품) 실측 → ② 자동/수동 결정(수량·사양 기준) → ③ 종이·손잡이·후가공 선택 → ④ 가제본 확인 → ⑤ 본 제작. 박스와 세트로 기획하면 톤 맞추기·납기 관리가 훨씬 쉬워요. 선물세트 시즌엔 쇼핑백 물량도 같이 몰리니, 명절 준비하신다면 박스와 함께 미리 문의 주세요 :)\n\n[자주 묻는 질문]\nQ. 쇼핑백만 따로 주문해도 되나요? — 네, 됩니다. 다만 박스와 함께 만들면 지류 톤과 박 색을 맞추기 쉽고 동판 공유로 개발비도 아껴져요.\nQ. 수량이 적은데 수제로 하면 많이 비싼가요? — 소량에서는 자동과 수제의 단가 차이가 생각보다 크지 않아요. 대신 지류·손잡이 선택 폭이 훨씬 넓어서 프리미엄 브랜드는 소량 수제를 많이 선택하세요.\nQ. 명절 시즌에도 바로 되나요? — 쇼핑백도 8월부터 물량이 몰려요. 박스와 같은 일정으로 미리 잡아두시는 게 안전합니다.\n\n💡 실장의 한 줄 팁: 쇼핑백은 접힌 상태로 납품돼요. 매장 보관 공간이 좁다면 납품 단위를 나눠 받는 방법도 있으니 함께 계획해요. 들었을 때 어깨에 닿는 높이(끈 길이)까지 확인하면 완벽합니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#쇼핑백제작 #종이쇼핑백 #수제쇼핑백 #브랜드쇼핑백 #패키지제작 #금박인쇄 #고급쇼핑백 #선물포장 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-boxtypes","topic":"박스제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-22T09:00:00.000Z","kicker":"SEO · 「박스 제작」","headline":"박스 제작 처음이라면 — 단상자·합지박스·싸바리박스, 우리 제품엔 뭐가 맞을까?","sub":"세 가지 박스의 구조·비용·용도 비교와 예산별 선택 기준","dayLabel":"","captionNote":"세 가지 박스의 구조·비용·용도 비교와 예산별 선택 기준","captionBody":"[3줄 요약]\n· 박스는 크게 단상자(접지) → 합지박스 → 싸바리박스 순으로 견고함과 고급감이 올라가요.\n· 제품 무게·판매 채널·예산, 이 세 가지만 정리하면 우리 브랜드에 맞는 박스가 보입니다.\n· 어떤 박스든 목형·동판 개발비는 1회성이라, 장기 운영 계획과 함께 정하는 게 경제적이에요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) \"박스 만들고 싶은데 종류가 너무 많아서 뭐가 뭔지 모르겠어요.\" 처음 패키지를 준비하시는 분들이 제일 많이 하시는 말씀이에요. 오늘은 박스의 3대장 — 단상자, 합지박스, 싸바리박스를 한 번에 비교해 드릴게요. 이 글 하나면 상담 때 대화가 훨씬 빨라질 거예요.\n\n[1. 단상자 — 가볍고 경제적인 기본기]\n한 장의 종이(카드지)를 칼선대로 잘라 접어 만드는 상자예요. 화장품 단상자가 대표적이죠. 가볍고 단가가 낮고, 접은 상태로 납품돼 보관이 편해요. 인쇄와 후가공(금박·형압·부분UV)을 얹으면 충분히 고급스러워져서, 단품 판매 제품의 표준 패키지예요. 다만 종이 한 겹이라 무겁거나 충격에 약한 제품은 버거울 수 있어요.\n\n[2. 합지박스 — 튼튼함이 필요할 때]\n골판지나 두꺼운 판지에 인쇄지를 합지(겹붙임)해 만드는 상자예요. 단상자보다 훨씬 견고해서 무게가 있는 제품, 택배 배송이 잦은 제품에 좋아요. 겉에 인쇄지를 붙이기 때문에 디자인 표현도 자유롭고요. 비용은 단상자와 싸바리의 중간쯤. \"튼튼한데 예산은 아껴야 할 때\"의 현실적인 답이에요.\n\n[3. 싸바리박스 — 프리미엄의 기준]\n2~3mm 합지 뼈대에 인쇄된 수입지를 손으로 감싸 붙이는 최고급 방식이에요. 형태가 무너지지 않고 종이 질감이 그대로 살아서 화장품·홍삼·주류·VIP 선물세트의 표준이죠. 자석형·서랍형 같은 구조 변형, 트레이 내지 설계까지 더하면 \"간직하고 싶은 박스\"가 됩니다. 손 공정이라 단가와 납기(1~2주)는 가장 여유 있게 봐야 해요.\n\n[그래서 우리 제품엔 뭐가 맞을까요? — 기준 3가지]\n① 제품 무게·형태: 가볍다(크림·마스크팩)→단상자 / 무겁다(병·세트)→합지·싸바리\n② 판매 채널: 온라인 단품→단상자·합지 / 백화점·기프트→싸바리\n③ 예산과 수량: 개발비(목형·동판)는 어느 박스든 1회성이에요. 수량이 늘수록 개당 단가가 내려가니, 첫 발주 때 시즌 물량까지 계획하면 유리해요.\n\n[조합 전략도 있어요]\n실제 브랜드들은 하나만 쓰지 않아요. 단품은 단상자, 명절 세트는 싸바리, 배송용은 합지 — 이렇게 라인별로 나누죠. 같은 로고 동판과 지류 톤을 공유하면 개발비를 아끼면서 브랜드 통일감을 지킬 수 있어요. 이런 라인 설계가 저희 패키지 컨설팅의 단골 주제랍니다.\n\n[마무리]\n박스 선택이 어려운 건 당연해요 — 구조·소재·후가공·수량이 전부 엮여 있으니까요. 제품 사진과 대략적인 수량만 들고 오세요. 저희가 구조 설계(지기구조)부터 소재 제안, 원가 개선까지 상담으로 풀어드릴게요. 가제본 샘플로 직접 확인하고 결정하셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 처음인데 샘플부터 볼 수 있나요? — 네, 저희는 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요. 실물을 만져보고 결정하는 게 가장 정확해요.\nQ. 지금 단상자를 쓰는데 싸바리로 바꾸고 싶어요. — 기존 박스 실물을 가져오시면 같은 치수로 싸바리 전환 견적을 바로 잡아드려요. 내지 추가 여부에 따라 구성도 제안해 드리고요.\nQ. 세 종류를 섞어서 발주해도 되나요? — 물론이에요. 라인별로 다른 구조를 쓰는 게 오히려 정석이고, 한 공장에서 만들면 톤 관리가 쉬워요.\n\n💡 실장의 한 줄 팁: 고민될 땐 세 종류 샘플을 나란히 놓고 제품을 직접 넣어보세요. 저희 상담실엔 구조별 샘플이 준비돼 있어서, 30분이면 답이 나옵니다. 커피 한 잔 준비해 둘게요 — 실물을 만져보는 순간 \"아, 이거네\" 하실 거예요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#박스제작 #단상자 #합지박스 #싸바리박스 #패키지제작 #포장박스 #박스종류 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-foil","topic":"금박인쇄","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"SEO · 「금박인쇄」","headline":"금박인쇄의 모든 것 — 동판 원리부터 금·은·먹·홀로그램박 고르는 법까지","sub":"박이 앉는 원리(동판+열+압력), 박 색상 도감, 디자인 데이터 팁, 비용 구조","dayLabel":"","captionNote":"박이 앉는 원리(동판+열+압력), 박 색상 도감, 디자인 데이터 팁, 비용 구조","captionBody":"[3줄 요약]\n· 금박은 잉크가 아니라 \"박 필름\"을 동판으로 눌러 앉히는 공정이에요 — 그래서 금속광이 살아있어요.\n· 금·은·먹·적·청·홀로그램박까지 색상이 다양하고, 무광 종이와 만날 때 대비가 가장 아름다워요.\n· 동판은 로고 모양대로 1회 제작하는 개발비 — 박스·쇼핑백에 재사용하면 경제적입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 패키지 상담을 하다 보면 \"로고를 금색 잉크로 인쇄하면 안 되나요?\"라는 질문을 자주 받아요. 되긴 되는데, 결과물이 완전히 달라요. 금색 잉크는 \"금색 그림\"이고, 금박은 \"진짜 금속광\"이거든요. 오늘은 프리미엄 패키지의 상징, 박(포일) 인쇄를 제대로 알려드릴게요.\n\n[박이 앉는 원리 — 생각보다 아날로그예요]\n박 인쇄는 3가지가 만나서 완성돼요.\n① 동판: 로고·문양 모양대로 새긴 금속판이에요. 도장처럼 생겼죠.\n② 박 필름: 금·은 등 금속광 필름이에요.\n③ 열과 압력: 뜨거운 동판이 박 필름을 종이에 눌러 붙여요.\n도장을 찍듯 \"꾹\" 누르는 순간 종이에 금속광이 앉아요. 그래서 박은 살짝 눌린 자국과 함께 반짝임이 생기는데, 이 눌림이 오히려 수공예적인 고급감을 만들어요.\n\n[박 색상 도감 — 금박만 있는 게 아니에요]\n· 금박: 클래식의 왕. 홍삼·주류·명절 세트의 정석이에요. 유광금·무광금도 나뉘어요.\n· 은박: 모던하고 차가운 세련미. 화장품·테크 제품에 잘 어울려요.\n· 먹박: 검정 유광. \"블랙 온 블랙\" 조합으로 조용한 럭셔리를 만들어요.\n· 적박·청박·녹박: 브랜드 컬러가 뚜렷할 때 포인트로 써요.\n· 홀로그램박: 보는 각도마다 무지개빛. 한정판·굿즈·젊은 타깃에 반응이 좋아요.\n팁 하나 — 박은 무광 코팅된 어두운 종이 위에서 가장 극적으로 빛나요. 배경이 차분할수록 박이 주인공이 됩니다.\n\n[디자인 데이터, 이것만 지켜주세요]\n박 영역은 인쇄와 별도 공정이라 데이터에서 분리돼 있어야 해요.\n① 박 영역은 별도 레이어/별색으로 지정 ② 너무 가는 선(0.3mm 이하)은 박이 뭉개질 수 있어요 ③ 넓은 면적+가는 선이 섞이면 압력 균형이 어려우니 상담 필요 ④ 박과 인쇄를 딱 맞춰 겹치는 디자인은 오차 여유를 두는 게 안전해요. 저희가 파일 검토 단계에서 전부 확인해 드리니, 헷갈리면 일단 보내주셔도 됩니다.\n\n[비용은 어떻게 잡히나요?]\n박 비용 = 동판(개발비, 1회) + 박 작업비(면적·수량 비례)예요. 여기서 절약 포인트!\n· 동판은 같은 로고라면 박스·쇼핑백·리플렛에 재사용할 수 있어요.\n· 박 면적을 줄이고 위치를 영리하게 잡으면(로고+포인트 라인 정도) 비용 대비 효과가 가장 좋아요.\n· 설·추석 등 시즌 물량을 묶으면 동판 개발비가 한 번으로 끝나요.\n\n[박 + 다른 후가공 조합]\n박은 혼자보다 조합에서 완성돼요. 무광 코팅 + 금박(정석), 형압 + 박 동시(눌러 새기며 금속광까지 — 최고급 조합), 부분UV + 박(광의 층위가 생겨요). 저희는 특수인쇄 전 공정을 자체 진행해서, 이런 조합 설계를 가장 잘하는 게 강점이에요.\n\n[마무리]\n박 하나 제대로 앉히면 패키지의 급이 달라져요. 로고 파일만 보내주시면 어떤 박, 어떤 조합이 어울릴지 샘플과 함께 제안해 드릴게요. 가제본으로 박 광택을 직접 확인하고 결정하셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 박이 시간이 지나면 벗겨지지 않나요? — 제대로 앉힌 박은 일상 사용에서 벗겨지지 않아요. 코팅 위에 박을 올리는 순서, 압력 세팅 같은 공정 관리가 품질을 좌우하는데, 이게 특수인쇄 전문 공장의 차이예요.\nQ. 아주 작은 글씨도 박이 되나요? — 0.3mm 이하의 가는 획은 뭉개질 수 있어 디자인 조정을 권해요. 파일 검토 때 미리 잡아드립니다.\nQ. 박과 비슷한 효과를 더 저렴하게 내는 방법은요? — 금색 별색 인쇄+유광 부분코팅 조합이 차선책이에요. 다만 금속광의 깊이는 박이 압도적이라, 로고만이라도 박을 권해드려요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#금박인쇄 #금박 #은박 #홀로그램박 #먹박 #인쇄후가공 #패키지제작 #박스제작 #고급인쇄 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-structure","topic":"지기구조","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-25T09:00:00.000Z","kicker":"SEO · 「지기구조」","headline":"패키지의 설계도, 지기구조 이야기 — 좋은 박스는 목형에서 태어납니다","sub":"지기구조가 결정하는 것들(조립성·보호력·원가), 목형 제작, 실용신안 구조까지","dayLabel":"","captionNote":"지기구조가 결정하는 것들(조립성·보호력·원가), 목형 제작, 실용신안 구조까지","captionBody":"[3줄 요약]\n· 지기구조는 박스의 \"설계 도면\" — 어떻게 접히고 잠기고 버티는지를 결정해요.\n· 같은 크기여도 구조에 따라 종이 사용량·조립 시간·파손율이 달라져 원가가 바뀝니다.\n· 구조는 목형(칼틀)으로 구현돼요. 저희는 포장상자 구조 실용신안을 다수 보유한 구조 설계 전문이에요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 박스를 펼치면 나오는 납작한 전개도, 보신 적 있나요? 어디를 자르고 어디를 접을지 그려진 그 도면이 바로 \"지기구조\"예요. 겉디자인이 박스의 얼굴이라면 지기구조는 뼈대와 관절이죠. 오늘은 눈에 잘 안 보이지만 패키지의 성패를 가르는 구조 이야기를 해볼게요.\n\n[지기구조가 결정하는 것들]\n① 보호력: 제품이 흔들리는지, 눌림에 버티는지가 구조에서 정해져요.\n② 조립성: 포장 라인에서 1개 접는 데 몇 초 걸리느냐 — 물량이 크면 이게 인건비예요.\n③ 개봉 경험: 어디서 어떻게 열리는지가 언박싱의 첫인상을 만들어요.\n④ 원가: 전개도가 종이 원단에 몇 개 앉느냐(자리잡기 효율)에 따라 종이값이 달라져요.\n같은 크기의 박스도 구조를 바꾸면 종이 사용량이 줄거나, 조립이 빨라지거나, 택배 충격에 강해질 수 있어요. 그래서 저희는 \"구조가 곧 원가\"라고 말해요.\n\n[목형 — 구조를 현실로 만드는 틀]\n확정된 지기구조는 목형(칼틀)으로 제작돼요. 나무판에 칼날(자르는 선)과 오시날(접는 선)을 심은 틀로, 이 틀로 종이를 \"따내는\" 거예요. 목형은 최초 1회 개발비지만, 한번 만들면 같은 구조를 계속 재생산할 수 있어요. 구조를 자주 바꾸면 그때마다 목형비가 들기 때문에, 처음에 구조를 제대로 잡는 게 장기적으로 경제적입니다.\n\n[검증된 구조 vs 새로운 구조]\n맞뚜껑·십자조립·삼면접착 같은 검증된 구조는 안정적이고 빠르게 진행돼요. 반면 \"우리 제품만의 개봉 경험\"을 원하면 구조를 새로 설계하죠. 저희는 포장용 종이박스, 포장상자의 봉인구조, 이중구조 상자 등 포장상자 구조 관련 실용신안을 다수 등록해 온 구조 설계 전문이라, 새 구조도 특허 검토와 함께 안전하게 개발해 드려요.\n\n[이런 요청이 구조 설계 대상이에요]\n· \"뚜껑을 열면 제품이 살짝 올라오게 하고 싶어요\" → 리프트 구조\n· \"테이프 없이 봉인됐으면 좋겠어요\" → 봉인 구조(저희 실용신안 분야!)\n· \"택배에서 안 눌리게요\" → 이중벽·보강 구조\n· \"매장에서 그대로 진열되게요\" → POP·디스플레이 겸용 구조\n· \"포장 알바 없이 빨리 접히게요\" → 오토바닥·원터치 구조\n\n[구조 상담은 이렇게 진행돼요]\n제품 실물(또는 치수·무게)을 주시면 → 용도·물류 환경을 듣고 → 구조 2~3안을 제안 → 백상지 목업(형태 샘플)으로 만져보고 결정 → 목형 제작 → 본 생산. 구조가 확정되면 소재 제안(수입지·트레이·스폰지)과 생산성 검토·원가 개선까지 이어서 봐드려요. 이게 저희 \"패키지 컨설팅\"의 전체 그림이에요.\n\n[마무리]\n멋진 디자인은 눈을 사로잡지만, 좋은 구조는 브랜드의 손익과 고객 경험을 지켜요. 지금 쓰는 박스가 뭔가 불편하다면 — 접는 데 오래 걸리거나, 자주 파손되거나, 종이가 아깝게 남거나 — 구조 점검부터 받아보세요. 도면 없이 실물만 들고 오셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 목형 비용이 아까운데 규격 구조로만 하면 안 되나요? — 됩니다! 검증된 규격 구조 + 사이즈 조정으로 시작하고, 브랜드가 커지면 전용 구조를 개발하는 단계적 접근을 많이 추천해요.\nQ. 구조 아이디어가 있는데 그림을 못 그려요. — 말로 설명해 주시면 저희가 백상지 목업으로 만들어 보여드려요. 만져보면서 다듬는 게 도면보다 빨라요.\nQ. 남의 박스 구조를 따라 해도 되나요? — 일반적인 구조는 괜찮지만 등록된 실용신안 구조는 침해가 될 수 있어요. 저희가 설계 단계에서 검토해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#지기구조 #목형 #박스설계 #패키지컨설팅 #박스제작 #패키지제작 #포장박스 #실용신안 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-estimate","topic":"패키지제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-27T09:00:00.000Z","kicker":"SEO · 「패키지 견적」","headline":"패키지 견적서 읽는 법 — 개발비·자재·후가공·수량, 어디서 아끼고 어디에 써야 할까","sub":"견적 구성 4요소, 수량별 단가의 비밀, 원가 절감 포인트 5가지","dayLabel":"","captionNote":"견적 구성 4요소, 수량별 단가의 비밀, 원가 절감 포인트 5가지","captionBody":"[3줄 요약]\n· 패키지 견적 = 개발비(목형·동판, 1회성) + 자재 + 인쇄·후가공 + 수량 효과, 이 4개의 조합이에요.\n· 수량이 2배가 돼도 가격이 2배가 되지 않는 이유 — 개발비와 준비 비용이 고정이기 때문이에요.\n· 무작정 깎기보다 \"어디에 쓰고 어디서 아낄지\"를 설계하는 게 진짜 원가 관리입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 견적서를 처음 받아보신 담당자님들이 종종 물으세요. \"왜 500개랑 2,000개 개당 가격이 이렇게 달라요?\" \"개발비가 뭐예요?\" 오늘은 패키지 견적서를 해부해 드릴게요. 이 구조를 알면 예산 계획이 쉬워지고, 협상도 현명해져요.\n\n[견적의 4요소]\n① 개발비(1회성): 목형(칼틀)과 박용 동판 제작비예요. 첫 발주에만 들고, 재발주 때는 빠져요.\n② 자재비: 종이(카드지·합지·수입지), 내지(트레이·스폰지), 부자재(자석·리본·아일렛)예요.\n③ 공정비: 인쇄, 코팅, 박, 형압, 에폭시, 싸바리(손 공정), 조립… 공정 수만큼 올라가요.\n④ 수량: 기계를 세팅하고 돌리는 준비 비용이 고정이라, 수량이 늘수록 개당 단가가 내려가요.\n\n[수량별 단가의 비밀]\n예를 들어 목형+동판에 일정 비용이 들었다면, 500개를 만들면 개당 개발비 부담이 크지만 3,000개면 확 줄어요. 그래서 저희는 늘 여쭤봐요 — \"이 박스, 얼마나 오래 쓰실 계획이세요?\" 한 시즌용인지, 상시 운영용인지에 따라 최적 수량이 달라지거든요. 필요량보다 조금 더 주문하는 게 오히려 총비용이 낮아지는 경우도 많아요.\n\n[어디서 아끼고, 어디에 써야 할까]\n아껴도 티 안 나는 곳:\n· 박 면적 — 로고+포인트 라인이면 충분해요. 넓게 깐다고 2배 고급스러워지진 않아요.\n· 규격 사이즈 — 종이 원단에 전개도가 딱 맞게 앉으면 로스(버리는 종이)가 줄어요.\n· 구조 단순화 — 조립 단계 하나가 줄면 물량 전체의 인건비가 줄어요.\n쓰면 확 티 나는 곳:\n· 겉지 질감 — 손에 닿는 첫 감촉이라 투자 대비 효과가 가장 커요.\n· 형압 — 은은하지만 \"만지는 순간\" 급이 달라져요.\n· 내지 — 뚜껑을 연 순간의 정돈감. 선물세트라면 특히요.\n\n[견적서에서 꼭 확인할 것]\n① 개발비가 분리 표기됐는지(재발주 가격을 예측할 수 있어요) ② 납기일이 명시됐는지 ③ 배송비 포함 여부 ④ 색상·후가공 확인 방법(가제본? 인쇄 감리?) — 이 네 가지가 명확한 견적서가 좋은 견적서예요. 저희는 사양 확정 후 제작 비용과 예상 일정을 정확히 산출해 드리고, 생산성 검토·원가 개선 제안까지 함께 드립니다.\n\n[마무리]\n견적은 흥정이 아니라 설계예요. 예산을 먼저 말씀해 주시면 그 안에서 최대 효과가 나는 조합을 짜드리는 게 저희 일이에요. \"이 예산으로 이게 될까요?\" 하는 단계의 문의도 언제든 환영입니다 :)\n\n[자주 묻는 질문]\nQ. 견적만 받아봐도 되나요? — 물론이에요. 사양이 대략적이어도 범위 견적을 드리고, 확정 사양이 나오면 정확한 금액과 일정을 다시 드려요.\nQ. 타사 견적서를 가져가면 비교 설명해 주시나요? — 네, 항목별로 어디서 차이가 나는지 짚어드려요. 싼 견적에는 보통 이유(지류 등급, 후가공 생략, 검수 범위)가 있거든요.\nQ. 재발주 때는 얼마나 저렴해지나요? — 목형·동판 개발비가 빠지고 데이터 세팅이 끝나 있어, 같은 수량 기준으로 눈에 띄게 내려가요. 첫 견적서에 재발주 예상가도 함께 표기해 드립니다.\n\n💡 실장의 한 줄 팁: 견적 문의 때 ①제품 사진 ②대략 수량 ③희망 예산, 이 세 가지만 주시면 첫 회신이 빨라져요. 예산을 말하면 손해라는 걱정은 안 하셔도 돼요 — 예산 안에서 최선을 짜는 게 저희 일이니까요. 견적서 항목이 이해 안 되면 언제든 전화 주세요 — 한 줄 한 줄 같이 읽어드립니다. 아는 만큼 아끼는 게 견적이에요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#패키지제작 #박스제작견적 #패키지견적 #박스제작 #원가절감 #목형 #동판 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-redginseng","topic":"홍삼패키지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-28T09:00:00.000Z","kicker":"SEO · 「홍삼 패키지」","headline":"홍삼·건강기능식품 패키지 제작 — 신뢰를 파는 상자, 내지 설계가 반입니다","sub":"병·스틱·앰플 유형별 내지(트레이·스폰지) 설계, 프리미엄 마감, 세트 구성 노하우","dayLabel":"","captionNote":"병·스틱·앰플 유형별 내지(트레이·스폰지) 설계, 프리미엄 마감, 세트 구성 노하우","captionBody":"[3줄 요약]\n· 홍삼·건기식 패키지의 핵심은 \"신뢰감\" — 흔들리지 않는 내지와 묵직한 싸바리가 기본기예요.\n· 병·스틱·앰플 등 구성품 유형에 따라 트레이·스폰지·EVA 내지 설계가 완전히 달라져요.\n· 어르신 선물 수요가 많아 개봉 편의성(열기 쉬운 구조)까지 챙기면 완성도가 높아집니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 홍삼·건강기능식품은 \"내 몸에 들어가는 것\"이라 소비자가 패키지에서 신뢰를 읽어요. 상자가 얇고 가벼우면 내용물까지 가벼워 보이고, 병이 상자 안에서 달그락거리면 그 순간 프리미엄이 무너지죠. 저희가 수십 년 홍삼·흑삼·건기식 패키지를 만들며 쌓은 노하우를 정리해 드릴게요.\n\n[구성품 유형별 내지 설계]\n· 병(농축액·환): 무게가 있어서 병목까지 잡아주는 종이 트레이나 성형 내지가 필요해요. 병 어깨 높이에 맞춰 설계하면 뚜껑을 열었을 때 라벨이 정면으로 보여요.\n· 스틱(포): 30포·60포 등 개수에 맞춘 칸 배열이 핵심이에요. 3단·4단 배열로 \"가지런함\"을 연출하면 열자마자 정돈된 인상을 줘요.\n· 앰플·유리병: 파손 위험이 있어 스폰지나 EVA(탄성 폼)로 감싸요. 택배 물량이 많다면 필수예요.\n· 혼합 세트(병+스틱): 단 차이를 둔 2단 트레이나 칸막이 조합으로 풀어요. 구성이 복잡할수록 내지 설계가 실력이에요.\n\n[박스는 역시 싸바리가 정석]\n명절·효도 선물 수요가 큰 카테고리라 상하짝 싸바리가 표준이에요. 딥레드·딥브라운·골드 톤에 금박 로고, 형압 라인 — 이 조합이 \"몸에 좋은 프리미엄\"의 문법이죠. 요즘은 젊은 타깃 브랜드들이 화이트+은박, 크라프트+먹박 같은 모던한 변주도 많이 하세요. 브랜드 방향에 맞춰 제안해 드려요.\n\n[놓치기 쉬운 포인트 — 개봉 편의성]\n홍삼 세트는 받는 분이 어르신인 경우가 많아요. 뚜껑이 너무 꽉 맞으면 열기 힘들고, 너무 헐거우면 고급감이 떨어져요. 저희는 뚜껑 맞춤(끼움 정도)을 가제본 단계에서 직접 열어보며 조정해 드려요. 봉인 구조(테이프 없이 잠기는 구조)에 대한 실용신안도 보유하고 있어서, 개봉 경험까지 설계할 수 있습니다.\n\n[규정 표기 공간도 미리 계획하세요]\n건강기능식품은 표시 사항(인증마크, 영양·기능 정보, 섭취량 등)이 들어갈 공간이 필요해요. 디자인 다 끝나고 표기 넣을 자리가 없어 다시 고치는 경우가 정말 많아요. 파일 검토 때 표기 영역부터 확인해 드리니, 규정 표기 목록을 함께 주시면 좋아요.\n\n[세트 완성은 부자재까지]\n박스만큼 중요한 게 쇼핑백과 보자기예요. 같은 지류 톤, 같은 박 색으로 맞추면 매장 진열부터 선물하는 순간까지 톤이 이어져요. 동판을 공유하면 부자재 개발비도 아낄 수 있고요.\n\n[마무리]\n홍삼·건기식 패키지는 저희가 가장 오래, 가장 많이 만들어 온 분야예요. 구성품 리스트(병 몇 개, 스틱 몇 포)만 보내주시면 내지 설계안과 함께 견적을 드릴게요. 추석 시즌은 8월부터 몰리니, 준비 중이시라면 이달에 시작하시는 걸 추천드려요 :)\n\n[자주 묻는 질문]\nQ. 내지만 따로 제작할 수 있나요? — 네, 기존 박스에 맞춘 트레이·스폰지 내지만 제작하는 것도 가능해요. 구성품이 바뀌었을 때 박스는 그대로 두고 내지만 바꾸면 비용을 크게 아껴요.\nQ. 식품이 직접 닿아도 되는 재질인가요? — 내용물이 직접 닿는 구성이라면 접촉 안전 소재로 설계해요. 상담 때 구성품의 포장 상태(개별 포장 여부)를 알려주시면 정확히 제안해 드려요.\nQ. 소량 시제품 세트도 되나요? — 네, 낱개 샘플 제작이 가능하니 크라우드펀딩·시장 테스트용 소량 세트도 부담 없이 시작하세요.\n\n💡 실장의 한 줄 팁: 시즌 리뉴얼 때 박스는 유지하고 띠지(슬리브)만 바꾸는 브랜드도 많아요. 개발비 없이 새 시즌 느낌을 내는 가성비 전략이랍니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#홍삼패키지 #건강기능식품박스 #선물세트박스 #싸바리박스 #패키지제작 #내지설계 #트레이 #명절선물세트 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-liquor","topic":"주류패키지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-30T09:00:00.000Z","kicker":"SEO · 「주류 패키지」","headline":"주류·VIP 패키지 제작 — 병 무게를 견디며 품격을 만드는 법","sub":"전통주·위스키 선물박스의 구조 보강, 병 고정 내지, 블랙&골드 마감 공식","dayLabel":"","captionNote":"전통주·위스키 선물박스의 구조 보강, 병 고정 내지, 블랙&골드 마감 공식","captionBody":"[3줄 요약]\n· 주류 패키지의 1순위는 \"무게\" — 병을 견디는 구조 보강과 병 고정 내지가 기본이에요.\n· 프리미엄 마감의 정석은 딥컬러+금박(클래식) 또는 블랙+먹박(모던), 두 공식이에요.\n· VIP·한정판 패키지는 수량이 적어도 낱개 샘플부터 함께 설계해 드립니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 전통주 열풍에 위스키 선물 문화까지 — 요즘 주류 패키지 문의가 부쩍 늘었어요. 그런데 주류는 패키지 중에서도 난이도가 높은 편이에요. 유리병은 무겁고 깨지기 쉬운데, 소비자 기대치는 가장 높은 카테고리거든요. 오늘은 병을 안전하게, 그리고 품격 있게 모시는 법을 알려드릴게요.\n\n[1순위 — 무게를 견디는 구조]\n750ml 유리병 하나가 1kg를 넘는 경우가 많아요. 2병 세트면 부자재까지 3kg에 가깝죠.\n· 바닥 보강: 싸바리 합지 두께를 올리거나 이중 바닥으로 무게를 받아요.\n· 손잡이 하중: 쇼핑백까지 세트라면 손잡이·접합부 강도를 병 무게 기준으로 설계해요.\n· 이중벽 구조: 택배 배송이 있다면 외박스와 완충 구조까지 함께 계획해요. 저희는 이중구조 상자 관련 실용신안 경험이 있어 이 부분이 강점이에요.\n\n[2순위 — 병이 놀지 않게, 내지 설계]\n병은 \"세워서 꼭 맞게\"가 원칙이에요. 병 어깨와 바닥을 함께 잡는 성형 트레이, 목 부분을 고정하는 넥홀더, 2병 세트의 칸막이까지 — 병 실물을 놓고 설계해요. 잔이나 오프너 같은 구성품이 있다면 각자의 자리를 만들어 \"열었을 때의 정돈감\"까지 연출합니다.\n\n[3순위 — 품격의 마감 공식]\n주류·VIP 패키지엔 두 가지 검증된 공식이 있어요.\n· 클래식 럭셔리: 딥그린·버건디·네이비 수입지 + 금박 로고 + 형압. 전통주·위스키의 정석이에요.\n· 모던 럭셔리: 블랙 무광 + 먹박(블랙 온 블랙) + 부분UV 포인트. 조용한데 강한, 요즘 한정판 문법이죠.\n여기에 자석형 개봉이나 서랍형 구조를 더하면 \"선물 받는 순간\"이 하나의 경험이 돼요.\n\n[VIP·한정판은 소량이 기본이에요]\n\"300개만 만들 건데 될까요?\" — 됩니다. VIP 답례품, 한정판 굿즈, 기업 명절 선물은 원래 소량이에요. 저희는 최소수량을 조율해 드리고, 본 제작 전 낱개 완제품 샘플로 실물을 확인시켜 드려요. 수량이 적을수록 개발비 비중이 커지니, 동판·목형을 아끼는 설계(기존 규격 활용, 박 면적 최적화)로 균형을 잡아드립니다.\n\n[일정 팁]\n주류 선물 수요는 추석·연말에 몰려요. 특히 연말 VIP 패키지는 11월이면 늦어요 — 구조 보강과 내지 설계에 시간이 들거든요. 시즌 두 달 전 상담이 가장 여유롭습니다.\n\n[마무리]\n좋은 술은 병을 여는 순간이 아니라 상자를 여는 순간부터 시작돼요. 병 실물(또는 도면)만 보내주시면 구조 보강안과 내지 설계, 마감 공식까지 제안해 드릴게요. 화장품·홍삼·주류 — 프리미엄 패키지가 필요한 모든 순간, 동성특수인쇄가 함께합니다 :)\n\n[자주 묻는 질문]\nQ. 병 도면이 없는데 실물만 보내도 되나요? — 네, 병 실물이 가장 정확해요. 실측해서 내지와 구조를 설계해 드립니다.\nQ. 2병+잔 2개 같은 복합 구성도 되나요? — 됩니다. 구성품별 자리를 나누는 내지 설계가 저희 전문이에요. 무게 배분까지 계산해 손잡이 하중을 잡아요.\nQ. 수출용인데 항공 운송을 견딜까요? — 운송 환경(항공·해상·택배)을 알려주시면 완충 구조와 외박스까지 함께 설계해 드려요. 이중구조 상자 관련 실용신안 경험이 여기서 힘을 발휘합니다.\n\n💡 실장의 한 줄 팁: 증정용 잔이나 오프너가 늦게 확정되는 경우가 많아요. 내지 설계에 \"여분 칸\"을 미리 잡아두면 구성이 바뀌어도 대응이 됩니다. 병 라벨이 확정되기 전이라도 병 몸통 치수만 있으면 구조 설계는 먼저 시작할 수 있어요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#주류패키지 #위스키선물박스 #전통주패키지 #VIP선물 #선물세트박스 #싸바리박스 #패키지제작 #먹박 #금박인쇄 #동성특수인쇄","variant":"A","status":"planned"}],"stats":{"publishedCount":0,"pendingCount":10,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"blogger","label":"구글 블로그","icon":"🅱️","active":true,"published":[],"pending":[{"id":"gb-ssabari","topic":"싸바리박스","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-15T09:00:00.000Z","kicker":"SEO · 「싸바리박스」","headline":"싸바리박스, 명품 패키지는 왜 전부 이 방식일까요? — 구조·견적·납기 총정리","sub":"2mm 합지에 수입지를 입히는 최고급 구조 — 상하짝·자석·서랍형, 견적 원리, 납기 1~2주","dayLabel":"","captionNote":"2mm 합지에 수입지를 입히는 최고급 구조 — 상하짝·자석·서랍형, 견적 원리, 납기 1~2주","captionBody":"[3줄 요약]\n· 싸바리박스는 2~3mm 두께 합지(보드지)에 수입지·특수지를 손수 감싸 붙여 만드는 최고급 패키지예요.\n· 화장품·홍삼·주류·VIP 선물세트처럼 \"받는 순간의 무게감\"이 중요한 제품에 쓰입니다.\n· 견적은 구조(목형)+겉지+후가공+수량으로 잡히고, 제작 기간은 보통 1~2주를 봐야 해요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 백화점에서 화장품이나 홍삼 선물세트를 사면, 상자가 묵직하고 단단해서 버리기 아까웠던 경험 있으시죠? 그 상자가 바로 오늘 이야기할 \"싸바리박스\"예요. 브랜드 담당자님들이 프리미엄 패키지를 알아보실 때 가장 먼저 만나는 단어라서, 구조부터 견적·납기까지 제작 전에 알아두시면 좋은 것들을 정리해 드릴게요.\n\n[싸바리박스가 뭔가요?]\n쉽게 말해 \"단단한 뼈대에 좋은 옷을 입힌 상자\"예요. 2~3mm 두께의 합지(보드지)로 몸통을 만들고, 그 위에 인쇄된 수입지나 특수지를 한 장 한 장 감싸 붙여요(이 \"싸 바르는\" 공정에서 이름이 왔어요). 일반 단상자와 달리 형태가 무너지지 않고, 종이 특유의 질감과 색이 그대로 살아서 명품 패키지의 표준처럼 쓰입니다.\n\n[형태도 생각보다 다양해요]\n· 상하짝(뚜껑+몸통): 가장 클래식한 형태. 홍삼·건강기능식품 선물세트의 기본이에요.\n· 자석형: 뚜껑에 자석을 심어 \"탁\" 하고 닫혀요. 화장품·VIP 기프트에서 인기가 많아요.\n· 양문형·서랍형: 여는 동작 자체가 특별해져서 언박싱 경험을 설계할 때 좋아요.\n· 내지(트레이) 구성: 종이 트레이, 스폰지, EVA 등으로 제품을 딱 맞게 앉혀요. 병·앰플처럼 흔들리면 안 되는 제품은 내지 설계가 반이에요.\n\n[여기에 특수인쇄를 더하면]\n싸바리의 겉지 위에 금박·은박·홀로그램박으로 로고를 앉히거나, 형압(양각·음각)으로 눌러 새기고, 부분 실크·에폭시로 포인트를 주면 같은 구조라도 완성도가 완전히 달라져요. 저희는 특수인쇄와 패키지 제조를 한 공장에서 원스톱으로 진행하기 때문에, 구조와 후가공을 처음부터 같이 설계해 드립니다.\n\n[견적은 어떻게 잡히나요?]\n싸바리 견적은 크게 네 가지로 구성돼요.\n1. 개발비: 목형(칼틀)과 박용 동판 제작비 — 최초 1회만 들어가요.\n2. 자재: 합지 두께, 겉지 종류(수입지냐 일반지냐)에 따라 달라져요.\n3. 후가공: 박·형압·에폭시 등 공정이 늘수록 올라가요.\n4. 수량: 개발비가 고정이라, 수량이 늘수록 개당 단가는 뚝 떨어집니다.\n그래서 같은 박스도 500개와 3,000개의 개당 가격이 크게 달라요. 저희는 생산성 검토와 원가 개선까지 컨설팅해 드리니, 예산을 먼저 말씀해 주시면 그 안에서 가장 좋은 조합을 찾아드려요.\n\n[납기는 얼마나 걸리나요?]\n싸바리는 손이 많이 가는 공정이라 보통 1~2주를 보셔야 해요(표지바리 1~3주, 조립가공 패키지는 2~4주). 여기에 디자인 확정, 가제본 샘플 확인 시간까지 더하면 실제로는 한 달 가까이 잡는 게 안전합니다. 명절 선물세트처럼 날짜가 정해진 프로젝트라면 꼭 역산해서 미리 문의 주세요.\n\n[샘플 없이 대량 제작, 불안하지 않으세요?]\n저희는 본 제작 전에 가제본(실물 샘플)으로 색상과 후가공 느낌을 확인받고, 인쇄 단계에서는 고객이 직접 공장에서 색을 보는 인쇄 감리도 진행해요. 포장상자 구조 관련 실용신안도 다수 등록해 둔 만큼, 구조 설계부터 검수까지 믿고 맡기실 수 있게 프로세스로 증명하겠습니다 :)\n\n[자주 묻는 질문]\nQ. 소량도 가능한가요? — 네, 최소수량은 조율 가능하고 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요.\nQ. 겉지는 어떻게 고르나요? — 차분한 무드면 무광 수입지, 화사하면 펄지, 내추럴하면 크라프트 계열. 상담 오시면 지류 샘플을 만져보며 함께 골라요.\nQ. 디자인이 아직 없는데요? — 구조와 사양을 먼저 잡고 디자인을 입히는 순서도 가능해요. 패키지디자인 연구·개발 문의도 전문가가 직접 상담해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#싸바리박스 #패키지제작 #박스제작 #고급박스 #선물세트박스 #화장품박스 #합지박스 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-cosmetic","topic":"화장품박스","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"SEO · 「화장품박스 / 단상자」","headline":"화장품 박스 제작, 단상자 구조와 후가공 조합이 8할입니다 — 발주 전 체크리스트","sub":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","dayLabel":"","captionNote":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","captionBody":"[3줄 요약]\n· 화장품 박스의 완성도는 지기구조(상자 구조) 선택과 후가공 조합에서 8할이 정해져요.\n· 단상자는 맞뚜껑·십자조립·삼면접착(오토) 세 구조가 기본 — 제품 무게와 포장 방식으로 골라요.\n· 발주 전 파일 검토(칼선·여백·해상도)와 가제본 샘플 확인을 거치면 실패가 없습니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 화장품은 패키지 산업에서 가장 화려한 분야예요. 금박·형압·부분UV 같은 특수 후가공을 제일 정교하게 쓰는 곳이 바로 화장품 박스거든요. 처음 브랜드를 준비하시는 담당자님들이 \"뭐부터 정해야 하죠?\"라고 물으시면 저는 늘 이렇게 답해요. 구조 먼저, 후가공은 그다음이요.\n\n[1단계 — 지기구조: 상자의 골격을 정해요]\n단상자(한 장의 종이를 접어 만드는 상자)는 바닥 구조에 따라 크게 셋으로 나뉘어요.\n· 맞뚜껑: 위아래가 같은 방식으로 열리는 기본형. 가볍고 단정해서 크림·쿠션 등 가벼운 제품에 좋아요.\n· 십자조립: 바닥을 십자로 끼워 조립해요. 맞뚜껑보다 견고해서 유리 용기도 안심이에요.\n· 삼면접착(오토바닥): 옆을 누르면 바닥이 자동으로 펴져요. 접은 상태로 납품돼 보관·물류가 편하고, 포장 라인에서 속도가 나요. 물량이 있는 브랜드의 표준이죠.\n앰플·에센스처럼 병이 흔들리면 안 되는 제품은 내지(칸막이·트레이)까지 함께 설계해요. 이 구조 설계(지기구조)가 저희 패키지 컨설팅의 핵심이고, 구조에 따라 목형(칼틀)이 새로 제작됩니다.\n\n[2단계 — 후가공: 브랜드의 인상을 입혀요]\n구조가 몸이라면 후가공은 표정이에요. 화장품 박스에서 검증된 조합을 소개할게요.\n· 무광 코팅 + 금박 로고: 가장 실패 없는 클래식. 차분한 바탕에 로고만 빛나요.\n· 형압(엠보/디보스): 로고를 볼록(양각)하거나 오목(음각)하게 눌러 새겨요. 만졌을 때의 고급감은 형압을 못 이겨요.\n· 부분UV: 무광 바탕에 특정 부분만 유광을 올려 은은한 대비를 만들어요. 미니멀 브랜드에 잘 어울려요.\n· 에폭시·부분실크: 포인트 부분을 도톰하게 올려 촉감까지 설계해요.\n박은 금·은뿐 아니라 홀로그램박, 먹박 등 색이 다양하고, 로고 모양대로 동판을 떠서 열과 압력으로 앉히는 공정이라 디자인 단계에서 박 영역을 미리 정해두는 게 좋아요.\n\n[3단계 — 파일 검토: 사고를 미리 막아요]\n디자인 파일을 받으면 저희가 가장 먼저 하는 일이 검토예요. 칼선(재단선)과 접는 선이 맞는지, 가장자리 여백은 충분한지, 이미지 해상도가 인쇄에 적합한지, 박·형압 영역이 공정 가능하게 분리돼 있는지를 확인하고, 원하시는 느낌에 맞는 종이 재질과 인쇄 기법을 제안해 드려요. 이 단계에서 조율이 잘 되면 재작업이 없어요.\n\n[4단계 — 가제본 샘플로 확인하고 갑니다]\n대량 인쇄 전에 디지털 시안을 크로스 체크하고, 필요하면 실물 가제본을 만들어 색상과 후가공 느낌을 직접 확인받아요. 고가·대량 작업이라면 인쇄 당일 공장에서 색을 함께 보는 인쇄 감리도 가능해요. 최소수량도 조율 가능하고 낱개 샘플까지 제작해 드려요.\n\n[보너스 — 종이 한 장이 브랜드 톤을 바꿔요]\n같은 구조·같은 후가공이라도 종이가 다르면 완성품이 달라져요. 매트한 무광 계열은 지문이 덜 남고 차분해서 스킨케어 라인에, 은은히 반짝이는 펄지는 메이크업·기프트 라인에, 크라프트 계열은 비건·내추럴 컨셉에 잘 어울려요. 종이 값이 조금 올라가도 후가공을 줄여 총비용을 맞추는 조합 설계도 가능하답니다.\n\n[정리 — 발주 전 체크리스트]\n① 제품 무게·용기 형태 확인 ② 포장 방식 확인(수작업이면 맞뚜껑도 OK, 라인 포장이면 오토바닥) ③ 후가공은 최대 2가지 조합으로 절제 ④ 박·형압 영역은 디자인 단계에서 확정 ⑤ 가제본 샘플로 최종 확인. 이 다섯 개만 지키면 첫 발주도 실패 없어요 :)\n\n[한 가지 더 — 색상 사고 예방]\n화장품 박스는 시리즈 컬러가 생명이에요. 1차 발주와 2차 발주의 색이 미묘하게 다르면 매대에서 바로 티가 나죠. 저희는 초도 생산 때 컬러칩(기준 색 샘플)을 보관해 재발주 때도 같은 색을 맞춰드려요. 리뉴얼로 색을 바꿀 때도 기존 칩과 비교하며 조정하니 안심하세요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#화장품박스 #단상자 #패키지제작 #박스제작 #지기구조 #금박인쇄 #형압 #부분UV #인쇄후가공 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-chuseok","topic":"선물세트박스","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"SEO · 「선물세트박스」 · 시의성","headline":"추석 선물세트 패키지, 7월에 발주해야 하는 이유 — 납기 역산 캘린더 공개","sub":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","dayLabel":"","captionNote":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","captionBody":"[3줄 요약]\n· 추석 선물세트 패키지는 제작 물량이 몰리기 전인 7월이 발주 골든타임이에요.\n· 싸바리 1~2주, 조립가공 2~4주 + 디자인·샘플 확인까지 역산하면 지금 시작해야 여유가 있어요.\n· 홍삼·건기식 세트는 내지(트레이·스폰지) 설계와 보자기·쇼핑백까지 한 번에 준비하세요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 7월 중순, 아직 한여름인데 벌써 추석 이야기냐고요? 네, 패키지 공장의 달력은 두 달 빨리 갑니다. 매년 8월 중순이 되면 명절 선물세트 박스 주문이 한꺼번에 몰려서, 늦게 출발한 브랜드는 원하는 사양을 포기하거나 납기에 쫓기게 되거든요. 오늘은 홍삼·건강기능식품·식품 브랜드 담당자님을 위해 추석 패키지 역산 캘린더를 공개할게요.\n\n[먼저, 제작 기간부터 볼게요]\n패키지 사양별 표준 제작 기간이에요(디자인 확정 후 기준).\n· 접지류(단상자 등): 3~10일 / · 골판지류: 1~2주 / · 싸바리박스: 1~2주 / · 표지바리: 1~3주 / · 조립가공 패키지(내지·부자재 포함): 2~4주\n선물세트는 대부분 싸바리+내지+쇼핑백 구성이라, 실제로는 조립가공 기준으로 보시는 게 안전해요.\n\n[추석 역산 캘린더 (9월 말 추석 기준)]\n· 7월 중~말: 구조·사양 상담, 견적, 디자인 시작 ← 지금 여기!\n· 8월 초: 디자인 확정, 가제본 샘플 확인\n· 8월 중: 본 제작 진입(이때부터 공장 성수기 시작)\n· 9월 초: 납품 완료, 제품 조립·물류 시작\n· 9월 중: 백화점·온라인 입점 및 판매 개시\n8월에 상담을 시작하면 이 일정이 전부 뒤로 밀려요. 특히 싸바리는 손 공정이 많아 성수기엔 슬롯이 먼저 마감됩니다.\n\n[선물세트 패키지, 체크리스트 5]\n1. 구성품 확정: 병 몇 개, 스틱 몇 포인지에 따라 내지(트레이·스폰지·EVA) 설계가 달라져요.\n2. 구조 선택: 상하짝 싸바리가 클래식, 자석형은 개봉감, 서랍형은 진열감이 좋아요.\n3. 후가공: 금박 로고+형압 조합이 명절 세트의 정석. 홀로그램박은 젊은 타깃에 잘 먹혀요.\n4. 부자재: 쇼핑백(자동·수동), 보자기, 리본까지 같은 톤으로 맞추면 완성도가 확 올라가요.\n5. 수량 전략: 목형·동판 개발비는 1회성이라, 설·추석 물량을 함께 계획하면 개당 단가가 내려가요.\n\n[구성 예시 — 홍삼 스틱 30포 세트라면]\n①상하짝 싸바리(무광 수입지, 딥레드) ②금박 로고 + 형압 라인 ③종이 트레이 내지(스틱 3단 배열) ④같은 톤의 자동 쇼핑백 — 이렇게 구성하는 게 정석이에요. 예산을 줄이려면 겉지를 국산 고급지로 바꾸거나 형압을 빼고, 더 높이려면 자석형 구조나 보자기 포장을 더해요. 이런 사양 조율이 저희 컨설팅의 일이에요.\n\n[자주 묻는 질문]\nQ. 설과 추석 물량을 같이 계약할 수 있나요? — 네, 목형·동판 개발비가 1회성이라 두 시즌을 묶으면 개당 단가가 유리해져요.\nQ. 구성품이 아직 확정 전인데요? — 후보 구성 2~3안으로 내지만 다르게 설계하는 방법도 있어요. 확정 전에 상담을 시작하셔도 됩니다.\nQ. 입점 일정이 더 빠른데요? — 일정 먼저 알려주시면 사양을 역산으로 조정해 드려요.\n\n추석 준비, 빠를수록 선택지가 많아집니다. 이번 주에 구성품 리스트만 들고 연락 주셔도 좋아요!\n\n[늦게 시작했다면 — 플랜 B]\n\"벌써 8월인데 어떡하죠?\" 하는 분들을 위한 차선책도 있어요. 싸바리 대신 고급 합지박스로 구조를 바꾸면 납기를 1주 이상 줄일 수 있고, 규격 사이즈 목형을 활용하면 개발 기간이 빠져요. 후가공을 금박 하나로 절제해도 명절 세트의 품격은 지킬 수 있습니다. 늦었다고 포기하지 마시고 일정부터 알려주세요 — 사양을 역산으로 맞춰드릴게요.\n\n💡 실장의 한 줄 팁: 상담 예약 때 \"추석 세트\"라고만 말씀하셔도 저희가 역산 캘린더를 바로 그려드려요. 올해 일정표를 프린트해서 팀 회의에 쓰셔도 좋습니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#선물세트박스 #추석선물세트 #홍삼패키지 #건강기능식품박스 #싸바리박스 #패키지제작 #명절선물포장 #쇼핑백제작 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-shoppingbag","topic":"쇼핑백제작","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-21T09:00:00.000Z","kicker":"SEO · 「쇼핑백 제작」","headline":"쇼핑백 제작, 자동과 수동의 차이부터 손잡이·사이즈까지 — 브랜드 쇼핑백 완전 가이드","sub":"자동쇼핑백 vs 수동쇼핑백, 손잡이 종류, 박스와 톤 맞추기, 견적 포인트","dayLabel":"","captionNote":"자동쇼핑백 vs 수동쇼핑백, 손잡이 종류, 박스와 톤 맞추기, 견적 포인트","captionBody":"[3줄 요약]\n· 쇼핑백은 \"걸어다니는 광고판\" — 박스와 톤을 맞추면 브랜드 완성도가 확 올라가요.\n· 자동(기계) 쇼핑백은 대량·단가에 유리하고, 수동(수제) 쇼핑백은 소량·특수 사양에 유리해요.\n· 손잡이·종이·후가공 조합, 그리고 제품이 들어가는 실측 사이즈 확인이 견적의 핵심입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 매장에서 나온 손님이 들고 걷는 쇼핑백, 사실 브랜드 입장에선 돈 주고도 못 사는 광고예요. 거리에서, 지하철에서, 카페 테이블 위에서 계속 노출되니까요. 그런데 의외로 쇼핑백은 박스 다 만들고 나서 \"아 맞다, 쇼핑백!\" 하고 급하게 준비하는 경우가 많아요. 오늘은 후회 없는 쇼핑백 제작 가이드를 정리해 드릴게요.\n\n[자동 쇼핑백 vs 수동 쇼핑백, 뭐가 다른가요?]\n· 자동 쇼핑백: 기계로 접착·성형까지 하는 방식이에요. 수량이 많을수록 단가가 안정적이고 납기도 빨라요. 규격 사이즈 안에서 고르면 가장 경제적입니다.\n· 수동(수제) 쇼핑백: 사람 손으로 접고 붙여요. 두꺼운 종이, 특수지, 비규격 사이즈, 특별한 손잡이 같은 \"기계가 못 하는 사양\"이 전부 가능해요. 소량 프리미엄 쇼핑백은 대부분 수동으로 만듭니다.\n백화점 명품관 쇼핑백이 유독 단단하고 고급스러운 이유가 바로 수동 공정 + 두꺼운 지류 + 후가공 조합이에요.\n\n[손잡이 하나로 급이 달라져요]\n· 종이 트위스트: 가장 기본, 경제적이에요.\n· 리본(새틴·그로그랭): 손에 닿는 감촉이 부드러워 화장품·기프트에 인기예요.\n· 면끈·PP끈: 캐주얼하거나 무거운 제품에 좋아요.\n· 아일렛(금속 링) 마감: 구멍 둘레를 금속으로 잡아줘 오래 들어도 튼튼하고, 디테일이 살아요.\n\n[종이와 후가공 조합]\n쇼핑백 몸통은 보통 아트지나 수입지에 무광·유광 코팅을 하고, 로고에 금박·형압을 더해요. 박스와 같은 지류·같은 박 색으로 맞추면 세트 완성도가 확 올라갑니다. 바닥과 입구를 보강하는 속판을 넣으면 무거운 제품도 안심이에요.\n\n[사이즈, 실측이 전부예요]\n쇼핑백 실패의 90%는 사이즈예요. 박스가 들어가긴 하는데 꽉 껴서 안 예쁘거나, 반대로 헐렁해서 제품이 놀거나요. 저희는 실제 박스(또는 가제본)를 놓고 여유 폭을 계산해 도면을 잡아드려요. 박스와 쇼핑백을 같은 곳에서 만들면 이 과정이 한 번에 끝나는 것도 장점이죠.\n\n[견적 포인트]\n쇼핑백 견적은 ①종이 종류·평량 ②사이즈(비규격 여부) ③손잡이 종류 ④후가공(코팅·박·형압) ⑤수량으로 잡혀요. 박용 동판은 1회성 개발비라 박스와 로고 동판을 공유하면 비용이 절약되는 경우도 있어요. 이런 디테일까지 저희가 함께 계산해 드립니다.\n\n[이런 순서로 준비하세요]\n① 박스(제품) 실측 → ② 자동/수동 결정(수량·사양 기준) → ③ 종이·손잡이·후가공 선택 → ④ 가제본 확인 → ⑤ 본 제작. 박스와 세트로 기획하면 톤 맞추기·납기 관리가 훨씬 쉬워요. 선물세트 시즌엔 쇼핑백 물량도 같이 몰리니, 명절 준비하신다면 박스와 함께 미리 문의 주세요 :)\n\n[자주 묻는 질문]\nQ. 쇼핑백만 따로 주문해도 되나요? — 네, 됩니다. 다만 박스와 함께 만들면 지류 톤과 박 색을 맞추기 쉽고 동판 공유로 개발비도 아껴져요.\nQ. 수량이 적은데 수제로 하면 많이 비싼가요? — 소량에서는 자동과 수제의 단가 차이가 생각보다 크지 않아요. 대신 지류·손잡이 선택 폭이 훨씬 넓어서 프리미엄 브랜드는 소량 수제를 많이 선택하세요.\nQ. 명절 시즌에도 바로 되나요? — 쇼핑백도 8월부터 물량이 몰려요. 박스와 같은 일정으로 미리 잡아두시는 게 안전합니다.\n\n💡 실장의 한 줄 팁: 쇼핑백은 접힌 상태로 납품돼요. 매장 보관 공간이 좁다면 납품 단위를 나눠 받는 방법도 있으니 함께 계획해요. 들었을 때 어깨에 닿는 높이(끈 길이)까지 확인하면 완벽합니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#쇼핑백제작 #종이쇼핑백 #수제쇼핑백 #브랜드쇼핑백 #패키지제작 #금박인쇄 #고급쇼핑백 #선물포장 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-boxtypes","topic":"박스제작","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-23T09:00:00.000Z","kicker":"SEO · 「박스 제작」","headline":"박스 제작 처음이라면 — 단상자·합지박스·싸바리박스, 우리 제품엔 뭐가 맞을까?","sub":"세 가지 박스의 구조·비용·용도 비교와 예산별 선택 기준","dayLabel":"","captionNote":"세 가지 박스의 구조·비용·용도 비교와 예산별 선택 기준","captionBody":"[3줄 요약]\n· 박스는 크게 단상자(접지) → 합지박스 → 싸바리박스 순으로 견고함과 고급감이 올라가요.\n· 제품 무게·판매 채널·예산, 이 세 가지만 정리하면 우리 브랜드에 맞는 박스가 보입니다.\n· 어떤 박스든 목형·동판 개발비는 1회성이라, 장기 운영 계획과 함께 정하는 게 경제적이에요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) \"박스 만들고 싶은데 종류가 너무 많아서 뭐가 뭔지 모르겠어요.\" 처음 패키지를 준비하시는 분들이 제일 많이 하시는 말씀이에요. 오늘은 박스의 3대장 — 단상자, 합지박스, 싸바리박스를 한 번에 비교해 드릴게요. 이 글 하나면 상담 때 대화가 훨씬 빨라질 거예요.\n\n[1. 단상자 — 가볍고 경제적인 기본기]\n한 장의 종이(카드지)를 칼선대로 잘라 접어 만드는 상자예요. 화장품 단상자가 대표적이죠. 가볍고 단가가 낮고, 접은 상태로 납품돼 보관이 편해요. 인쇄와 후가공(금박·형압·부분UV)을 얹으면 충분히 고급스러워져서, 단품 판매 제품의 표준 패키지예요. 다만 종이 한 겹이라 무겁거나 충격에 약한 제품은 버거울 수 있어요.\n\n[2. 합지박스 — 튼튼함이 필요할 때]\n골판지나 두꺼운 판지에 인쇄지를 합지(겹붙임)해 만드는 상자예요. 단상자보다 훨씬 견고해서 무게가 있는 제품, 택배 배송이 잦은 제품에 좋아요. 겉에 인쇄지를 붙이기 때문에 디자인 표현도 자유롭고요. 비용은 단상자와 싸바리의 중간쯤. \"튼튼한데 예산은 아껴야 할 때\"의 현실적인 답이에요.\n\n[3. 싸바리박스 — 프리미엄의 기준]\n2~3mm 합지 뼈대에 인쇄된 수입지를 손으로 감싸 붙이는 최고급 방식이에요. 형태가 무너지지 않고 종이 질감이 그대로 살아서 화장품·홍삼·주류·VIP 선물세트의 표준이죠. 자석형·서랍형 같은 구조 변형, 트레이 내지 설계까지 더하면 \"간직하고 싶은 박스\"가 됩니다. 손 공정이라 단가와 납기(1~2주)는 가장 여유 있게 봐야 해요.\n\n[그래서 우리 제품엔 뭐가 맞을까요? — 기준 3가지]\n① 제품 무게·형태: 가볍다(크림·마스크팩)→단상자 / 무겁다(병·세트)→합지·싸바리\n② 판매 채널: 온라인 단품→단상자·합지 / 백화점·기프트→싸바리\n③ 예산과 수량: 개발비(목형·동판)는 어느 박스든 1회성이에요. 수량이 늘수록 개당 단가가 내려가니, 첫 발주 때 시즌 물량까지 계획하면 유리해요.\n\n[조합 전략도 있어요]\n실제 브랜드들은 하나만 쓰지 않아요. 단품은 단상자, 명절 세트는 싸바리, 배송용은 합지 — 이렇게 라인별로 나누죠. 같은 로고 동판과 지류 톤을 공유하면 개발비를 아끼면서 브랜드 통일감을 지킬 수 있어요. 이런 라인 설계가 저희 패키지 컨설팅의 단골 주제랍니다.\n\n[마무리]\n박스 선택이 어려운 건 당연해요 — 구조·소재·후가공·수량이 전부 엮여 있으니까요. 제품 사진과 대략적인 수량만 들고 오세요. 저희가 구조 설계(지기구조)부터 소재 제안, 원가 개선까지 상담으로 풀어드릴게요. 가제본 샘플로 직접 확인하고 결정하셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 처음인데 샘플부터 볼 수 있나요? — 네, 저희는 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요. 실물을 만져보고 결정하는 게 가장 정확해요.\nQ. 지금 단상자를 쓰는데 싸바리로 바꾸고 싶어요. — 기존 박스 실물을 가져오시면 같은 치수로 싸바리 전환 견적을 바로 잡아드려요. 내지 추가 여부에 따라 구성도 제안해 드리고요.\nQ. 세 종류를 섞어서 발주해도 되나요? — 물론이에요. 라인별로 다른 구조를 쓰는 게 오히려 정석이고, 한 공장에서 만들면 톤 관리가 쉬워요.\n\n💡 실장의 한 줄 팁: 고민될 땐 세 종류 샘플을 나란히 놓고 제품을 직접 넣어보세요. 저희 상담실엔 구조별 샘플이 준비돼 있어서, 30분이면 답이 나옵니다. 커피 한 잔 준비해 둘게요 — 실물을 만져보는 순간 \"아, 이거네\" 하실 거예요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#박스제작 #단상자 #합지박스 #싸바리박스 #패키지제작 #포장박스 #박스종류 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-foil","topic":"금박인쇄","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"SEO · 「금박인쇄」","headline":"금박인쇄의 모든 것 — 동판 원리부터 금·은·먹·홀로그램박 고르는 법까지","sub":"박이 앉는 원리(동판+열+압력), 박 색상 도감, 디자인 데이터 팁, 비용 구조","dayLabel":"","captionNote":"박이 앉는 원리(동판+열+압력), 박 색상 도감, 디자인 데이터 팁, 비용 구조","captionBody":"[3줄 요약]\n· 금박은 잉크가 아니라 \"박 필름\"을 동판으로 눌러 앉히는 공정이에요 — 그래서 금속광이 살아있어요.\n· 금·은·먹·적·청·홀로그램박까지 색상이 다양하고, 무광 종이와 만날 때 대비가 가장 아름다워요.\n· 동판은 로고 모양대로 1회 제작하는 개발비 — 박스·쇼핑백에 재사용하면 경제적입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 패키지 상담을 하다 보면 \"로고를 금색 잉크로 인쇄하면 안 되나요?\"라는 질문을 자주 받아요. 되긴 되는데, 결과물이 완전히 달라요. 금색 잉크는 \"금색 그림\"이고, 금박은 \"진짜 금속광\"이거든요. 오늘은 프리미엄 패키지의 상징, 박(포일) 인쇄를 제대로 알려드릴게요.\n\n[박이 앉는 원리 — 생각보다 아날로그예요]\n박 인쇄는 3가지가 만나서 완성돼요.\n① 동판: 로고·문양 모양대로 새긴 금속판이에요. 도장처럼 생겼죠.\n② 박 필름: 금·은 등 금속광 필름이에요.\n③ 열과 압력: 뜨거운 동판이 박 필름을 종이에 눌러 붙여요.\n도장을 찍듯 \"꾹\" 누르는 순간 종이에 금속광이 앉아요. 그래서 박은 살짝 눌린 자국과 함께 반짝임이 생기는데, 이 눌림이 오히려 수공예적인 고급감을 만들어요.\n\n[박 색상 도감 — 금박만 있는 게 아니에요]\n· 금박: 클래식의 왕. 홍삼·주류·명절 세트의 정석이에요. 유광금·무광금도 나뉘어요.\n· 은박: 모던하고 차가운 세련미. 화장품·테크 제품에 잘 어울려요.\n· 먹박: 검정 유광. \"블랙 온 블랙\" 조합으로 조용한 럭셔리를 만들어요.\n· 적박·청박·녹박: 브랜드 컬러가 뚜렷할 때 포인트로 써요.\n· 홀로그램박: 보는 각도마다 무지개빛. 한정판·굿즈·젊은 타깃에 반응이 좋아요.\n팁 하나 — 박은 무광 코팅된 어두운 종이 위에서 가장 극적으로 빛나요. 배경이 차분할수록 박이 주인공이 됩니다.\n\n[디자인 데이터, 이것만 지켜주세요]\n박 영역은 인쇄와 별도 공정이라 데이터에서 분리돼 있어야 해요.\n① 박 영역은 별도 레이어/별색으로 지정 ② 너무 가는 선(0.3mm 이하)은 박이 뭉개질 수 있어요 ③ 넓은 면적+가는 선이 섞이면 압력 균형이 어려우니 상담 필요 ④ 박과 인쇄를 딱 맞춰 겹치는 디자인은 오차 여유를 두는 게 안전해요. 저희가 파일 검토 단계에서 전부 확인해 드리니, 헷갈리면 일단 보내주셔도 됩니다.\n\n[비용은 어떻게 잡히나요?]\n박 비용 = 동판(개발비, 1회) + 박 작업비(면적·수량 비례)예요. 여기서 절약 포인트!\n· 동판은 같은 로고라면 박스·쇼핑백·리플렛에 재사용할 수 있어요.\n· 박 면적을 줄이고 위치를 영리하게 잡으면(로고+포인트 라인 정도) 비용 대비 효과가 가장 좋아요.\n· 설·추석 등 시즌 물량을 묶으면 동판 개발비가 한 번으로 끝나요.\n\n[박 + 다른 후가공 조합]\n박은 혼자보다 조합에서 완성돼요. 무광 코팅 + 금박(정석), 형압 + 박 동시(눌러 새기며 금속광까지 — 최고급 조합), 부분UV + 박(광의 층위가 생겨요). 저희는 특수인쇄 전 공정을 자체 진행해서, 이런 조합 설계를 가장 잘하는 게 강점이에요.\n\n[마무리]\n박 하나 제대로 앉히면 패키지의 급이 달라져요. 로고 파일만 보내주시면 어떤 박, 어떤 조합이 어울릴지 샘플과 함께 제안해 드릴게요. 가제본으로 박 광택을 직접 확인하고 결정하셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 박이 시간이 지나면 벗겨지지 않나요? — 제대로 앉힌 박은 일상 사용에서 벗겨지지 않아요. 코팅 위에 박을 올리는 순서, 압력 세팅 같은 공정 관리가 품질을 좌우하는데, 이게 특수인쇄 전문 공장의 차이예요.\nQ. 아주 작은 글씨도 박이 되나요? — 0.3mm 이하의 가는 획은 뭉개질 수 있어 디자인 조정을 권해요. 파일 검토 때 미리 잡아드립니다.\nQ. 박과 비슷한 효과를 더 저렴하게 내는 방법은요? — 금색 별색 인쇄+유광 부분코팅 조합이 차선책이에요. 다만 금속광의 깊이는 박이 압도적이라, 로고만이라도 박을 권해드려요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#금박인쇄 #금박 #은박 #홀로그램박 #먹박 #인쇄후가공 #패키지제작 #박스제작 #고급인쇄 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-structure","topic":"지기구조","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-26T09:00:00.000Z","kicker":"SEO · 「지기구조」","headline":"패키지의 설계도, 지기구조 이야기 — 좋은 박스는 목형에서 태어납니다","sub":"지기구조가 결정하는 것들(조립성·보호력·원가), 목형 제작, 실용신안 구조까지","dayLabel":"","captionNote":"지기구조가 결정하는 것들(조립성·보호력·원가), 목형 제작, 실용신안 구조까지","captionBody":"[3줄 요약]\n· 지기구조는 박스의 \"설계 도면\" — 어떻게 접히고 잠기고 버티는지를 결정해요.\n· 같은 크기여도 구조에 따라 종이 사용량·조립 시간·파손율이 달라져 원가가 바뀝니다.\n· 구조는 목형(칼틀)으로 구현돼요. 저희는 포장상자 구조 실용신안을 다수 보유한 구조 설계 전문이에요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 박스를 펼치면 나오는 납작한 전개도, 보신 적 있나요? 어디를 자르고 어디를 접을지 그려진 그 도면이 바로 \"지기구조\"예요. 겉디자인이 박스의 얼굴이라면 지기구조는 뼈대와 관절이죠. 오늘은 눈에 잘 안 보이지만 패키지의 성패를 가르는 구조 이야기를 해볼게요.\n\n[지기구조가 결정하는 것들]\n① 보호력: 제품이 흔들리는지, 눌림에 버티는지가 구조에서 정해져요.\n② 조립성: 포장 라인에서 1개 접는 데 몇 초 걸리느냐 — 물량이 크면 이게 인건비예요.\n③ 개봉 경험: 어디서 어떻게 열리는지가 언박싱의 첫인상을 만들어요.\n④ 원가: 전개도가 종이 원단에 몇 개 앉느냐(자리잡기 효율)에 따라 종이값이 달라져요.\n같은 크기의 박스도 구조를 바꾸면 종이 사용량이 줄거나, 조립이 빨라지거나, 택배 충격에 강해질 수 있어요. 그래서 저희는 \"구조가 곧 원가\"라고 말해요.\n\n[목형 — 구조를 현실로 만드는 틀]\n확정된 지기구조는 목형(칼틀)으로 제작돼요. 나무판에 칼날(자르는 선)과 오시날(접는 선)을 심은 틀로, 이 틀로 종이를 \"따내는\" 거예요. 목형은 최초 1회 개발비지만, 한번 만들면 같은 구조를 계속 재생산할 수 있어요. 구조를 자주 바꾸면 그때마다 목형비가 들기 때문에, 처음에 구조를 제대로 잡는 게 장기적으로 경제적입니다.\n\n[검증된 구조 vs 새로운 구조]\n맞뚜껑·십자조립·삼면접착 같은 검증된 구조는 안정적이고 빠르게 진행돼요. 반면 \"우리 제품만의 개봉 경험\"을 원하면 구조를 새로 설계하죠. 저희는 포장용 종이박스, 포장상자의 봉인구조, 이중구조 상자 등 포장상자 구조 관련 실용신안을 다수 등록해 온 구조 설계 전문이라, 새 구조도 특허 검토와 함께 안전하게 개발해 드려요.\n\n[이런 요청이 구조 설계 대상이에요]\n· \"뚜껑을 열면 제품이 살짝 올라오게 하고 싶어요\" → 리프트 구조\n· \"테이프 없이 봉인됐으면 좋겠어요\" → 봉인 구조(저희 실용신안 분야!)\n· \"택배에서 안 눌리게요\" → 이중벽·보강 구조\n· \"매장에서 그대로 진열되게요\" → POP·디스플레이 겸용 구조\n· \"포장 알바 없이 빨리 접히게요\" → 오토바닥·원터치 구조\n\n[구조 상담은 이렇게 진행돼요]\n제품 실물(또는 치수·무게)을 주시면 → 용도·물류 환경을 듣고 → 구조 2~3안을 제안 → 백상지 목업(형태 샘플)으로 만져보고 결정 → 목형 제작 → 본 생산. 구조가 확정되면 소재 제안(수입지·트레이·스폰지)과 생산성 검토·원가 개선까지 이어서 봐드려요. 이게 저희 \"패키지 컨설팅\"의 전체 그림이에요.\n\n[마무리]\n멋진 디자인은 눈을 사로잡지만, 좋은 구조는 브랜드의 손익과 고객 경험을 지켜요. 지금 쓰는 박스가 뭔가 불편하다면 — 접는 데 오래 걸리거나, 자주 파손되거나, 종이가 아깝게 남거나 — 구조 점검부터 받아보세요. 도면 없이 실물만 들고 오셔도 됩니다 :)\n\n[자주 묻는 질문]\nQ. 목형 비용이 아까운데 규격 구조로만 하면 안 되나요? — 됩니다! 검증된 규격 구조 + 사이즈 조정으로 시작하고, 브랜드가 커지면 전용 구조를 개발하는 단계적 접근을 많이 추천해요.\nQ. 구조 아이디어가 있는데 그림을 못 그려요. — 말로 설명해 주시면 저희가 백상지 목업으로 만들어 보여드려요. 만져보면서 다듬는 게 도면보다 빨라요.\nQ. 남의 박스 구조를 따라 해도 되나요? — 일반적인 구조는 괜찮지만 등록된 실용신안 구조는 침해가 될 수 있어요. 저희가 설계 단계에서 검토해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#지기구조 #목형 #박스설계 #패키지컨설팅 #박스제작 #패키지제작 #포장박스 #실용신안 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-estimate","topic":"패키지제작","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-27T09:00:00.000Z","kicker":"SEO · 「패키지 견적」","headline":"패키지 견적서 읽는 법 — 개발비·자재·후가공·수량, 어디서 아끼고 어디에 써야 할까","sub":"견적 구성 4요소, 수량별 단가의 비밀, 원가 절감 포인트 5가지","dayLabel":"","captionNote":"견적 구성 4요소, 수량별 단가의 비밀, 원가 절감 포인트 5가지","captionBody":"[3줄 요약]\n· 패키지 견적 = 개발비(목형·동판, 1회성) + 자재 + 인쇄·후가공 + 수량 효과, 이 4개의 조합이에요.\n· 수량이 2배가 돼도 가격이 2배가 되지 않는 이유 — 개발비와 준비 비용이 고정이기 때문이에요.\n· 무작정 깎기보다 \"어디에 쓰고 어디서 아낄지\"를 설계하는 게 진짜 원가 관리입니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 견적서를 처음 받아보신 담당자님들이 종종 물으세요. \"왜 500개랑 2,000개 개당 가격이 이렇게 달라요?\" \"개발비가 뭐예요?\" 오늘은 패키지 견적서를 해부해 드릴게요. 이 구조를 알면 예산 계획이 쉬워지고, 협상도 현명해져요.\n\n[견적의 4요소]\n① 개발비(1회성): 목형(칼틀)과 박용 동판 제작비예요. 첫 발주에만 들고, 재발주 때는 빠져요.\n② 자재비: 종이(카드지·합지·수입지), 내지(트레이·스폰지), 부자재(자석·리본·아일렛)예요.\n③ 공정비: 인쇄, 코팅, 박, 형압, 에폭시, 싸바리(손 공정), 조립… 공정 수만큼 올라가요.\n④ 수량: 기계를 세팅하고 돌리는 준비 비용이 고정이라, 수량이 늘수록 개당 단가가 내려가요.\n\n[수량별 단가의 비밀]\n예를 들어 목형+동판에 일정 비용이 들었다면, 500개를 만들면 개당 개발비 부담이 크지만 3,000개면 확 줄어요. 그래서 저희는 늘 여쭤봐요 — \"이 박스, 얼마나 오래 쓰실 계획이세요?\" 한 시즌용인지, 상시 운영용인지에 따라 최적 수량이 달라지거든요. 필요량보다 조금 더 주문하는 게 오히려 총비용이 낮아지는 경우도 많아요.\n\n[어디서 아끼고, 어디에 써야 할까]\n아껴도 티 안 나는 곳:\n· 박 면적 — 로고+포인트 라인이면 충분해요. 넓게 깐다고 2배 고급스러워지진 않아요.\n· 규격 사이즈 — 종이 원단에 전개도가 딱 맞게 앉으면 로스(버리는 종이)가 줄어요.\n· 구조 단순화 — 조립 단계 하나가 줄면 물량 전체의 인건비가 줄어요.\n쓰면 확 티 나는 곳:\n· 겉지 질감 — 손에 닿는 첫 감촉이라 투자 대비 효과가 가장 커요.\n· 형압 — 은은하지만 \"만지는 순간\" 급이 달라져요.\n· 내지 — 뚜껑을 연 순간의 정돈감. 선물세트라면 특히요.\n\n[견적서에서 꼭 확인할 것]\n① 개발비가 분리 표기됐는지(재발주 가격을 예측할 수 있어요) ② 납기일이 명시됐는지 ③ 배송비 포함 여부 ④ 색상·후가공 확인 방법(가제본? 인쇄 감리?) — 이 네 가지가 명확한 견적서가 좋은 견적서예요. 저희는 사양 확정 후 제작 비용과 예상 일정을 정확히 산출해 드리고, 생산성 검토·원가 개선 제안까지 함께 드립니다.\n\n[마무리]\n견적은 흥정이 아니라 설계예요. 예산을 먼저 말씀해 주시면 그 안에서 최대 효과가 나는 조합을 짜드리는 게 저희 일이에요. \"이 예산으로 이게 될까요?\" 하는 단계의 문의도 언제든 환영입니다 :)\n\n[자주 묻는 질문]\nQ. 견적만 받아봐도 되나요? — 물론이에요. 사양이 대략적이어도 범위 견적을 드리고, 확정 사양이 나오면 정확한 금액과 일정을 다시 드려요.\nQ. 타사 견적서를 가져가면 비교 설명해 주시나요? — 네, 항목별로 어디서 차이가 나는지 짚어드려요. 싼 견적에는 보통 이유(지류 등급, 후가공 생략, 검수 범위)가 있거든요.\nQ. 재발주 때는 얼마나 저렴해지나요? — 목형·동판 개발비가 빠지고 데이터 세팅이 끝나 있어, 같은 수량 기준으로 눈에 띄게 내려가요. 첫 견적서에 재발주 예상가도 함께 표기해 드립니다.\n\n💡 실장의 한 줄 팁: 견적 문의 때 ①제품 사진 ②대략 수량 ③희망 예산, 이 세 가지만 주시면 첫 회신이 빨라져요. 예산을 말하면 손해라는 걱정은 안 하셔도 돼요 — 예산 안에서 최선을 짜는 게 저희 일이니까요. 견적서 항목이 이해 안 되면 언제든 전화 주세요 — 한 줄 한 줄 같이 읽어드립니다. 아는 만큼 아끼는 게 견적이에요.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#패키지제작 #박스제작견적 #패키지견적 #박스제작 #원가절감 #목형 #동판 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-redginseng","topic":"홍삼패키지","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-29T09:00:00.000Z","kicker":"SEO · 「홍삼 패키지」","headline":"홍삼·건강기능식품 패키지 제작 — 신뢰를 파는 상자, 내지 설계가 반입니다","sub":"병·스틱·앰플 유형별 내지(트레이·스폰지) 설계, 프리미엄 마감, 세트 구성 노하우","dayLabel":"","captionNote":"병·스틱·앰플 유형별 내지(트레이·스폰지) 설계, 프리미엄 마감, 세트 구성 노하우","captionBody":"[3줄 요약]\n· 홍삼·건기식 패키지의 핵심은 \"신뢰감\" — 흔들리지 않는 내지와 묵직한 싸바리가 기본기예요.\n· 병·스틱·앰플 등 구성품 유형에 따라 트레이·스폰지·EVA 내지 설계가 완전히 달라져요.\n· 어르신 선물 수요가 많아 개봉 편의성(열기 쉬운 구조)까지 챙기면 완성도가 높아집니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 홍삼·건강기능식품은 \"내 몸에 들어가는 것\"이라 소비자가 패키지에서 신뢰를 읽어요. 상자가 얇고 가벼우면 내용물까지 가벼워 보이고, 병이 상자 안에서 달그락거리면 그 순간 프리미엄이 무너지죠. 저희가 수십 년 홍삼·흑삼·건기식 패키지를 만들며 쌓은 노하우를 정리해 드릴게요.\n\n[구성품 유형별 내지 설계]\n· 병(농축액·환): 무게가 있어서 병목까지 잡아주는 종이 트레이나 성형 내지가 필요해요. 병 어깨 높이에 맞춰 설계하면 뚜껑을 열었을 때 라벨이 정면으로 보여요.\n· 스틱(포): 30포·60포 등 개수에 맞춘 칸 배열이 핵심이에요. 3단·4단 배열로 \"가지런함\"을 연출하면 열자마자 정돈된 인상을 줘요.\n· 앰플·유리병: 파손 위험이 있어 스폰지나 EVA(탄성 폼)로 감싸요. 택배 물량이 많다면 필수예요.\n· 혼합 세트(병+스틱): 단 차이를 둔 2단 트레이나 칸막이 조합으로 풀어요. 구성이 복잡할수록 내지 설계가 실력이에요.\n\n[박스는 역시 싸바리가 정석]\n명절·효도 선물 수요가 큰 카테고리라 상하짝 싸바리가 표준이에요. 딥레드·딥브라운·골드 톤에 금박 로고, 형압 라인 — 이 조합이 \"몸에 좋은 프리미엄\"의 문법이죠. 요즘은 젊은 타깃 브랜드들이 화이트+은박, 크라프트+먹박 같은 모던한 변주도 많이 하세요. 브랜드 방향에 맞춰 제안해 드려요.\n\n[놓치기 쉬운 포인트 — 개봉 편의성]\n홍삼 세트는 받는 분이 어르신인 경우가 많아요. 뚜껑이 너무 꽉 맞으면 열기 힘들고, 너무 헐거우면 고급감이 떨어져요. 저희는 뚜껑 맞춤(끼움 정도)을 가제본 단계에서 직접 열어보며 조정해 드려요. 봉인 구조(테이프 없이 잠기는 구조)에 대한 실용신안도 보유하고 있어서, 개봉 경험까지 설계할 수 있습니다.\n\n[규정 표기 공간도 미리 계획하세요]\n건강기능식품은 표시 사항(인증마크, 영양·기능 정보, 섭취량 등)이 들어갈 공간이 필요해요. 디자인 다 끝나고 표기 넣을 자리가 없어 다시 고치는 경우가 정말 많아요. 파일 검토 때 표기 영역부터 확인해 드리니, 규정 표기 목록을 함께 주시면 좋아요.\n\n[세트 완성은 부자재까지]\n박스만큼 중요한 게 쇼핑백과 보자기예요. 같은 지류 톤, 같은 박 색으로 맞추면 매장 진열부터 선물하는 순간까지 톤이 이어져요. 동판을 공유하면 부자재 개발비도 아낄 수 있고요.\n\n[마무리]\n홍삼·건기식 패키지는 저희가 가장 오래, 가장 많이 만들어 온 분야예요. 구성품 리스트(병 몇 개, 스틱 몇 포)만 보내주시면 내지 설계안과 함께 견적을 드릴게요. 추석 시즌은 8월부터 몰리니, 준비 중이시라면 이달에 시작하시는 걸 추천드려요 :)\n\n[자주 묻는 질문]\nQ. 내지만 따로 제작할 수 있나요? — 네, 기존 박스에 맞춘 트레이·스폰지 내지만 제작하는 것도 가능해요. 구성품이 바뀌었을 때 박스는 그대로 두고 내지만 바꾸면 비용을 크게 아껴요.\nQ. 식품이 직접 닿아도 되는 재질인가요? — 내용물이 직접 닿는 구성이라면 접촉 안전 소재로 설계해요. 상담 때 구성품의 포장 상태(개별 포장 여부)를 알려주시면 정확히 제안해 드려요.\nQ. 소량 시제품 세트도 되나요? — 네, 낱개 샘플 제작이 가능하니 크라우드펀딩·시장 테스트용 소량 세트도 부담 없이 시작하세요.\n\n💡 실장의 한 줄 팁: 시즌 리뉴얼 때 박스는 유지하고 띠지(슬리브)만 바꾸는 브랜드도 많아요. 개발비 없이 새 시즌 느낌을 내는 가성비 전략이랍니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#홍삼패키지 #건강기능식품박스 #선물세트박스 #싸바리박스 #패키지제작 #내지설계 #트레이 #명절선물세트 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-liquor","topic":"주류패키지","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-30T09:00:00.000Z","kicker":"SEO · 「주류 패키지」","headline":"주류·VIP 패키지 제작 — 병 무게를 견디며 품격을 만드는 법","sub":"전통주·위스키 선물박스의 구조 보강, 병 고정 내지, 블랙&골드 마감 공식","dayLabel":"","captionNote":"전통주·위스키 선물박스의 구조 보강, 병 고정 내지, 블랙&골드 마감 공식","captionBody":"[3줄 요약]\n· 주류 패키지의 1순위는 \"무게\" — 병을 견디는 구조 보강과 병 고정 내지가 기본이에요.\n· 프리미엄 마감의 정석은 딥컬러+금박(클래식) 또는 블랙+먹박(모던), 두 공식이에요.\n· VIP·한정판 패키지는 수량이 적어도 낱개 샘플부터 함께 설계해 드립니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 전통주 열풍에 위스키 선물 문화까지 — 요즘 주류 패키지 문의가 부쩍 늘었어요. 그런데 주류는 패키지 중에서도 난이도가 높은 편이에요. 유리병은 무겁고 깨지기 쉬운데, 소비자 기대치는 가장 높은 카테고리거든요. 오늘은 병을 안전하게, 그리고 품격 있게 모시는 법을 알려드릴게요.\n\n[1순위 — 무게를 견디는 구조]\n750ml 유리병 하나가 1kg를 넘는 경우가 많아요. 2병 세트면 부자재까지 3kg에 가깝죠.\n· 바닥 보강: 싸바리 합지 두께를 올리거나 이중 바닥으로 무게를 받아요.\n· 손잡이 하중: 쇼핑백까지 세트라면 손잡이·접합부 강도를 병 무게 기준으로 설계해요.\n· 이중벽 구조: 택배 배송이 있다면 외박스와 완충 구조까지 함께 계획해요. 저희는 이중구조 상자 관련 실용신안 경험이 있어 이 부분이 강점이에요.\n\n[2순위 — 병이 놀지 않게, 내지 설계]\n병은 \"세워서 꼭 맞게\"가 원칙이에요. 병 어깨와 바닥을 함께 잡는 성형 트레이, 목 부분을 고정하는 넥홀더, 2병 세트의 칸막이까지 — 병 실물을 놓고 설계해요. 잔이나 오프너 같은 구성품이 있다면 각자의 자리를 만들어 \"열었을 때의 정돈감\"까지 연출합니다.\n\n[3순위 — 품격의 마감 공식]\n주류·VIP 패키지엔 두 가지 검증된 공식이 있어요.\n· 클래식 럭셔리: 딥그린·버건디·네이비 수입지 + 금박 로고 + 형압. 전통주·위스키의 정석이에요.\n· 모던 럭셔리: 블랙 무광 + 먹박(블랙 온 블랙) + 부분UV 포인트. 조용한데 강한, 요즘 한정판 문법이죠.\n여기에 자석형 개봉이나 서랍형 구조를 더하면 \"선물 받는 순간\"이 하나의 경험이 돼요.\n\n[VIP·한정판은 소량이 기본이에요]\n\"300개만 만들 건데 될까요?\" — 됩니다. VIP 답례품, 한정판 굿즈, 기업 명절 선물은 원래 소량이에요. 저희는 최소수량을 조율해 드리고, 본 제작 전 낱개 완제품 샘플로 실물을 확인시켜 드려요. 수량이 적을수록 개발비 비중이 커지니, 동판·목형을 아끼는 설계(기존 규격 활용, 박 면적 최적화)로 균형을 잡아드립니다.\n\n[일정 팁]\n주류 선물 수요는 추석·연말에 몰려요. 특히 연말 VIP 패키지는 11월이면 늦어요 — 구조 보강과 내지 설계에 시간이 들거든요. 시즌 두 달 전 상담이 가장 여유롭습니다.\n\n[마무리]\n좋은 술은 병을 여는 순간이 아니라 상자를 여는 순간부터 시작돼요. 병 실물(또는 도면)만 보내주시면 구조 보강안과 내지 설계, 마감 공식까지 제안해 드릴게요. 화장품·홍삼·주류 — 프리미엄 패키지가 필요한 모든 순간, 동성특수인쇄가 함께합니다 :)\n\n[자주 묻는 질문]\nQ. 병 도면이 없는데 실물만 보내도 되나요? — 네, 병 실물이 가장 정확해요. 실측해서 내지와 구조를 설계해 드립니다.\nQ. 2병+잔 2개 같은 복합 구성도 되나요? — 됩니다. 구성품별 자리를 나누는 내지 설계가 저희 전문이에요. 무게 배분까지 계산해 손잡이 하중을 잡아요.\nQ. 수출용인데 항공 운송을 견딜까요? — 운송 const REPO = DATA.repo;

// ── 운영 기간 선택 (전역 상태) ──
let period = { key:'all', from:null, to:null };
function periodRange(){
  if(period.key==='all') return null;
  const now=new Date(); let from,to;
  if(period.key==='7d'){ to=now; from=new Date(now.getTime()-6*864e5); }
  else if(period.key==='14d'){ to=now; from=new Date(now.getTime()-13*864e5); }
  else if(period.key==='30d'){ to=now; from=new Date(now.getTime()-29*864e5); }
  else if(period.key==='month'){ from=new Date(now.getFullYear(),now.getMonth(),1); to=now; }
  else if(period.key==='prev'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=new Date(now.getFullYear(),now.getMonth(),0); }
  else if(period.key==='custom'){
    if(!period.from&&!period.to) return null;
    from=period.from?new Date(period.from):new Date(0);
    to=period.to?new Date(period.to):now;
  } else return null;
  const f=new Date(from); f.setHours(0,0,0,0);
  const t=new Date(to); t.setHours(23,59,59,999);
  return [f.getTime(), t.getTime()];
}
function inPeriod(s){ const r=periodRange(); if(!r) return true; if(!s) return false; const t=new Date(s).getTime(); return t>=r[0]&&t<=r[1]; }
function periodLabel(){
  const names={all:'전체 기간','7d':'최근 7일','14d':'최근 14일','30d':'최근 30일',month:'이번 달',prev:'지난 달',custom:'직접 선택'};
  const r=periodRange();
  const d=x=>new Date(x).toISOString().slice(0,10);
  return names[period.key]+(r?' ('+d(r[0])+' ~ '+d(r[1])+')':'');
}
function periodBar(){
  const b=(k,l)=>'<button class="pbtn'+(period.key===k?' on':'')+'" onclick="setPeriod(\''+k+'\')">'+l+'</button>';

}

function sparkline(arr){
  if(!arr||arr.length<2) return '';
  const w=160,h=34,mx=Math.max(...arr,1),mn=Math.min(...arr,0);
  const dx=w/(arr.length-1);
  const pts=arr.map((v,i)=>[i*dx,h-((v-mn)/(mx-mn||1))*(h-6)-3]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return '<svg class="spark" width="'+w+'" height="'+h+'"><path d="'+d+'" fill="none" stroke="#2b6fff" stroke-width="2"/></svg>';
}

function plainPostText(it){
  let n=0;
  return String(it.captionBody||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img){ n++; return '\n[📷 이미지'+n+' 삽입]\n'; }
    if(t.startsWith('## ')) return '\n■ '+t.slice(3);
    if(t.startsWith('# ')) return t.slice(2);
    if(t==='>'||t.startsWith('> ')) return t.replace(/^>\s?/,'');
    return line.replace(/\*\*([^*]+)\*\*/g,'$1');
  }).join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function flash(id,msg){ const b=document.getElementById(id); if(b){const o=b.textContent;b.textContent=msg;setTimeout(()=>b.textContent=o,1500);} }

function mdInline(x){ return esc(x).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function fmtCaption(s){
  return String(s||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img) return '<img class="md-img" src="'+esc(img[2])+'" alt="'+esc(img[1])+'" loading="lazy"/>';
    if(t.startsWith('## ')) return '<h4 class="md-h">'+mdInline(t.slice(3))+'</h4>';
    if(t.startsWith('# ')) return '<h3 class="md-h1">'+mdInline(t.slice(2))+'</h3>';
    if(t==='>'||t.startsWith('> ')) return '<div class="md-quote">'+mdInline(t.replace(/^>\s?/,''))+'</div>';
    if(t.indexOf('🔖')===0) return '<div class="md-tags">'+esc(t)+'</div>';
    if(/^\[.+\]$/.test(t)) return '<div class="md-tag">'+esc(t)+'</div>';
    if(t==='---'||t==='') return '<div class="md-sp"></div>';
    return '<div>'+mdInline(line)+'</div>';
  }).join('');
}

  const cards=links.map(l=>
    '<a href="'+esc(l.url)+'" target="_blank" rel="noopener" style="flex:1 1 200px;min-width:180px;text-decoration:none;border-radius:14px;padding:16px 18px;border:1px solid '+chBorder(l.key)+';background:'+chGrad(l.key)+';display:block">'+
    '<div style="font-weight:800;font-size:18px;color:#14171d;margin-bottom:4px">'+l.icon+' '+esc(l.label)+'</div>'+
    '<div style="font-size:13px;color:#4a5264;opacity:.9">'+esc(l.sub)+'</div></a>').join('');
  return '<div class="panel"><div class="sect-h" style="margin:0 0 10px"><h3>🔗 채널 바로가기</h3><span class="muted">클릭하면 각 채널 관리로 이동</span></div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+cards+'</div></div>';
}
function overview(client){
  let h=tokenBanner(client);
  h+=setupPanel();
  h+=channelLinksPanel(client);
  h+=weeklyPanel(client);
  h+=periodBar();
  h+='<div class="kpis">'+
    kpi(client.totalCycles,'총 사이클')+
    kpi(client.totalPublished,'총 발행')+
    kpi(client.heldCount,'승인 대기',client.heldCount>0)+
    kpi('v'+client.designVersion,'디자인 진화')+'</div>';
  h+=learningPanel(client);
  h+='<div class="panel"><h3>채널별 요약</h3><table><tr><th>채널</th><th>상태</th><th>발행</th><th>대기</th><th>평균 참여율</th><th>수정요청</th></tr>'+
    client.channels.map(c=>{const lab=(DATA.channels.find(x=>x.key===c.key)||{});
      const iss=channelIssues(c.key); const openN=iss.filter(x=>x.state!=='closed').length;
      const reqCell=iss.length?(openN?'<span class="badge b-wait">🛠 처리중 '+openN+'</span>':'<span class="badge b-ok">✅ 완료 '+iss.length+'</span>'):'<span class="muted">-</span>';
      return '<tr><td>'+lab.icon+' '+lab.label+'</td><td>'+(c.active?'<span class="badge b-ok">연결</span>':'<span class="badge b-hold">미연결</span>')+'</td><td>'+c.stats.publishedCount+'</td><td>'+c.stats.pendingCount+'</td><td>'+pct(c.stats.avgEngagement)+' '+tIcon(c.stats.trend)+'</td><td>'+reqCell+'</td></tr>';}).join('')+'</table></div>';
  // 발행 전 콘텐츠 기획안 — 메인에는 발행 전(예정·수동대기)만 보여준다
  const plan=client.planCards||[];
  const pre=plan.filter(p=>p.status!=='published');
  const fbTitle='['+client.name+'] 기획안 전체 피드백';
  const fbBody='이번 달 기획안에 대한 의견/수정사항을 적어주세요.\n\n';
  const mon=new Date(DATA.generatedAt).getMonth()+1;
  h+='<div class="sect-h"><h2>🕓 '+mon+'월 발행 전 콘텐츠 ('+pre.length+')</h2><a class="btn fb" href="'+issue(fbTitle,fbBody)+'" target="_blank">✏️ 기획안 피드백</a></div>';
  if(!pre.length){ h+='<div class="empty">발행 전 콘텐츠가 없습니다. 다음 사이클에 자동 생성됩니다.</div>'; }
  else {
    for(const chDef of DATA.channels){
      const items=pre.filter(p=>(p.channels||[]).includes(chDef.key));
      if(!items.length) continue;
      const lab=chDef.icon+' '+chDef.label;
      h+='<div class="chgrp"><div class="chgrp-h">'+lab+' <span class="muted">'+items.length+'건 · '+esc((items[0].format)||'')+'</span></div>'+
         '<div class="cards">'+items.map(p=>planCard(client,chDef.label,p)).join('')+'</div></div>';
    }
  }
  // 선택한 기간의 발행 게시물 (기획 발행분 + 사이클 발행분)
  const planPub=plan.filter(p=>p.status==='published'&&inPeriod(p.publishedAt||p.scheduledFor))
    .sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));
  const recent=[].concat(...client.channels.map(c=>c.published)).filter(p=>inPeriod(p.time))
    .sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,12);
  h+='<div class="sect-h"><h2>✅ 발행된 게시물 · '+periodLabel()+' ('+(planPub.length+recent.length)+')</h2></div>';
  const pubCards=planPub.map(p=>{
    const chDef=DATA.channels.find(x=>x.key===((p.channels||[])[0]))||{label:''};
    return planCard(client,chDef.label,p);
  }).concat(recent.map(p=>publishedCard(p,'<span class="badge b-ok">발행</span>')));
  h+= pubCards.length?'<div class="cards">'+pubCards.join('')+'</div>':'<div class="empty">이 기간에 발행된 게시물이 없습니다.</div>';
  // 경쟁사
  h+='<div class="panel" style="margin-top:16px"><h3>벤치마킹 경쟁사</h3><div>'+(client.competitors.length?client.competitors.map(x=>'<span class="tag">@'+esc(x)+'</span>').join(''):'<span class="muted">미설정</span>')+'</div></div>';
  return h;
}
function kpi(v,l,accent){return '<div class="kpi"><div class="v'+(accent?' accent':'')+'">'+v+'</div><div class="l">'+l+'</div></div>';}
function renderClients(){
  document.getElementById('clients').innerHTML = DATA.clients.length>1 ? DATA.clients.map((c,i)=>'<button class="cbtn'+(i===ci?' on':'')+'" onclick="setClient('+i+')">'+esc(c.name)+'</button>').join('') : '';
}
function renderTabs(){
  const c=DATA.clients[ci];
  const tabs=[{key:'all',label:'전체',icon:'🏠',active:true}]
    .concat(DATA.channels.map(ch=>{const cc=c.channels.find(x=>x.key===ch.key);return {key:ch.key,label:ch.label,icon:ch.icon,active:cc&&cc.active};}))
    .concat([{key:'guide',label:'지침',icon:'🧭',active:true,noDot:true}]);
  document.getElementById('tabs').innerHTML = tabs.map(t=>{
    // 수정요청 진행상황 아이콘 — 🛠 처리중 n건 / ✅ 전부 처리완료
    let req='';
    if(t.key!=='all'){
      const iss=channelIssues(t.key);
      const openN=iss.filter(x=>x.state!=='closed').length;
      req = openN ? '<span class="treq open" title="수정요청 처리중 '+openN+'건">🛠'+openN+'</span>'
          : (iss.length ? '<span class="treq done" title="수정요청 전부 처리완료">✅</span>' : '');
    }
    return '<button class="tab'+(t.key===ch?' on':'')+'" onclick="setCh(\''+t.key+'\')">'+t.icon+' '+t.label+(t.key!=='all'&&!t.noDot?'<span class="dot '+(t.active?'live':'off')+'"></span>':'')+req+'</button>';
  }).join('');
}
function renderView(){
  const c=DATA.clients[ci];
  document.getElementById('view').innerHTML = ch==='all'?overview(c):(ch==='guide'?guideView(c):channelDetail(c,c.channels.find(x=>x.key===ch)));
  document.getElementById('gen').textContent = ftime(DATA.generatedAt)+' (UTC)';
}
function setClient(i){ci=i;ch='all';renderClients();renderTabs();renderView();window.scrollTo(0,0);}
function setCh(k){ch=k;renderTabs();renderView();window.scrollTo(0,0);}
try {
  renderClients(); renderTabs(); renderView(); loadIssues();
} catch (e) {
  var v = document.getElementById('view');
  if (v) v.innerHTML = '<div style="padding:24px;line-height:1.7;color:#b91c1c">표시 중 오류: '
    + ((e && e.message) || e)
    + '<br><br><button onclick="location.reload(true)" style="padding:10px 16px;border-radius:8px;border:0;background:#2b6fff;color:#fff;font-size:15px">새로고침</button></div>';
}
</script>
</body>
</html>

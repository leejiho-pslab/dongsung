<title>pslab 콘텐츠 관제실</title>
<style>
:root{color-scheme:light}*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:#ffffff;color:#14171d}
a{color:#1d6ae5}
header{padding:16px 22px;border-bottom:1px solid #e4e8f0;background:#ffffff;position:sticky;top:0;z-index:5}
.brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.sub{color:#6a7284;font-size:12px;margin-top:3px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.clients{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.cbtn{background:#f2f4f8;border:1px solid #dfe4ec;color:#3a4254;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.cbtn.on{background:#2b6fff;border-color:#2b6fff;color:#fff}
.tabs{display:flex;gap:4px;flex-wrap:wrap;padding:12px 22px 0;border-bottom:1px solid #e4e8f0;background:#ffffff;position:sticky;top:58px;z-index:4}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#6a7284;padding:8px 12px;cursor:pointer;font-size:14px}
.tab.on{color:#14171d;border-bottom-color:#2b6fff;font-weight:600}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:5px;vertical-align:middle}
.dot.live{background:#22c55e}.dot.off{background:#c6ccd8}
.treq{font-size:10px;border-radius:10px;padding:1px 6px;margin-left:4px;vertical-align:middle;font-weight:700}
.treq.open{background:#fdf3e0;color:#b45309}
.treq.done{background:#e4f7ea;color:#15803d}
main{padding:18px 22px;max-width:1180px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#f7f9fc;border:1px solid #e4e8f0;border-radius:12px;padding:12px 14px}
.kpi .v{font-size:22px;font-weight:700}.kpi .l{color:#6a7284;font-size:12px;margin-top:2px}
.kpi .v.accent{color:#d97706}
.panel{background:#ffffff;border:1px solid #e4e8f0;border-radius:12px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(20,24,40,.04)}
.panel h3{margin:0 0 10px;font-size:15px}
.sect-h{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px}
.sect-h h2{font-size:16px;margin:0}
.btn{background:#f2f4f8;border:1px solid #dfe4ec;color:#3a4254;padding:6px 11px;border-radius:8px;font-size:12px;text-decoration:none;cursor:pointer}
.btn.fb{background:#f6effc;border-color:#d9c2ee;color:#7a35b8}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:#ffffff;border:1px solid #e4e8f0;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(20,24,40,.04)}
.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eef1f6;display:block}
.thumb.noimg{display:flex;align-items:center;justify-content:center;color:#9aa2b2;font-size:13px}
.cbody{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:6px}
.ctop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.ctop strong{font-size:13px}
.muted{color:#6a7284;font-size:11px}
.cap{color:#4a5264;font-size:12px;line-height:1.4;max-height:3.6em;overflow:hidden}
.met{display:flex;gap:10px;font-size:11px;color:#5a6274;margin-top:auto}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-ok{background:#e4f7ea;color:#15803d}.b-wait{background:#fdf3e0;color:#b45309}.b-plan{background:#e7effc;color:#2b5fd0}.b-hold{background:#fdeaea;color:#dc2626}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e9edf3}
th{color:#6a7284;font-weight:600;font-size:12px}
.grade{display:inline-flex;align-items:center;justify-content:center;min-width:108px;padding:10px 16px;border-radius:12px;font-weight:800;font-size:18px}
.bar{height:7px;border-radius:4px;background:#e9edf3;overflow:hidden}.bar>i{display:block;height:100%;background:#2b6fff}
.plan-pill{font-size:11px;color:#5a6274}
.spark{display:block}
.empty{color:#8a92a4;padding:18px;text-align:center;font-size:13px}
.tag{display:inline-block;background:#f2f4f8;border:1px solid #e0e5ee;border-radius:6px;padding:2px 7px;font-size:11px;color:#5a6274;margin:2px 2px 0 0}
footer{text-align:center;color:#9aa2b2;font-size:11px;padding:22px}
.card.clk{cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}
.card.clk:hover{transform:translateY(-3px);border-color:#b9c4d8;box-shadow:0 6px 16px rgba(20,24,40,.10)}
.b-var{font-weight:600}.v-A{background:#fdf0e4;color:#c2570f}.v-B{background:#e2f6f4;color:#0f766e}.v-C{background:#fdf6e0;color:#a16207}

.modal.on{display:flex}
.mwrap{position:relative;background:#ffffff;border:1px solid #e4e8f0;border-radius:16px;max-width:920px;width:100%;padding:22px}
.mx{position:absolute;top:14px;right:14px;background:#f2f4f8;border:1px solid #dfe4ec;color:#3a4254;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px}
#mbody h2{font-size:23px}
#mbody .kick{color:#c2570f;font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.carou{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 2px 12px;-webkit-overflow-scrolling:touch}
.carou .slide{position:relative;flex:0 0 auto;scroll-snap-align:center}
.carou .slide img{height:520px;width:auto;border-radius:14px;display:block;background:#eef1f6;border:1px solid #e4e8f0}
.carou .snum{position:absolute;top:10px;right:10px;background:rgba(8,10,14,.7);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px}
.carou::-webkit-scrollbar{height:8px}.carou::-webkit-scrollbar-thumb{background:#cdd4e0;border-radius:8px}
.capbox{background:#f7f9fc;border:1px solid #e4e8f0;border-radius:12px;padding:14px 16px}
.caphd{color:#6a7284;font-size:12px;font-weight:600;margin-bottom:8px}
.mcap{white-space:normal;line-height:1.75;font-size:15px;color:#2a3040}
.chgrp{margin:10px 0 18px}
.chgrp-h{font-size:14px;font-weight:700;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid #e9edf3}
.md-h1{font-size:19px;margin:10px 0 8px;font-weight:800}.md-h{font-size:15px;color:#b45309;margin:14px 0 4px;font-weight:700}

.md-img{display:block;width:100%;border-radius:10px;margin:12px 0;border:1px solid #e4e8f0}
.mcap b{color:#000}

.pbtn{background:#f2f4f8;border:1px solid #dfe4ec;color:#3a4254;padding:5px 11px;border-radius:20px;cursor:pointer;font-size:12px}
.pbtn.on{background:#14171d;border-color:#14171d;color:#fff}
.pbar-c{font-size:12px;color:#6a7284;display:inline-flex;align-items:center;gap:5px;margin-left:6px}
.pbar input[type=date]{border:1px solid #dfe4ec;border-radius:7px;padding:4px 6px;font-size:12px;color:#3a4254;background:#fff}
.reqta{width:100%;border:1px solid #dfe4ec;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:#14171d;background:#fff;resize:vertical}
.reqta:focus{outline:2px solid #2b6fff33;border-color:#2b6fff}
@media(max-width:720px){.carou .slide img{height:60vh}}
</style>

은 것들을 정리해 드릴게요.\n\n[싸바리박스가 뭔가요?]\n쉽게 말해 \"단단한 뼈대에 좋은 옷을 입힌 상자\"예요. 2~3mm 두께의 합지(보드지)로 몸통을 만들고, 그 위에 인쇄된 수입지나 특수지를 한 장 한 장 감싸 붙여요(이 \"싸 바르는\" 공정에서 이름이 왔어요). 일반 단상자와 달리 형태가 무너지지 않고, 종이 특유의 질감과 색이 그대로 살아서 명품 패키지의 표준처럼 쓰입니다.\n\n[형태도 생각보다 다양해요]\n· 상하짝(뚜껑+몸통): 가장 클래식한 형태. 홍삼·건강기능식품 선물세트의 기본이에요.\n· 자석형: 뚜껑에 자석을 심어 \"탁\" 하고 닫혀요. 화장품·VIP 기프트에서 인기가 많아요.\n· 양문형·서랍형: 여는 동작 자체가 특별해져서 언박싱 경험을 설계할 때 좋아요.\n· 내지(트레이) 구성: 종이 트레이, 스폰지, EVA 등으로 제품을 딱 맞게 앉혀요. 병·앰플처럼 흔들리면 안 되는 제품은 내지 설계가 반이에요.\n\n[여기에 특수인쇄를 더하면]\n싸바리의 겉지 위에 금박·은박·홀로그램박으로 로고를 앉히거나, 형압(양각·음각)으로 눌러 새기고, 부분 실크·에폭시로 포인트를 주면 같은 구조라도 완성도가 완전히 달라져요. 저희는 특수인쇄와 패키지 제조를 한 공장에서 원스톱으로 진행하기 때문에, 구조와 후가공을 처음부터 같이 설계해 드립니다.\n\n[견적은 어떻게 잡히나요?]\n브랜드 담당자님들이 가장 궁금해하시는 부분이죠. 싸바리 견적은 크게 네 가지로 구성돼요.\n1. 개발비: 목형(칼틀)과 박용 동판 제작비 — 최초 1회만 들어가요.\n2. 자재: 합지 두께, 겉지 종류(수입지냐 일반지냐)에 따라 달라져요.\n3. 후가공: 박·형압·에폭시 등 공정이 늘수록 올라가요.\n4. 수량: 개발비가 고정이라, 수량이 늘수록 개당 단가는 뚝 떨어집니다.\n그래서 같은 박스도 500개와 3,000개의 개당 가격이 크게 달라요. 저희는 생산성 검토와 원가 개선까지 컨설팅해 드리니, 예산을 먼저 말씀해 주시면 그 안에서 가장 좋은 조합을 찾아드려요.\n\n[납기는 얼마나 걸리나요?]\n싸바리는 손이 많이 가는 공정이라 보통 1~2주를 보셔야 해요(사양에 따라 표지바리 1~3주, 조립가공 패키지는 2~4주). 여기에 디자인 확정, 가제본 샘플 확인 시간까지 더하면 실제로는 한 달 가까이 잡는 게 안전합니다. 명절 선물세트처럼 날짜가 정해진 프로젝트라면 꼭 역산해서 미리 문의 주세요.\n\n[샘플 없이 대량 제작, 불안하지 않으세요?]\n저희는 본 제작 전에 가제본(실물 샘플)으로 색상과 후가공 느낌을 확인받고, 인쇄 단계에서는 고객이 직접 공장에서 색을 보는 인쇄 감리도 진행해요. 포장상자 구조 관련 실용신안도 다수 등록해 둔 만큼, 구조 설계부터 검수까지 믿고 맡기실 수 있게 프로세스로 증명하겠습니다 :)\n\n[자주 묻는 질문]\nQ. 소량도 가능한가요? — 네, 최소수량은 조율 가능하고 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요. 소량 프리미엄 세트, 시제품 검증용으로도 많이 찾으세요.\nQ. 겉지는 어떻게 고르나요? — 브랜드 무드가 차분하면 무광 수입지, 화사하면 펄지, 내추럴하면 크라프트 계열을 추천해요. 실물 지류 샘플을 보고 만져보면서 고르시는 게 제일 정확해서, 상담 오시면 종이부터 같이 봅니다.\nQ. 디자인이 아직 없는데요? — 구조(지기구조)와 사양을 먼저 잡고 디자인을 입히는 순서도 가능해요. 패키지디자인 연구·개발 문의도 전문가가 직접 상담해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): [네이버 지도]\n· 홈페이지: https://dongsp5771.imweb.me\n· 문의/상담: [연락처]\n\n#싸바리박스 #패키지제작 #박스제작 #고급박스 #선물세트박스 #화장품박스 #합지박스 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"test-ig-ssabari","topic":"싸바리박스","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-16T09:00:00.000Z","kicker":"캐러셀 · 후킹","headline":"명품 박스, *뜯어보면* 나오는 것","sub":"싸바리박스 해부 — 2mm 합지 뼈대와 수입지 옷","dayLabel":"","captionNote":"싸바리박스 해부 — 2mm 합지 뼈대와 수입지 옷","captionBody":"백화점 선물세트 상자, 왜 못 버리고 화장대에 두게 될까요? 🎁\n뜯어보면 답이 나와요 — 그게 바로 싸바리박스예요 🔍\n\n2~3mm 합지 뼈대에 수입지를 손으로 감싸 붙이고,\n금박·형압으로 로고를 앉히고, 내지로 제품을 딱 맞게 잡아주는 것까지.\n\"받는 순간의 무게감\"은 전부 설계된 결과랍니다 😌\n\n저희는 구조 설계(지기구조)부터 특수인쇄·후가공까지 한 공장에서 원스톱으로 해요.\n포장상자 구조 실용신안도 다수 보유! 🏅\n\n📌 우리 브랜드에 맞는 구조가 궁금하면 DM 주세요. 가제본 샘플로 먼저 확인시켜 드려요.\n\n#싸바리박스 #패키지제작 #박스제작 #화장품박스 #선물세트박스 #언박싱 #패키지디자인 #브랜딩 #동성특수인쇄 #고급박스","variant":"A","status":"planned"},{"id":"test-blog-cosmetic","topic":"화장품박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"SEO · 핵심키워드 「화장품박스 / 단상자」","headline":"화장품 박스 제작, 단상자 구조와 후가공 조합이 8할입니다 — 발주 전 체크리스트","sub":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","dayLabel":"","captionNote":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","captionBody":"[3줄 요약]\n· 화장품 박스의 완성도는 지기구조(상자 구조) 선택과 후가공 조합에서 8할이 정해져요.\n· 단상자는 맞뚜껑·십자조립·삼면접착(오토) 세 구조가 기본 — 제품 무게와 포장 방식으로 골라요.\n· 발주 전 파일 검토(칼선·여백·해상도)와 가제본 샘플 확인을 거치면 실패가 없습니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 화장품은 패키지 산업에서 가장 화려한 분야예요. 금박·형압·부분UV 같은 특수 후가공을 제일 정교하게 쓰는 곳이 바로 화장품 박스거든요. 처음 브랜드를 준비하시는 담당자님들이 \"뭐부터 정해야 하죠?\"라고 물으시면 저는 늘 이렇게 답해요. 구조 먼저, 후가공은 그다음이요.\n\n[1단계 — 지기구조: 상자의 골격을 정해요]\n단상자(한 장의 종이를 접어 만드는 상자)는 바닥 구조에 따라 크게 셋으로 나뉘어요.\n· 맞뚜껑: 위아래가 같은 방식으로 열리는 기본형. 가볍고 단정해서 크림·쿠션 등 가벼운 제품에 좋아요.\n· 십자조립: 바닥을 십자로 끼워 조립해요. 맞뚜껑보다 견고해서 유리 용기도 안심이에요.\n· 삼면접착(오토바닥): 옆을 누르면 바닥이 자동으로 펴져요. 접은 상태로 납품돼 보관·물류가 편하고, 포장 라인에서 속도가 나요. 물량이 있는 브랜드의 표준이죠.\n앰플·에센스처럼 병이 흔들리면 안 되는 제품은 내지(칸막이·트레이)까지 함께 설계해요. 이 구조 설계(지기구조)가 저희 패키지 컨설팅의 핵심이고, 구조에 따라 목형(칼틀)이 새로 제작됩니다.\n\n[2단계 — 후가공: 브랜드의 인상을 입혀요]\n구조가 몸이라면 후가공은 표정이에요. 화장품 박스에서 검증된 조합을 소개할게요.\n· 무광 코팅 + 금박 로고: 가장 실패 없는 클래식. 차분한 바탕에 로고만 빛나요.\n· 형압(엠보/디보스): 로고를 볼록(양각)하거나 오목(음각)하게 눌러 새겨요. 만졌을 때의 고급감은 형압을 못 이겨요.\n· 부분UV: 무광 바탕에 특정 부분만 유광을 올려 은은한 대비를 만들어요. 미니멀 브랜드에 잘 어울려요.\n· 에폭시·부분실크: 포인트 부분을 도톰하게 올려 촉감까지 설계해요.\n박은 금·은뿐 아니라 홀로그램박, 먹박 등 색이 다양하고, 로고 모양대로 동판을 떠서 열과 압력으로 앉히는 공정이라 디자인 단계에서 박 영역을 미리 정해두는 게 좋아요.\n\n[3단계 — 파일 검토: 사고를 미리 막아요]\n디자인 파일을 받으면 저희가 가장 먼저 하는 일이 검토예요. 칼선(재단선)과 접는 선이 맞는지, 가장자리 여백은 충분한지, 이미지 해상도가 인쇄에 적합한지, 박·형압 영역이 공정 가능하게 분리돼 있는지를 확인하고, 원하시는 느낌에 맞는 종이 재질과 인쇄 기법을 제안해 드려요. 이 단계에서 조율이 잘 되면 재작업이 없어요.\n\n[4단계 — 가제본 샘플로 확인하고 갑니다]\n대량 인쇄 전에 디지털 시안을 크로스 체크하고, 필요하면 실물 가제본을 만들어 색상과 후가공 느낌을 직접 확인받아요. 고가·대량 작업이라면 인쇄 당일 공장에서 색을 함께 보는 인쇄 감리도 가능해요. 최소수량도 조율 가능하고 낱개 샘플까지 제작해 드리니, \"처음이라 불안한\" 브랜드일수록 편하게 문의 주세요 :)\n\n[보너스 — 종이 한 장이 브랜드 톤을 바꿔요]\n같은 구조·같은 후가공이라도 종이가 다르면 완성품이 달라져요. 매트한 무광 계열은 지문이 덜 남고 차분해서 스킨케어 라인에, 은은히 반짝이는 펄지는 메이크업·기프트 라인에, 크라프트 계열은 비건·내추럴 컨셉에 잘 어울려요. 수입지는 종류가 정말 많아서, 저희는 상담 때 지류 샘플북을 펼쳐놓고 직접 만져보며 고르시게 해요. 종이 값이 조금 올라가도 후가공을 줄여 총비용을 맞추는 식의 조합 설계도 가능하답니다.\n\n[정리 — 발주 전 체크리스트]\n① 제품 무게·용기 형태 확인(구조 선택 기준) ② 포장 방식 확인(수작업이면 맞뚜껑도 OK, 라인 포장이면 오토바닥) ③ 후가공은 최대 2가지 조합으로 절제 ④ 박·형압 영역은 디자인 단계에서 확정 ⑤ 가제본 샘플로 최종 확인. 이 다섯 개만 지키면 첫 발주도 실패 없어요 :)\n\n📍 동성특수인쇄\n· 위치(네이버 지도): [네이버 지도]\n· 홈페이지: https://dongsp5771.imweb.me\n· 문의/상담: [연락처]\n\n#화장품박스 #단상자 #패키지제작 #박스제작 #지기구조 #금박인쇄 #형압 #부분UV #인쇄후가공 #동성특수인쇄","variant":"A","status":"planned"},{"id":"test-ig-finishing","topic":"인쇄후가공","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-18T09:00:00.000Z","kicker":"캐러셀 · 후킹","headline":"같은 로고가 *3배 비싸 보이는* 방법","sub":"금박 vs 홀로그램박 vs 형압 vs 에폭시 vs 부분UV","dayLabel":"","captionNote":"금박 vs 홀로그램박 vs 형압 vs 에폭시 vs 부분UV","captionBody":"\"디자인은 마음에 드는데 뭔가 아쉬워요\" 하는 박스, 대부분 마감이 비어 있어요 🖐️\n\n같은 로고도 어떤 후가공을 입히느냐에 따라 완전히 달라져요.\n금박의 반짝임, 홀로그램의 무지개빛, 형압의 눌린 촉감, 에폭시의 도톰함, 부분UV의 은은한 대비까지 ✨\n\n저희는 이 공정들을 전부 자체 진행하는 특수인쇄 전문이라,\n브랜드 무드에 맞는 조합을 구조 설계 단계부터 같이 잡아드려요 😌\n\n📌 저장해 두면 패키지 기획할 때 딱 도움 돼요 🔖\n우리 브랜드엔 뭐가 어울릴지 궁금하면 DM 주세요 💬\n\n#인쇄후가공 #금박인쇄 #홀로그램박 #형압 #에폭시 #부분UV #패키지제작 #화장품박스 #브랜딩 #동성특수인쇄","variant":"B","status":"planned"},{"id":"test-blog-chuseok","topic":"선물세트박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"SEO · 핵심키워드 「선물세트박스」 · 시의성","headline":"추석 선물세트 패키지, 7월에 발주해야 하는 이유 — 납기 역산 캘린더 공개","sub":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","dayLabel":"","captionNote":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","captionBody":"[3줄 요약]\n· 추석 선물세트 패키지는 제작 물량이 몰리기 전인 7월이 발주 골든타임이에요.\n· 싸바리 1~2주, 조립가공 2~4주 + 디자인·샘플 확인까지 역산하면 지금 시작해야 여유가 있어요.\n· 홍삼·건기식 세트는 내지(트레이·스폰지) 설계와 보자기·쇼핑백까지 한 번에 준비하세요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 7월 중순, 아직 한여름인데 벌써 추석 이야기냐고요? 네, 패키지 공장의 달력은 두 달 빨리 갑니다. 매년 8월 중순이 되면 명절 선물세트 박스 주문이 한꺼번에 몰려서, 늦게 출발한 브랜드는 원하는 사양을 포기하거나 납기에 쫓기게 되거든요. 오늘은 홍삼·건강기능식품·식품 브랜드 담당자님을 위해 추석 패키지 역산 캘린더를 공개할게요.\n\n[먼저, 제작 기간부터 볼게요]\n패키지 사양별 표준 제작 기간이에요(디자인 확정 후 기준).\n· 접지류(단상자 등): 3~10일\n· 골판지류: 1~2주\n· 싸바리박스: 1~2주\n· 표지바리: 1~3주\n· 조립가공 패키지(내지·부자재 포함 조립까지): 2~4주\n선물세트는 대부분 싸바리+내지+쇼핑백 구성이라, 실제로는 조립가공 기준으로 보시는 게 안전해요.\n\n[추석 역산 캘린더 (예: 9월 말 추석 기준)]\n· 7월 중~말: 구조·사양 상담, 견적, 디자인 시작 ← 지금 여기!\n· 8월 초: 디자인 확정, 가제본 샘플 확인\n· 8월 중: 본 제작 진입(이때부터 공장 성수기 시작)\n· 9월 초: 납품 완료, 제품 조립·물류 시작\n· 9월 중: 백화점·온라인 입점 및 판매 개시\n8월에 상담을 시작하면 이 일정이 전부 뒤로 밀려요. 특히 싸바리는 손 공정이 많아 성수기엔 슬롯이 먼저 마감됩니다.\n\n[선물세트 패키지, 체크리스트 5]\n1. 구성품 확정: 병 몇 개, 스틱 몇 포인지에 따라 내지(트레이·스폰지·EVA) 설계가 달라져요.\n2. 구조 선택: 상하짝 싸바리가 클래식, 자석형은 개봉감, 서랍형은 진열감이 좋아요.\n3. 후가공: 금박 로고+형압 조합이 명절 세트의 정석. 홀로그램박은 젊은 타깃에 잘 먹혀요.\n4. 부자재: 쇼핑백(자동·수동), 보자기, 리본까지 같은 톤으로 맞추면 완성도가 확 올라가요.\n5. 수량 전략: 목형·동판 개발비는 1회성이라, 설·추석 물량을 함께 계획하면 개당 단가가 내려가요.\n\n[왜 동성특수인쇄에 맡기면 좋은가요?]\n저희는 홍삼·흑삼, 건강기능식품, 프리미엄 식품, 주류 패키지를 수십 년 만들어 온 공장이에요. 구조 설계(지기구조)와 소재 제안(수입지·트레이·스폰지), 원가 개선까지 컨설팅으로 잡아드리고, 가제본 샘플과 인쇄 감리로 품질을 확인시켜 드려요. 포장상자 구조 실용신안도 다수 보유하고 있고요. 최소수량은 조율 가능하니, 소량 프리미엄 세트도 부담 없이 문의 주세요 :)\n\n[구성 예시 — 홍삼 스틱 30포 세트라면]\n감이 잘 안 오시는 분들을 위해 가상의 예를 들어볼게요. 홍삼 스틱 30포 선물세트라면 ①상하짝 싸바리(무광 수입지, 딥레드) ②금박 로고 + 형압 라인 ③종이 트레이 내지(스틱 3단 배열) ④같은 톤의 자동 쇼핑백, 이렇게 구성하는 게 정석이에요. 여기서 예산을 줄이고 싶다면 겉지를 국산 고급지로 바꾸거나 형압을 빼는 식으로 조절하고, 더 높이고 싶다면 자석형 구조나 보자기 포장을 더해요. 이런 사양 조율이 저희 컨설팅의 일이에요.\n\n[자주 묻는 질문]\nQ. 설과 추석 물량을 같이 계약할 수 있나요? — 네, 목형·동판 개발비가 1회성이라 두 시즌을 묶으면 개당 단가가 유리해져요.\nQ. 구성품이 아직 확정 전인데요? — 후보 구성 2~3안으로 내지만 다르게 설계하는 방법도 있어요. 구성 확정 전에 상담을 시작하셔도 됩니다.\nQ. 백화 겉지+후가공+수량으로 잡히고, 제작 기간은 보통 1~2주를 봐야 해요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 백화점에서 화장품이나 홍삼 선물세트를 사면, 상자가 묵직하고 단단해서 버리기 아까웠던 경험 있으시죠? 그 상자가 바로 오늘 이야기할 \"싸바리박스\"예요. 브랜드 담당자님들이 프리미엄 패키지를 알아보실 때 가장 먼저 만나는 단어라서, 구조부터 견적·납기까지 제작 전에 알아두시면 좋은 것들을 정리해 드릴게요.\n\n[싸바리박스가 뭔가요?]\n쉽게 말해 \"단단한 뼈대에 좋은 옷을 입힌 상자\"예요. 2~3mm 두께의 합지(보드지)로 몸통을 만들고, 그 위에 인쇄된 수입지나 특수지를 한 장 한 장 감싸 붙여요(이 \"싸 바르는\" 공정에서 이름이 왔어요). 일반 단상자와 달리 형태가 무너지지 않고, 종이 특유의 질감과 색이 그대로 살아서 명품 패키지의 표준처럼 쓰입니다.\n\n[형태도 생각보다 다양해요]\n· 상하짝(뚜껑+몸통): 가장 클래식한 형태. 홍삼·건강기능식품 선물세트의 기본이에요.\n· 자석형: 뚜껑에 자석을 심어 \"탁\" 하고 닫혀요. 화장품·VIP 기프트에서 인기가 많아요.\n· 양문형·서랍형: 여는 동작 자체가 특별해져서 언박싱 경험을 설계할 때 좋아요.\n· 내지(트레이) 구성: 종이 트레이, 스폰지, EVA 등으로 제품을 딱 맞게 앉혀요. 병·앰플처럼 흔들리면 안 되는 제품은 내지 설계가 반이에요.\n\n[여기에 특수인쇄를 더하면]\n싸바리의 겉지 위에 금박·은박·홀로그램박으로 로고를 앉히거나, 형압(양각·음각)으로 눌러 새기고, 부분 실크·에폭시로 포인트를 주면 같은 구조라도 완성도가 완전히 달라져요. 저희는 특수인쇄와 패키지 제조를 한 공장에서 원스톱으로 진행하기 때문에, 구조와 후가공을 처음부터 같이 설계해 드립니다.\n\n[견적은 어떻게 잡히나요?]\n브랜드 담당자님들이 가장 궁금해하시는 부분이죠. 싸바리 견적은 크게 네 가지로 구성돼요.\n1. 개발비: 목형(칼틀)과 박용 동판 제작비 — 최초 1회만 들어가요.\n2. 자재: 합지 두께, 겉지 종류(수입지냐 일반지냐)에 따라 달라져요.\n3. 후가공: 박·형압·에폭시 등 공정이 늘수록 올라가요.\n4. 수량: 개발비가 고정이라, 수량이 늘수록 개당 단가는 뚝 떨어집니다.\n그래서 같은 박스도 500개와 3,000개의 개당 가격이 크게 달라요. 저희는 생산성 검토와 원가 개선까지 컨설팅해 드리니, 예산을 먼저 말씀해 주시면 그 안에서 가장 좋은 조합을 찾아드려요.\n\n[납기는 얼마나 걸리나요?]\n싸바리는 손이 많이 가는 공정이라 보통 1~2주를 보셔야 해요(사양에 따라 표지바리 1~3주, 조립가공 패키지는 2~4주). 여기에 디자인 확정, 가제본 샘플 확인 시간까지 더하면 실제로는 한 달 가까이 잡는 게 안전합니다. 명절 선물세트처럼 날짜가 정해진 프로젝트라면 꼭 역산해서 미리 문의 주세요.\n\n[샘플 없이 대량 제작, 불안하지 않으세요?]\n저희는 본 제작 전에 가제본(실물 샘플)으로 색상과 후가공 느낌을 확인받고, 인쇄 단계에서는 고객이 직접 공장에서 색을 보는 인쇄 감리도 진행해요. 포장상자 구조 관련 실용신안도 다수 등록해 둔 만큼, 구조 설계부터 검수까지 믿고 맡기실 수 있게 프로세스로 증명하겠습니다 :)\n\n[자주 묻는 질문]\nQ. 소량도 가능한가요? — 네, 최소수량은 조율 가능하고 낱개 수량 상관없이 완제품 샘플까지 제작해 드려요. 소량 프리미엄 세트, 시제품 검증용으로도 많이 찾으세요.\nQ. 겉지는 어떻게 고르나요? — 브랜드 무드가 차분하면 무광 수입지, 화사하면 펄지, 내추럴하면 크라프트 계열을 추천해요. 실물 지류 샘플을 보고 만져보면서 고르시는 게 제일 정확해서, 상담 오시면 종이부터 같이 봅니다.\nQ. 디자인이 아직 없는데요? — 구조(지기구조)와 사양을 먼저 잡고 디자인을 입히는 순서도 가능해요. 패키지디자인 연구·개발 문의도 전문가가 직접 상담해 드립니다.\n\n📍 동성특수인쇄\n· 위치(네이버 지도): [네이버 지도]\n· 홈페이지: https://dongsp5771.imweb.me\n· 문의/상담: [연락처]\n\n#싸바리박스 #패키지제작 #박스제작 #고급박스 #선물세트박스 #화장품박스 #합지박스 #패키지컨설팅 #동성특수인쇄","variant":"A","status":"planned"},{"id":"test-blog-cosmetic","topic":"화장품박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"SEO · 핵심키워드 「화장품박스 / 단상자」","headline":"화장품 박스 제작, 단상자 구조와 후가공 조합이 8할입니다 — 발주 전 체크리스트","sub":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","dayLabel":"","captionNote":"맞뚜껑·십자조립·삼면접착 지기구조 + 금박·형압·부분UV 조합, 파일 검토 포인트까지","captionBody":"[3줄 요약]\n· 화장품 박스의 완성도는 지기구조(상자 구조) 선택과 후가공 조합에서 8할이 정해져요.\n· 단상자는 맞뚜껑·십자조립·삼면접착(오토) 세 구조가 기본 — 제품 무게와 포장 방식으로 골라요.\n· 발주 전 파일 검토(칼선·여백·해상도)와 가제본 샘플 확인을 거치면 실패가 없습니다.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 화장품은 패키지 산업에서 가장 화려한 분야예요. 금박·형압·부분UV 같은 특수 후가공을 제일 정교하게 쓰는 곳이 바로 화장품 박스거든요. 처음 브랜드를 준비하시는 담당자님들이 \"뭐부터 정해야 하죠?\"라고 물으시면 저는 늘 이렇게 답해요. 구조 먼저, 후가공은 그다음이요.\n\n[1단계 — 지기구조: 상자의 골격을 정해요]\n단상자(한 장의 종이를 접어 만드는 상자)는 바닥 구조에 따라 크게 셋으로 나뉘어요.\n· 맞뚜껑: 위아래가 같은 방식으로 열리는 기본형. 가볍고 단정해서 크림·쿠션 등 가벼운 제품에 좋아요.\n· 십자조립: 바닥을 십자로 끼워 조립해요. 맞뚜껑보다 견고해서 유리 용기도 안심이에요.\n· 삼면접착(오토바닥): 옆을 누르면 바닥이 자동으로 펴져요. 접은 상태로 납품돼 보관·물류가 편하고, 포장 라인에서 속도가 나요. 물량이 있는 브랜드의 표준이죠.\n앰플·에센스처럼 병이 흔들리면 안 되는 제품은 내지(칸막이·트레이)까지 함께 설계해요. 이 구조 설계(지기구조)가 저희 패키지 컨설팅의 핵심이고, 구조에 따라 목형(칼틀)이 새로 제작됩니다.\n\n[2단계 — 후가공: 브랜드의 인상을 입혀요]\n구조가 몸이라면 후가공은 표정이에요. 화장품 박스에서 검증된 조합을 소개할게요.\n· 무광 코팅 + 금박 로고: 가장 실패 없는 클래식. 차분한 바탕에 로고만 빛나요.\n· 형압(엠보/디보스): 로고를 볼록(양각)하거나 오목(음각)하게 눌러 새겨요. 만졌을 때의 고급감은 형압을 못 이겨요.\n· 부분UV: 무광 바탕에 특정 부분만 유광을 올려 은은한 대비를 만들어요. 미니멀 브랜드에 잘 어울려요.\n· 에폭시·부분실크: 포인트 부분을 도톰하게 올려 촉감까지 설계해요.\n박은 금·은뿐 아니라 홀로그램박, 먹박 등 색이 다양하고, 로고 모양대로 동판을 떠서 열과 압력으로 앉히는 공정이라 디자인 단계에서 박 영역을 미리 정해두는 게 좋아요.\n\n[3단계 — 파일 검토: 사고를 미리 막아요]\n디자인 파일을 받으면 저희가 가장 먼저 하는 일이 검토예요. 칼선(재단선)과 접는 선이 맞는지, 가장자리 여백은 충분한지, 이미지 해상도가 인쇄에 적합한지, 박·형압 영역이 공정 가능하게 분리돼 있는지를 확인하고, 원하시는 느낌에 맞는 종이 재질과 인쇄 기법을 제안해 드려요. 이 단계에서 조율이 잘 되면 재작업이 없어요.\n\n[4단계 — 가제본 샘플로 확인하고 갑니다]\n대량 인쇄 전에 디지털 시안을 크로스 체크하고, 필요하면 실물 가제본을 만들어 색상과 후가공 느낌을 직접 확인받아요. 고가·대량 작업이라면 인쇄 당일 공장에서 색을 함께 보는 인쇄 감리도 가능해요. 최소수량도 조율 가능하고 낱개 샘플까지 제작해 드리니, \"처음이라 불안한\" 브랜드일수록 편하게 문의 주세요 :)\n\n[보너스 — 종이 한 장이 브랜드 톤을 바꿔요]\n같은 구조·같은 후가공이라도 종이가 다르면 완성품이 달라져요. 매트한 무광 계열은 지문이 덜 남고 차분해서 스킨케어 라인에, 은은히 반짝이는 펄지는 메이크업·기프트 라인에, 크라프트 계열은 비건·내추럴 컨셉에 잘 어울려요. 수입지는 종류가 정말 많아서, 저희는 상담 때 지류 샘플북을 펼쳐놓고 직접 만져보며 고르시게 해요. 종이 값이 조금 올라가도 후가공을 줄여 총비용을 맞추는 식의 조합 설계도 가능하답니다.\n\n[정리 — 발주 전 체크리스트]\n① 제품 무게·용기 형태 확인(구조 선택 기준) ② 포장 방식 확인(수작업이면 맞뚜껑도 OK, 라인 포장이면 오토바닥) ③ 후가공은 최대 2가지 조합으로 절제 ④ 박·형압 영역은 디자인 단계에서 확정 ⑤ 가제본 샘플로 최종 확인. 이 다섯 개만 지키면 첫 발주도 실패 없어요 :)\n\n📍 동성특수인쇄\n· 위치(네이버 지도): [네이버 지도]\n· 홈페이지: https://dongsp5771.imweb.me\n· 문의/상담: [연락처]\n\n#화장품박스 #단상자 #패키지제작 #박스제작 #지기구조 #금박인쇄 #형압 #부분UV #인쇄후가공 #동성특수인쇄","variant":"A","status":"planned"},{"id":"test-blog-chuseok","topic":"선물세트박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"SEO · 핵심키워드 「선물세트박스」 · 시의성","headline":"추석 선물세트 패키지, 7월에 발주해야 하는 이유 — 납기 역산 캘린더 공개","sub":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","dayLabel":"","captionNote":"홍삼·건기식·식품 선물세트 박스, 싸바리 1~2주+조립 2~4주… 지금이 골든타임","captionBody":"[3줄 요약]\n· 추석 선물세트 패키지는 제작 물량이 몰리기 전인 7월이 발주 골든타임이에요.\n· 싸바리 1~2주, 조립가공 2~4주 + 디자인·샘플 확인까지 역산하면 지금 시작해야 여유가 있어요.\n· 홍삼·건기식 세트는 내지(트레이·스폰지) 설계와 보자기·쇼핑백까지 한 번에 준비하세요.\n\n안녕하세요, 동성특수인쇄 실장이에요 :) 7월 중순, 아직 한여름인데 벌써 추석 이야기냐고요? 네, 패키지 공장의 달력은 두 달 빨리 갑니다. 매년 8월 중순이 되면 명절 선물세트 박스 주문이 한꺼번에 몰려서, 늦게 출발한 브랜드는 원하는 사양을 포기하거나 납기에 쫓기게 되거든요. 오늘은 홍삼·건강기능식품·식품 브랜드 담당자님을 위해 추석 패키지 역산 캘린더를 공개할게요.\n\n[먼저, 제작 기간부터 볼게요]\n패키지 사양별 표준 제작 기간이에요(디자인 확정 후 기준).\n· 접지류(단상자 등): 3~10일\n· 골판지류: 1~2주\n· 싸바리박스: 1~2주\n· 표지바리: 1~3주\n· 조립가공 패키지(내지·부자재 포함 조립까지): 2~4주\n선물세트는 대부분 싸바리+내지+쇼핑백 구성이라, 실제로는 조립가공 기준으로 보시는 게 안전해요.\n\n[추석 역산 캘린더 (예: 9월 말 추석 기준)]\n· 7월 중~말: 구조·사양 상담, 견적, 디자인 시작 ← 지금 여기!\n· 8월 초: 디자인 확정, 가제본 샘플 확인\n· 8월 중: 본 제작 진입(이때부터 공장 성수기 시작)\n· 9월 초: 납품 완료, 제품 조립·물류 시작\n· 9월 중: 백화점·온라인 입점 및 판매 개시\n8월에 상담을 시작하면 이 일정이 전부 뒤로 밀려요. 특히 싸바리는 손 공정이 많아 성수기엔 슬롯이 먼저 마감됩니다.\n\n[선물세트 패키지, 체크리스트 5]\n1. 구성품 확정: 병 몇 개, 스틱 몇 포인지에 따라 내지(트레이·스폰지·EVA) 설계가 달라져요.\n2. 구조 선택: 상하짝 싸바리가 클래식, 자석형은 개봉감, 서랍형은 진열감이 좋아요.\n3. 후가공: 금박 로고+형압 조합이 명절 세트의 정석. 홀로그램박은 젊은 타깃에 잘 먹혀요.\n4. 부자재: 쇼핑백(자동·수동), 보자기, 리본까지 같은 톤으로 맞추면 완성도가 확 올라가요.\n5. 수량 전략: 목형·동판 개발비는 1회성이라, 설·추석 물량을 함께 계획하면 개당 단가가 내려가요.\n\n[왜 동성특수인쇄에 맡기면 좋은가요?]\n저희는 홍삼·흑삼, 건강기능식품, 프리미엄 식품, 주류 패키지를 수십 년 만들어 온 공장이에요. 구조 설계(지기구조)와 소재 제안(수입지·트레이·스폰지), 원가 개선까지 컨설팅으로 잡아드리고, 가제본 샘플과 인쇄 감리로 품질을 확인시켜 드려요. 포장상자 구조 실용신안도 다수 보유하고 있고요. 최소수량은 조율 가능하니, 소량 프리미엄 세트도 부담 없이 문의 주세요 :)\n\n[구성 예시 — 홍삼 스틱 30포 세트라면]\n감이 잘 안 오시는 분들을 위해 가상의 예를 들어볼게요. 홍삼 스틱 30포 선물세트라면 ①상하짝 싸바리(무광 수입지, 딥레드) ②금박 로고 + 형압 라인 ③종이 트레이 내지(스틱 3단 배열) ④같은 톤의 자동 쇼핑백, 이렇게 구성하는 게 정석이에요. 여기서 예산을 줄이고 싶다면 겉지를 국산 고급지로 바꾸거나 형압을 빼는 식으로 조절하고, 더 높이고 싶다면 자석형 구조나 보자기 포장을 더해요. 이런 사양 조율이 저희 컨설팅의 일이에요.\n\n[자주 묻는 질문]\nQ. 설과 추석 물량을 같이 계약할 수 있나요? — 네, 목형·동판 개발비가 1회성이라 두 시즌을 묶으면 개당 단가가 유리해져요.\nQ. 구성품이 아직 확정 전인데요? — 후보 구성 2~3안으로 내지만 다르게 설계하는 방법도 있어요. 구성 확정 전에 상담을 시작하셔도 됩니다.\nQ. 백화점 입점 일정이 더 빠른데요? — 일정 먼저 알려주시면 사양을 역산으로 조정해 드려요(예: 조립가공을 줄이고 접지류 중심으로).\n\n추석 준비, 빠를수록 선택지가 많아집니다. 이번 주에 구성품 리스트만 들고 연락 주셔도 좋아요!\n\n📍 동성특수인쇄\n· 위치(네이버 지도): [네이버 지도]\n· 홈페이지: https://dongsp5771.imweb.me\n· 문의/상담: [연락처]\n\n#선물세트박스 #추석선물세트 #홍삼패키지 #건강기능식품박스 #싸바리박스 #패키지제작 #명절선물포장 #쇼핑백제작 #동성특수인쇄","variant":"A","status":"planned"}],"stats":{"publishedCount":0,"pendingCount":3,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"blogger","label":"구글 블로그","icon":"🅱️","active":true,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"youtube","label":"유튜브","icon":"▶️","active":true,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"linkedin","label":"링크드인","icon":"💼","active":false,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]}],"channelLinks":[{"key":"instagram","label":"인스타그램","icon":"📸","url":"https://w const REPO = DATA.repo;
let ci = 0, ch = 'all';
// ── 운영 기간 선택 (전역 상태) ──
let period = { key:'all', from:null, to:null };
function periodRange(){
  if(period.key==='all') return null;
  const now=new Date(); let from,to;
  if(period.key==='7d'){ to=now; from=new Date(now.getTime()-6*864e5); }
  else if(period.key==='14d'){ to=now; from=new Date(now.getTime()-13*864e5); }
  else if(period.key==='30d'){ to=now; from=new Date(now.getTime()-29*864e5); }
  else if(period.key==='month'){ from=new Date(now.getFullYear(),now.getMonth(),1); to=now; }
  else if(period.key==='prev'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=new Date(now.getFullYear(),now.getMonth(),0); }
  else if(period.key==='custom'){
    if(!period.from&&!period.to) return null;
    from=period.from?new Date(period.from):new Date(0);
    to=period.to?new Date(period.to):now;
  } else return null;
  const f=new Date(from); f.setHours(0,0,0,0);
  const t=new Date(to); t.setHours(23,59,59,999);
  return [f.getTime(), t.getTime()];
}
function inPeriod(s){ const r=periodRange(); if(!r) return true; if(!s) return false; const t=new Date(s).getTime(); return t>=r[0]&&t<=r[1]; }
function periodLabel(){
  const names={all:'전체 기간','7d':'최근 7일','14d':'최근 14일','30d':'최근 30일',month:'이번 달',prev:'지난 달',custom:'직접 선택'};
  const r=periodRange();
  const d=x=>new Date(x).toISOString().slice(0,10);
  return names[period.key]+(r?' ('+d(r[0])+' ~ '+d(r[1])+')':'');
}
function periodBar(){
  const b=(k,l)=>'<button class="pbtn'+(period.key===k?' on':'')+'" onclick="setPeriod(\''+k+'\')">'+l+'</button>';
  return '<div class="panel pbar"><span class="pbar-t">📆 운영 기간</span>'+
    b('all','전체')+b('7d','최근 7일')+b('14d','최근 14일')+b('30d','최근 30일')+b('month','이번 달')+b('prev','지난 달')+
    '<span class="pbar-c">직접 선택 <input type="date" id="pfrom" value="'+(period.from||'')+'" onchange="setCustom()"/> ~ <input type="date" id="pto" value="'+(period.to||'')+'" onchange="setCustom()"/></span>'+
    '<span class="muted" style="margin-left:auto">'+periodLabel()+'</span></div>';
}
function setPeriod(k){ period.key=k; renderView(); }
function setCustom(){
  period.key='custom';
  period.from=(document.getElementById('pfrom')||{}).value||null;
  period.to=(document.getElementById('pto')||{}).value||null;
  renderView();
}

let ISSUES=null; // null=로딩중, []=없음/실패
const REQ_RE=/^\[수정요청·([a-z-]+)\]\s*(.*)$/;
function channelIssues(key){ return (ISSUES||[]).filter(x=>x.chKey===key); }
function loadIssues(){
  fetch('https://api.github.com/repos/'+REPO+'/issues?state=all&per_page=100&sort=created&direction=desc')
    .then(r=>r.ok?r.json():[])
    .then(arr=>{
      ISSUES=(Array.isArray(arr)?arr:[]).filter(x=>!x.pull_request).map(x=>{
        const m=REQ_RE.exec(x.title||''); if(!m) return null;
        return { chKey:m[1], titleClean:m[2]||x.title, state:x.state, html_url:x.html_url, created_at:x.created_at, closed_at:x.closed_at };
      }).filter(Boolean);
      renderTabs(); renderView();
    })
    .catch(()=>{ ISSUES=[]; });
}

function requestsPanel(key, chLabel){

function sparkline(arr){
  if(!arr||arr.length<2) return '';
  const w=160,h=34,mx=Math.max(...arr,1),mn=Math.min(...arr,0);
  const dx=w/(arr.length-1);
  const pts=arr.map((v,i)=>[i*dx,h-((v-mn)/(mx-mn||1))*(h-6)-3]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return '<svg class="spark" width="'+w+'" height="'+h+'"><path d="'+d+'" fill="none" stroke="#2b6fff" stroke-width="2"/></svg>';
}

function plainPostText(it){
  let n=0;
  return String(it.captionBody||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img){ n++; return '\n[📷 이미지'+n+' 삽입]\n'; }
    if(t.startsWith('## ')) return '\n■ '+t.slice(3);
    if(t.startsWith('# ')) return t.slice(2);
    if(t==='>'||t.startsWith('> ')) return t.replace(/^>\s?/,'');
    return line.replace(/\*\*([^*]+)\*\*/g,'$1');
  }).join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function flash(id,msg){ const b=document.getElementById(id); if(b){const o=b.textContent;b.textContent=msg;setTimeout(()=>b.textContent=o,1500);} }

function mdInline(x){ return esc(x).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function fmtCaption(s){
  return String(s||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img) return '<img class="md-img" src="'+esc(img[2])+'" alt="'+esc(img[1])+'" loading="lazy"/>';
    if(t.startsWith('## ')) return '<h4 class="md-h">'+mdInline(t.slice(3))+'</h4>';
    if(t.startsWith('# ')) return '<h3 class="md-h1">'+mdInline(t.slice(2))+'</h3>';
    if(t==='>'||t.startsWith('> ')) return '<div class="md-quote">'+mdInline(t.replace(/^>\s?/,''))+'</div>';
    if(t.indexOf('🔖')===0) return '<div class="md-tags">'+esc(t)+'</div>';
    if(/^\[.+\]$/.test(t)) return '<div class="md-tag">'+esc(t)+'</div>';
    if(t==='---'||t==='') return '<div class="md-sp"></div>';
    return '<div>'+mdInline(line)+'</div>';
  }).join('');
}

// 채널 바로가기 — 채널별 그라데이션 카드(클릭 시 관리로 이동)
function chGrad(key){
  return ({youtube:'linear-gradient(135deg,#fdecec,#fbdcdc)',instagram:'linear-gradient(135deg,#fceaf5,#f6d8ec)',threads:'linear-gradient(135deg,#ecf5f5,#dcecec)','naver-blog':'linear-gradient(135deg,#eafaf0,#d8f0e2)',blogger:'linear-gradient(135deg,#fdf3e6,#f8e6cc)',linkedin:'linear-gradient(135deg,#ecf2fc,#dce8f8)'})[key]||'linear-gradient(135deg,#f4f6fa,#e9edf5)';
}
function chBorder(key){ return ({youtube:'#f0b8b8',instagram:'#eab8d8',threads:'#b8d8d8','naver-blog':'#a8dcbe',blogger:'#ecca9e',linkedin:'#b8cef0'})[key]||'#dfe4ec'; }
function channelLinksPanel(client){
  const links=client.channelLinks||[];
  if(!links.length) return '';
  const cards=links.map(l=>
    '<a href="'+esc(l.url)+'" target="_blank" rel="noopener" style="flex:1 1 200px;min-width:180px;text-decoration:none;border-radius:14px;padding:16px 18px;border:1px solid '+chBorder(l.key)+';background:'+chGrad(l.key)+';display:block">'+
    '<div style="font-weight:800;font-size:18px;color:#14171d;margin-bottom:4px">'+l.icon+' '+esc(l.label)+'</div>'+
    '<div style="font-size:13px;color:#4a5264;opacity:.9">'+esc(l.sub)+'</div></a>').join('');
  return '<div class="panel"><div class="sect-h" style="margin:0 0 10px"><h3>🔗 채널 바로가기</h3><span class="muted">클릭하면 각 채널 관리로 이동</span></div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+cards+'</div></div>';
}
function overview(client){
  let h=tokenBanner(client);
  h+=setupPanel();
  h+=channelLinksPanel(client);
  h+=weeklyPanel(client);
  h+=periodBar();
  h+='<div class="kpis">'+
    kpi(client.totalCycles,'총 사이클')+
    kpi(client.totalPublished,'총 발행')+
    kpi(client.heldCount,'승인 대기',client.heldCount>0)+
    kpi('v'+client.designVersion,'디자인 진화')+'</div>';
  h+=learningPanel(client);
  h+='<div class="panel"><h3>채널별 요약</h3><table><tr><th>채널</th><th>상태</th><th>발행</th><th>대기</th><th>평균 참여율</th><th>수정요청</th></tr>'+
    client.channels.map(c=>{const lab=(DATA.channels.find(x=>x.key===c.key)||{});
      const iss=channelIssues(c.key); const openN=iss.filter(x=>x.state!=='closed').length;
      const reqCell=iss.length?(openN?'<span class="badge b-wait">🛠 처리중 '+openN+'</span>':'<span class="badge b-ok">✅ 완료 '+iss.length+'</span>'):'<span class="muted">-</span>';
      return '<tr><td>'+lab.icon+' '+lab.label+'</td><td>'+(c.active?'<span class="badge b-ok">연결</span>':'<span class="badge b-hold">미연결</span>')+'</td><td>'+c.stats.publishedCount+'</td><td>'+c.stats.pendingCount+'</td><td>'+pct(c.stats.avgEngagement)+' '+tIcon(c.stats.trend)+'</td><td>'+reqCell+'</td></tr>';}).join('')+'</table></div>';
  // 발행 전 콘텐츠 기획안 — 메인에는 발행 전(예정·수동대기)만 보여준다
  const plan=client.planCards||[];
  const pre=plan.filter(p=>p.status!=='published');
  const fbTitle='['+client.name+'] 기획안 전체 피드백';
  const fbBody='이번 달 기획안에 대한 의견/수정사항을 적어주세요.\n\n';
  const mon=new Date(DATA.generatedAt).getMonth()+1;
  h+='<div class="sect-h"><h2>🕓 '+mon+'월 발행 전 콘텐츠 ('+pre.length+')</h2><a class="btn fb" href="'+issue(fbTitle,fbBody)+'" target="_blank">✏️ 기획안 피드백</a></div>';
  if(!pre.length){ h+='<div class="empty">발행 전 콘텐츠가 없습니다. 다음 사이클에 자동 생성됩니다.</div>'; }
  else {
    for(const chDef of DATA.channels){
      const items=pre.filter(p=>(p.channels||[]).includes(chDef.key));
      if(!items.length) continue;
      const lab=chDef.icon+' '+chDef.label;
      h+='<div class="chgrp"><div class="chgrp-h">'+lab+' <span class="muted">'+items.length+'건 · '+esc((items[0].format)||'')+'</span></div>'+
         '<div class="cards">'+items.map(p=>planCard(client,chDef.label,p)).join('')+'</div></div>';
    }
  }
  // 선택한 기간의 발행 게시물 (기획 발행분 + 사이클 발행분)
  const planPub=plan.filter(p=>p.status==='published'&&inPeriod(p.publishedAt||p.scheduledFor))
    .sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));
  const recent=[].concat(...client.channels.map(c=>c.published)).filter(p=>inPeriod(p.time))
    .sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,12);
  h+='<div class="sect-h"><h2>✅ 발행된 게시물 · '+periodLabel()+' ('+(planPub.length+recent.length)+')</h2></div>';
  const pubCards=planPub.map(p=>{
    const chDef=DATA.channels.find(x=>x.key===((p.channels||[])[0]))||{label:''};
    return planCard(client,chDef.label,p);
  }).concat(recent.map(p=>publishedCard(p,'<span class="badge b-ok">발행</span>')));
  h+= pubCards.length?'<div class="cards">'+pubCards.join('')+'</div>':'<div class="empty">이 기간에 발행된 게시물이 없습니다.</div>';
  // 경쟁사
  h+='<div class="panel" style="margin-top:16px"><h3>벤치마킹 경쟁사</h3><div>'+(client.competitors.length?client.competitors.map(x=>'<span class="tag">@'+esc(x)+'</span>').join(''):'<span class="muted">미설정</span>')+'</div></div>';
  return h;
}
function kpi(v,l,accent){return '<div class="kpi"><div class="v'+(accent?' accent':'')+'">'+v+'</div><div class="l">'+l+'</div></div>';}
function renderClients(){
  document.getElementById('clients').innerHTML = DATA.clients.length>1 ? DATA.clients.map((c,i)=>'<button class="cbtn'+(i===ci?' on':'')+'" onclick="setClient('+i+')">'+esc(c.name)+'</button>').join('') : '';
}
function renderTabs(){
  const c=DATA.clients[ci];
  const tabs=[{key:'all',label:'전체',icon:'🏠',active:true}]
    .concat(DATA.channels.map(ch=>{const cc=c.channels.find(x=>x.key===ch.key);return {key:ch.key,label:ch.label,icon:ch.icon,active:cc&&cc.active};}))
    .concat([{key:'guide',label:'지침',icon:'🧭',active:true,noDot:true}]);
  document.getElementById('tabs').innerHTML = tabs.map(t=>{
    // 수정요청 진행상황 아이콘 — 🛠 처리중 n건 / ✅ 전부 처리완료
    let req='';
    if(t.key!=='all'){
      const iss=channelIssues(t.key);
      const openN=iss.filter(x=>x.state!=='closed').length;
      req = openN ? '<span class="treq open" title="수정요청 처리중 '+openN+'건">🛠'+openN+'</span>'
          : (iss.length ? '<span class="treq done" title="수정요청 전부 처리완료">✅</span>' : '');
    }
    return '<button class="tab'+(t.key===ch?' on':'')+'" onclick="setCh(\''+t.key+'\')">'+t.icon+' '+t.label+(t.key!=='all'&&!t.noDot?'<span class="dot '+(t.active?'live':'off')+'"></span>':'')+req+'</button>';
  }).join('');
}
function renderView(){
  const c=DATA.clients[ci];
  document.getElementById('view').innerHTML = ch==='all'?overview(c):(ch==='guide'?guideView(c):channelDetail(c,c.channels.find(x=>x.key===ch)));
  document.getElementById('gen').textContent = ftime(DATA.generatedAt)+' (UTC)';
}
function setClient(i){ci=i;ch='all';renderClients();renderTabs();renderView();window.scrollTo(0,0);}
function setCh(k){ch=k;renderTabs();renderView();window.scrollTo(0,0);}
try {
  renderClients(); renderTabs(); renderView(); loadIssues();
} catch (e) {
  var v = document.getElementById('view');
  if (v) v.innerHTML = '<div style="padding:24px;line-height:1.7;color:#b91c1c">표시 중 오류: '
    + ((e && e.message) || e)
    + '<br><br><button onclick="location.reload(true)" style="padding:10px 16px;border-radius:8px;border:0;background:#2b6fff;color:#fff;font-size:15px">새로고침</button></div>';
}
</script>
</body>
</html>

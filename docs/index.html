n1. 오전에 데이터를 넘기면 당일 작업 확률이 올라갑니다.\n2. 파일은 “인쇄용(재단선 포함, 글꼴 깨짐 없음)”으로. 이게 제일 자주 걸립니다.\n3. 수량이 적을수록 빨라요. 급하면 소량 급행이 답.\n\n급하실 때 전화 한 통이면 바로 확인해드립니다.\n\n#급행인쇄 #명함급행 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-namecard-guide","topic":"명함인쇄","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"","headline":"명함 제작 A to Z — 처음 맡기는 분을 위한 완벽 가이드","sub":"용지·수량·후가공·납기까지, 처음이어도 헷갈리지 않게 정리했습니다.","dayLabel":"","captionNote":"용지·수량·후가공·납기까지, 처음이어도 헷갈리지 않게 정리했습니다.","captionBody":"# 명함 제작, 처음이라 막막하신가요?\n\n명함은 사업의 첫인상입니다. 처음 맡기실 때 알아두면 좋은 것들을 순서대로 정리했습니다.\n\n## 1. 용지 고르기\n일반 명함지(스노우/아트)부터 고급 수입지까지 다양합니다. 무난하게는 300g 스노우지, 고급감을 원하면 두꺼운 수입지나 펄지를 추천합니다.\n\n## 2. 수량 정하기\n인쇄는 준비 비용이 커서 수량이 많을수록 한 장당 값이 내려갑니다. 자주 쓰면 500장 이상, 정보가 자주 바뀌면 소량으로 자주 찍는 편이 좋습니다.\n\n## 3. 후가공으로 차별화\n코팅(유광·무광), 금박·은박, 형압을 더하면 인상이 확 달라집니다. 예산에 맞춰 하나만 더해도 충분합니다.\n\n## 4. 납기\n일반적으로 2~3일, 급하면 당일·익일 급행도 가능합니다. 오전에 인쇄용 파일을 주시면 더 빠릅니다.\n\n## 동성인쇄소에 맡기면\n용지 추천부터 데이터 점검, 후가공 조합까지 상담해드립니다. 처음이셔도 편하게 문의주세요.\n\n#명함인쇄 #명함제작 #명함디자인 #동성인쇄소","variant":"A","status":"planned"},{"id":"ig-flyer-paper","topic":"전단지","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-18T09:00:00.000Z","kicker":"Paper Guide","headline":"전단지 종이,\u003cbr>*3가지* 느낌 비교","sub":"같은 디자인도 종이가 바꾼다 — 스노우·아트·모조 한눈에.","dayLabel":"","captionNote":"같은 디자인도 종이가 바꾼다 — 스노우·아트·모조 한눈에.","captionBody":"전단지, 디자인만 신경 쓰기 쉽지만 “종이”가 첫인상을 바꿉니다.\n\n· 스노우지 — 매끈하고 광이 살짝. 사진·음식 컬러가 쨍하게 삽니다.\n· 아트지 — 광이 가장 강해 고급·선명. 화장품·행사 홍보에 잘 맞아요.\n· 모조지 — 무광에 필기 가능. 정보 전달·쿠폰형에 적합합니다.\n\n같은 디자인이라도 종이 하나로 “싸 보임 ↔ 고급”이 갈립니다.\n용도를 말씀해주시면 딱 맞는 종이를 추천해드려요.\n\n#전단지 #전단지제작 #리플렛 #동성인쇄소","variant":"B","status":"planned"},{"id":"th-domuson","topic":"스티커","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"스티커 맞출 때 나오는 “도무송”, 어려운 말 아닙니다.\n\n= 원하는 모양대로 칼선을 넣어 떼기 쉽게 재단하는 것.\n원형·라운드 사각·캐릭터 외곽선까지 모양대로 뗄 수 있어요.\n\n제품 라벨, 포장 봉인, 판촉 스티커에 딱입니다.\n모양만 정해주시면 칼선은 저희가 잡아드려요.\n\n#스티커제작 #도무송스티커 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-flyer-guide","topic":"전단지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-20T09:00:00.000Z","kicker":"","headline":"전단지 홍보 효과 높이는 법 — 종이·디자인·배포 팁","sub":"뿌리는 만큼 효과 나려면? 종이 선택부터 배포 타이밍까지.","dayLabel":"","captionNote":"뿌리는 만큼 효과 나려면? 종이 선택부터 배포 타이밍까지.","captionBody":"# 전단지, 아직도 효과 있습니다 — 제대로 하면\n\n온라인 광고가 넘치는 시대에도 전단지는 “지역·매장 홍보”에 여전히 강력합니다. 효과를 높이는 방법을 정리했습니다.\n\n## 1. 종이가 첫인상\n스노우지(사진 잘 삼), 아트지(고급·선명), 모조지(정보·쿠폰형). 용도에 맞춰 고르면 “싸 보임”을 피할 수 있습니다.\n\n## 2. 한눈에 들어오는 디자인\n정보를 다 넣으려다 아무것도 안 읽힙니다. “가장 중요한 한 가지”를 크게. 혜택·기간·연락처는 명확하게.\n\n## 3. 배포 타이밍과 장소\n타깃이 지나는 시간·동선을 노리세요. 쿠폰·QR을 넣으면 효과 측정도 됩니다.\n\n## 4. 사이즈와 접지\nA5 낱장, A4 3단 접지 등 용도별로 다양합니다. 정보량이 많으면 접지형이 유리합니다.\n\n## 동성인쇄소에 맡기면\n용지·사이즈·접지 추천부터 소량 급행까지 도와드립니다.\n\n#전단지 #전단지제작 #리플렛 #홍보물 #동성인쇄소","variant":"A","status":"planned"},{"id":"ig-finishing","topic":"인쇄후가공","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-21T09:00:00.000Z","kicker":"Finishing","headline":"후가공 한 장으로\u003cbr>보는 *차이*","sub":"코팅·박·형압 — 이름은 어려워도 효과는 확실합니다.","dayLabel":"","captionNote":"코팅·박·형압 — 이름은 어려워도 효과는 확실합니다.","captionBody":"“후가공”이라는 말, 어렵게 들리지만 결과물은 확 다릅니다.\n\n· 코팅 — 표면을 보호하고 색을 더 진하게. 유광/무광 선택 가능.\n· 박(금박·은박) — 금속 광택을 얹어 고급감. 로고·상호에 포인트.\n· 형압 — 눌러서 요철을 만들어 만졌을 때 “고급” 느낌.\n\n명함·청첩장·브랜드 패키지에 하나만 더해도 인상이 달라집니다.\n예산과 용도에 맞게 조합을 추천해드릴게요.\n\n#인쇄후가공 #금박명함 #형압 #동성인쇄소","variant":"C","status":"planned"},{"id":"th-data-mistakes","topic":"인쇄후가공","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-22T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"인쇄 데이터 넘길 때 자주 나는 실수 3가지\n\n1. 재단 여백 없음 — 가장자리 글자가 잘립니다. 사방 여백 필수.\n2. 글꼴 안 깨짐 처리 안 함 — 남의 컴퓨터에서 폰트가 바뀝니다. 윤곽선(아웃라인)으로.\n3. 저해상도 이미지 — 화면은 괜찮아도 인쇄하면 흐려요. 300dpi 권장.\n\n헷갈리면 파일만 보내주세요. 저희가 점검해서 알려드립니다.\n\n#인쇄데이터 #인쇄팁 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-banner-guide","topic":"현수막","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-23T09:00:00.000Z","kicker":"","headline":"현수막 주문 전 체크리스트 — 규격·소재·설치까지","sub":"실외 장기용은 소재가 다릅니다. 주문 전 꼭 확인하세요.","dayLabel":"","captionNote":"실외 장기용은 소재가 다릅니다. 주문 전 꼭 확인하세요.","captionBody":"# 현수막 주문 전, 이것만 확인하세요\n\n현수막은 “어디에, 얼마나 오래”에 따라 소재와 마감이 완전히 달라집니다. 주문 전 체크리스트입니다.\n\n## 1. 설치 장소 (실내/실외)\n실외라면 비·햇빛에 견디는 방수 원단이 필요합니다. 실내·단기 행사면 일반 원단으로 충분합니다.\n\n## 2. 거는 기간\n하루 행사와 몇 달 게시는 소재가 다릅니다. 장기는 색바램·찢김을 견디는 원단으로.\n\n## 3. 마감 방식\n끈으로 묶을지, 아일렛(구멍) 마감을 할지, 각목 마감을 할지 설치 방법에 맞춰 정합니다.\n\n## 4. 규격과 글자 크기\n멀리서 읽혀야 하므로 핵심 문구는 크게. 사이즈에 맞춰 여백도 고려합니다.\n\n## 5. 게시 허가\n지정 게시대·전용 구역 등 지역 규정을 확인하세요.\n\n## 동성인쇄소에 맡기면\n장소·기간만 알려주시면 소재·마감·규격을 딱 맞게 잡아드립니다.\n\n#현수막 #현수막제작 #배너 #실사출력 #동성인쇄소","variant":"A","status":"planned"},{"id":"ig-banner","topic":"현수막","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"Outdoor","headline":"현수막, 실외용은\u003cbr>*무엇이* 다를까","sub":"비·햇빛 견디는 소재와 마감 — 오래 걸 거라면 필독.","dayLabel":"","captionNote":"비·햇빛 견디는 소재와 마감 — 오래 걸 거라면 필독.","captionBody":"현수막은 “어디에 얼마나 오래 거는지”로 소재가 갈립니다.\n\n· 실내·단기 — 일반 원단이면 충분, 값도 저렴합니다.\n· 실외·장기 — 비·햇빛에 견디는 방수 원단 + 튼튼한 마감(아일렛)이 필요해요.\n\n실외에 오래 걸 건데 실내용으로 뽑으면 금방 색이 바래거나 찢어집니다. 반대로 하루 행사용을 비싼 원단으로 할 필요도 없고요.\n\n거는 장소와 기간만 알려주시면 딱 맞게 잡아드립니다.\n\n#현수막 #현수막제작 #배너 #동성인쇄소","variant":"A","status":"planned"},{"id":"th-small-qty","topic":"소량인쇄","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-25T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"“몇 장부터 맡길 수 있어요?” — 소량도 됩니다.\n\n요즘은 디지털 인쇄라 10장, 50장도 가능해요.\n· 시제품·샘플 확인 → 소량으로 먼저\n· 자주 바뀌는 정보(이벤트·행사) → 소량으로 자주\n· 대량은 단가가 낮아지니 “확정된 것”만\n\n버리는 인쇄를 줄이는 게 결국 절약입니다.\n\n#소량인쇄 #디지털인쇄 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-sticker-guide","topic":"스티커","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-26T09:00:00.000Z","kicker":"","headline":"스티커 종류별 활용법 — 제품 라벨·판촉·포장까지","sub":"재질·도무송·방수 여부, 용도에 맞게 고르는 법.","dayLabel":"","captionNote":"재질·도무송·방수 여부, 용도에 맞게 고르는 법.","captionBody":"# 스티커, 용도에 맞게 골라야 값을 합니다\n\n스티커는 재질과 재단(도무송)에 따라 쓰임이 크게 갈립니다. 용도별로 정리했습니다.\n\n## 1. 제품 라벨\n식품·화장품은 방수·내수 재질(유포지 등)이 필요합니다. 냉장·물기 있는 환경이면 특히 중요합니다.\n\n## 2. 판촉·홍보 스티커\n아트지·모조지로 저렴하게. 배포용은 떼기 쉬운 재단(도무송)이 편합니다.\n\n## 3. 포장 봉인\n한 번 떼면 표시가 남는 봉인 스티커, 로고 원형 스티커 등으로 마감 품질을 높입니다.\n\n## 4. 도무송(모양 재단)\n원형·라운드 사각·캐릭터 외곽선까지 원하는 모양대로 칼선을 넣습니다. 모양만 정하시면 칼선은 저희가 잡습니다.\n\n## 동성인쇄소에 맡기면\n재질·방수·모양 재단까지 용도에 맞게 추천해드립니다. 소량도 가능합니다.\n\n#스티커제작 #도무송스티커 #라벨스티커 #동성인쇄소","variant":"A","status":"planned"}],"channels":[{"key":"instagram","label":"인스타그램","icon":"📸","active":true,"published":[],"pending":[{"id":"ig-namecard-qty","topic":"명함인쇄","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-15T09:00:00.000Z","kicker":"Print Guide","headline":"명함 300장 vs 500장,\u003cbr>실제 *단가 차이*는?","sub":"장수만 늘려도 한 장당 값이 뚝 — 인쇄의 원리부터 쉽게.","dayLabel":"","captionNote":"장수만 늘려도 한 장당 값이 뚝 — 인쇄의 원리부터 쉽게.","captionBody":"“명함 몇 장 뽑는 게 이득이에요?” 가장 많이 듣는 질문입니다.\n\n인쇄는 “판을 거는 준비”에 값이 많이 들어요. 그래서 300장이든 500장이든 준비 비용은 비슷하고, 장수가 늘수록 한 장당 값은 뚝 떨어집니다.\n\n소량이 급하면 300장, 자주 돌리는 명함이면 500장 이상이 보통 이득이에요. 애매하면 “한 달에 몇 장 쓰는지”로 정하면 됩니다.\n\n동성인쇄소는 소량·급행도 됩니다. 편하게 문의주세요.\n\n#명함인쇄 #명함제작 #소량인쇄 #동성인쇄소","variant":"A","status":"planned"},{"id":"ig-flyer-paper","topic":"전단지","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-18T09:00:00.000Z","kicker":"Paper Guide","headline":"전단지 종이,\u003cbr>*3가지* 느낌 비교","sub":"같은 디자인도 종이가 바꾼다 — 스노우·아트·모조 한눈에.","dayLabel":"","captionNote":"같은 디자인도 종이가 바꾼다 — 스노우·아트·모조 한눈에.","captionBody":"전단지, 디자인만 신경 쓰기 쉽지만 “종이”가 첫인상을 바꿉니다.\n\n· 스노우지 — 매끈하고 광이 살짝. 사진·음식 컬러가 쨍하게 삽니다.\n· 아트지 — 광이 가장 강해 고급·선명. 화장품·행사 홍보에 잘 맞아요.\n· 모조지 — 무광에 필기 가능. 정보 전달·쿠폰형에 적합합니다.\n\n같은 디자인이라도 종이 하나로 “싸 보임 ↔ 고급”이 갈립니다.\n용도를 말씀해주시면 딱 맞는 종이를 추천해드려요.\n\n#전단지 #전단지제작 #리플렛 #동성인쇄소","variant":"B","status":"planned"},{"id":"ig-finishing","topic":"인쇄후가공","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-21T09:00:00.000Z","kicker":"Finishing","headline":"후가공 한 장으로\u003cbr>보는 *차이*","sub":"코팅·박·형압 — 이름은 어려워도 효과는 확실합니다.","dayLabel":"","captionNote":"코팅·박·형압 — 이름은 어려워도 효과는 확실합니다.","captionBody":"“후가공”이라는 말, 어렵게 들리지만 결과물은 확 다릅니다.\n\n· 코팅 — 표면을 보호하고 색을 더 진하게. 유광/무광 선택 가능.\n· 박(금박·은박) — 금속 광택을 얹어 고급감. 로고·상호에 포인트.\n· 형압 — 눌러서 요철을 만들어 만졌을 때 “고급” 느낌.\n\n명함·청첩장·브랜드 패키지에 하나만 더해도 인상이 달라집니다.\n예산과 용도에 맞게 조합을 추천해드릴게요.\n\n#인쇄후가공 #금박명함 #형압 #동성인쇄소","variant":"C","status":"planned"},{"id":"ig-banner","topic":"현수막","format":"카드뉴스","channels":["instagram"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"Outdoor","headline":"현수막, 실외용은\u003cbr>*무엇이* 다를까","sub":"비·햇빛 견디는 소재와 마감 — 오래 걸 거라면 필독.","dayLabel":"","captionNote":"비·햇빛 견디는 소재와 마감 — 오래 걸 거라면 필독.","captionBody":"현수막은 “어디에 얼마나 오래 거는지”로 소재가 갈립니다.\n\n· 실내·단기 — 일반 원단이면 충분, 값도 저렴합니다.\n· 실외·장기 — 비·햇빛에 견디는 방수 원단 + 튼튼한 마감(아일렛)이 필요해요.\n\n실외에 오래 걸 건데 실내용으로 뽑으면 금방 색이 바래거나 찢어집니다. 반대로 하루 행사용을 비싼 원단으로 할 필요도 없고요.\n\n거는 장소와 기간만 알려주시면 딱 맞게 잡아드립니다.\n\n#현수막 #현수막제작 #배너 #동성인쇄소","variant":"A","status":"planned"}],"stats":{"publishedCount":0,"pendingCount":4,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"threads","label":"스레드","icon":"🧵","active":true,"published":[],"pending":[{"id":"th-express","topic":"급행인쇄","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-16T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"“내일 당장 명함이 필요해요” — 가능합니다.\n\n급행 주문 팁 3가지\n1. 오전에 데이터를 넘기면 당일 작업 확률이 올라갑니다.\n2. 파일은 “인쇄용(재단선 포함, 글꼴 깨짐 없음)”으로. 이게 제일 자주 걸립니다.\n3. 수량이 적을수록 빨라요. 급하면 소량 급행이 답.\n\n급하실 때 전화 한 통이면 바로 확인해드립니다.\n\n#급행인쇄 #명함급행 #동성인쇄소","variant":"A","status":"planned"},{"id":"th-domuson","topic":"스티커","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"스티커 맞출 때 나오는 “도무송”, 어려운 말 아닙니다.\n\n= 원하는 모양대로 칼선을 넣어 떼기 쉽게 재단하는 것.\n원형·라운드 사각·캐릭터 외곽선까지 모양대로 뗄 수 있어요.\n\n제품 라벨, 포장 봉인, 판촉 스티커에 딱입니다.\n모양만 정해주시면 칼선은 저희가 잡아드려요.\n\n#스티커제작 #도무송스티커 #동성인쇄소","variant":"A","status":"planned"},{"id":"th-data-mistakes","topic":"인쇄후가공","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-22T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"인쇄 데이터 넘길 때 자주 나는 실수 3가지\n\n1. 재단 여백 없음 — 가장자리 글자가 잘립니다. 사방 여백 필수.\n2. 글꼴 안 깨짐 처리 안 함 — 남의 컴퓨터에서 폰트가 바뀝니다. 윤곽선(아웃라인)으로.\n3. 저해상도 이미지 — 화면은 괜찮아도 인쇄하면 흐려요. 300dpi 권장.\n\n헷갈리면 파일만 보내주세요. 저희가 점검해서 알려드립니다.\n\n#인쇄데이터 #인쇄팁 #동성인쇄소","variant":"A","status":"planned"},{"id":"th-small-qty","topic":"소량인쇄","format":"텍스트","channels":["threads"],"scheduledFor":"2026-07-25T09:00:00.000Z","kicker":"","headline":"","sub":"","dayLabel":"","captionNote":"","captionBody":"“몇 장부터 맡길 수 있어요?” — 소량도 됩니다.\n\n요즘은 디지털 인쇄라 10장, 50장도 가능해요.\n· 시제품·샘플 확인 → 소량으로 먼저\n· 자주 바뀌는 정보(이벤트·행사) → 소량으로 자주\n· 대량은 단가가 낮아지니 “확정된 것”만\n\n버리는 인쇄를 줄이는 게 결국 절약입니다.\n\n#소량인쇄 #디지털인쇄 #동성인쇄소","variant":"A","status":"planned"}],"stats":{"publishedCount":0,"pendingCount":4,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"naver-blog","label":"네이버 블로그","icon":"📝","active":true,"published":[],"pending":[{"id":"nv-namecard-guide","topic":"명함인쇄","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"","headline":"명함 제작 A to Z — 처음 맡기는 분을 위한 완벽 가이드","sub":"용지·수량·후가공·납기까지, 처음이어도 헷갈리지 않게 정리했습니다.","dayLabel":"","captionNote":"용지·수량·후가공·납기까지, 처음이어도 헷갈리지 않게 정리했습니다.","captionBody":"# 명함 제작, 처음이라 막막하신가요?\n\n명함은 사업의 첫인상입니다. 처음 맡기실 때 알아두면 좋은 것들을 순서대로 정리했습니다.\n\n## 1. 용지 고르기\n일반 명함지(스노우/아트)부터 고급 수입지까지 다양합니다. 무난하게는 300g 스노우지, 고급감을 원하면 두꺼운 수입지나 펄지를 추천합니다.\n\n## 2. 수량 정하기\n인쇄는 준비 비용이 커서 수량이 많을수록 한 장당 값이 내려갑니다. 자주 쓰면 500장 이상, 정보가 자주 바뀌면 소량으로 자주 찍는 편이 좋습니다.\n\n## 3. 후가공으로 차별화\n코팅(유광·무광), 금박·은박, 형압을 더하면 인상이 확 달라집니다. 예산에 맞춰 하나만 더해도 충분합니다.\n\n## 4. 납기\n일반적으로 2~3일, 급하면 당일·익일 급행도 가능합니다. 오전에 인쇄용 파일을 주시면 더 빠릅니다.\n\n## 동성인쇄소에 맡기면\n용지 추천부터 데이터 점검, 후가공 조합까지 상담해드립니다. 처음이셔도 편하게 문의주세요.\n\n#명함인쇄 #명함제작 #명함디자인 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-flyer-guide","topic":"전단지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-20T09:00:00.000Z","kicker":"","headline":"전단지 홍보 효과 높이는 법 — 종이·디자인·배포 팁","sub":"뿌리는 만큼 효과 나려면? 종이 선택부터 배포 타이밍까지.","dayLabel":"","captionNote":"뿌리는 만큼 효과 나려면? 종이 선택부터 배포 타이밍까지.","captionBody":"# 전단지, 아직도 효과 있습니다 — 제대로 하면\n\n온라인 광고가 넘치는 시대에도 전단지는 “지역·매장 홍보”에 여전히 강력합니다. 효과를 높이는 방법을 정리했습니다.\n\n## 1. 종이가 첫인상\n스노우지(사진 잘 삼), 아트지(고급·선명), 모조지(정보·쿠폰형). 용도에 맞춰 고르면 “싸 보임”을 피할 수 있습니다.\n\n## 2. 한눈에 들어오는 디자인\n정보를 다 넣으려다 아무것도 안 읽힙니다. “가장 중요한 한 가지”를 크게. 혜택·기간·연락처는 명확하게.\n\n## 3. 배포 타이밍과 장소\n타깃이 지나는 시간·동선을 노리세요. 쿠폰·QR을 넣으면 효과 측정도 됩니다.\n\n## 4. 사이즈와 접지\nA5 낱장, A4 3단 접지 등 용도별로 다양합니다. 정보량이 많으면 접지형이 유리합니다.\n\n## 동성인쇄소에 맡기면\n용지·사이즈·접지 추천부터 소량 급행까지 도와드립니다.\n\n#전단지 #전단지제작 #리플렛 #홍보물 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-banner-guide","topic":"현수막","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-23T09:00:00.000Z","kicker":"","headline":"현수막 주문 전 체크리스트 — 규격·소재·설치까지","sub":"실외 장기용은 소재가 다릅니다. 주문 전 꼭 확인하세요.","dayLabel":"","captionNote":"실외 장기용은 소재가 다릅니다. 주문 전 꼭 확인하세요.","captionBody":"# 현수막 주문 전, 이것만 확인하세요\n\n현수막은 “어디에, 얼마나 오래”에 따라 소재와 마감이 완전히 달라집니다. 주문 전 체크리스트입니다.\n\n## 1. 설치 장소 (실내/실외)\n실외라면 비·햇빛에 견디는 방수 원단이 필요합니다. 실내·단기 행사면 일반 원단으로 충분합니다.\n\n## 2. 거는 기간\n하루 행사와 몇 달 게시는 소재가 다릅니다. 장기는 색바램·찢김을 견디는 원단으로.\n\n## 3. 마감 방식\n끈으로 묶을지, 아일렛(구멍) 마감을 할지, 각목 마감을 할지 설치 방법에 맞춰 정합니다.\n\n## 4. 규격과 글자 크기\n멀리서 읽혀야 하므로 핵심 문구는 크게. 사이즈에 맞춰 여백도 고려합니다.\n\n## 5. 게시 허가\n지정 게시대·전용 구역 등 지역 규정을 확인하세요.\n\n## 동성인쇄소에 맡기면\n장소·기간만 알려주시면 소재·마감·규격을 딱 맞게 잡아드립니다.\n\n#현수막 #현수막제작 #배너 #실사출력 #동성인쇄소","variant":"A","status":"planned"},{"id":"nv-sticker-guide","topic":"스티커","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-26T09:00:00.000Z","kicker":"","headline":"스티커 종류별 활용법 — 제품 라벨·판촉·포장까지","sub":"재질·도무송·방수 여부, 용도에 맞게 고르는 법.","dayLabel":"","captionNote":"재질·도무송·방수 여부, 용도에 맞게 고르는 법.","captionBody":"# 스티커, 용도에 맞게 골라야 값을 합니다\n\n스티커는 재질과 재단(도무송)에 따라 쓰임이 크게 갈립니다. 용도별로 정리했습니다.\n\n## 1. 제품 라벨\n식품·화장품은 방수·내수 재질(유포지 등)이 필요합니다. 냉장·물기 있는 환경이면 특히 중요합니다.\n\n## 2. 판촉·홍보 스티커\n아트지·모조지로 저렴하게. 배포용은 떼기 쉬운 재단(도무송)이 편합니다.\n\n## 3. 포장 봉인\n한 번 떼면 표시가 남는 봉인 스티커, 로고 원형 스티커 등으로 마감 품질을 높입니다.\n\n## 4. 도무송(모양 재단)\n원형·라운드 사각·캐릭터 외곽선까지 원하는 모양대로 칼선을 넣습니다. 모양만 정하시면 칼선은 저희가 잡습니다.\n\n## 동성인쇄소에 맡기면\n재질·방수·모양 재단까지 용도에 맞게 추천해드립니다. 소량도 가능합니다.\n\n#스티커제작 #도무송스티커 #라벨스티커 #동성인쇄소","variant":"A","status":"planned"}],"stats":{"publishedCount":0,"pendingCount":4,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"blogger","label":"구글 블로그","icon":"🅱️","active":true,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"youtube","label":"유튜브","icon":"▶️","active":true,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]},{"key":"linkedin","label":"링크드인","icon":"💼","active":false,"published":[],"pending":[],"stats":{"publishedCount":0,"pendingCount":0,"avgEngagement":0,"trend":"n/a","totalViews":0,"totalLikes":0},"series":[]}],"channelLinks":[{"key":"instagram","label":"인스타그램","icon":"📸","url":"https://www.instagram.com/dongsung_print","sub":"@dongsung_print"},{"key":"threads","label":"스레드","icon":"🧵","url":"https://www.threads.net/@dongsung_print","sub":"@dongsung_print"},{"key":"naver-blog","label":"네이버 블로그","icon":"📝","url":"https://admin.blog.naver.com/","sub":"관리 열기"},{"key":"blogger","label":"구글 블로그","icon":"🅱️","url":"https://www.blogger.com/","sub":"관리 열기"},{"key":"youtube","label":"유튜브","icon":"▶️","url":"https://studio.youtube.com/","sub":"관리 열기"},{"key":"linkedin","label":"링크드인","icon":"💼","url":"https://www.linkedin.com/","sub":"관리 열기"}],"blog":{"measured":false,"grade":"측정 전","score":0,"posts":[],"keywords":[{"kw":"명함인쇄","searchIndex":64645,"competition":"낮음"},{"kw":"전단지","searchIndex":25526,"competition":"보통"},{"kw":"현수막","searchIndex":76191,"competition":"높음"},{"kw":"스티커","searchIndex":38706,"competition":"높음 const REPO = DATA.repo;
let ci = 0, ch = 'all';
// ── 운영 기간 선택 (전역 상태) ──
let period = { key:'all', from:null, to:null };
function periodRange(){
  if(period.key==='all') return null;
  const now=new Date(); let from,to;
  if(period.key==='7d'){ to=now; from=new Date(now.getTime()-6*864e5); }
  else if(period.key==='14d'){ to=now; from=new Date(now.getTime()-13*864e5); }
  else if(period.key==='30d'){ to=now; from=new Date(now.getTime()-29*864e5); }
  else if(period.key==='month'){ from=new Date(now.getFullYear(),now.getMonth(),1); to=now; }
  else if(period.key==='prev'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=new Date(now.getFullYear(),now.getMonth(),0); }
  else if(period.key==='custom'){
    if(!period.from&&!period.to) return null;
    from=period.from?new Date(period.from):new Date(0);
    to=period.to?new Date(period.to):now;
  } else return null;
  const f=new Date(from); f.setHours(0,0,0,0);
  const t=new Date(to); t.setHours(23,59,59,999);
  return [f.getTime(), t.getTime()];
}
function inPeriod(s){ const r=periodRange(); if(!r) return true; if(!s) return false; const t=new Date(s).getTime(); return t>=r[0]&&t<=r[1]; }
function periodLabel(){
  const names={all:'전체 기간','7d':'최근 7일','14d':'최근 14일','30d':'최근 30일',month:'이번 달',prev:'지난 달',custom:'직접 선택'};
  const r=periodRange();
  const d=x=>new Date(x).toISOString().slice(0,10);
  return names[period.key]+(r?' ('+d(r[0])+' ~ '+d(r[1])+')':'');
}
function periodBar(){
  const b=(k,l)=>'<button class="pbtn'+(period.key===k?' on':'')+'" onclick="setPeriod(\''+k+'\')">'+l+'</button>';
  return '<div class="panel pbar"><span class="pbar-t">📆 운영 기간</span>'+
    b('all','전체')+b('7d','최근 7일')+b('14d','최근 14일')+b('30d','최근 30일')+b('month','이번 달')+b('prev','지난 달')+
    '<span class="pbar-c">직접 선택 <input type="date" id="pfrom" value="'+(period.from||'')+'" onchange="setCustom()"/> ~ <input type="date" id="pto" value="'+(period.to||'')+'" onchange="setCustom()"/></span>'+
    '<span class="muted" style="margin-left:auto">'+periodLabel()+'</span></div>';
}
function setPeriod(k){ period.key=k; renderView(); }
function setCustom(){
  period.key='custom';
  period.from=(document.getElementById('pfrom')||{}).value||null;
  period.to=(document.getElementById('pto')||{}).value||null;
  renderView();
}
// ── 수정요청 (깃허브 이슈 연동: [수정요청·채널키] 제목 규약) ──
let ISSUES=null; // null=로딩중, []=없음/실패
const REQ_RE=/^\[수정요청·([a-z-]+)\]\s*(.*)$/;
function channelIssues(key){ return (ISSUES||[]).filter(x=>x.chKey===key); }
function loadIssues(){
  fetch('https://api.github.com/repos/'+REPO+'/issues?state=all&per_page=100&sort=created&direction=desc')
    .then(r=>r.ok?r.json():[])
    .then(arr=>{
      ISSUES=(Array.isArray(arr)?arr:[]).filter(x=>!x.pull_request).map(x=>{
        const m=REQ_RE.exec(x.title||''); if(!m) return null;
        return { chKey:m[1], titleClean:m[2]||x.title, state:x.state, html_url:x.html_url, created_at:x.created_at, closed_at:x.closed_at };
      }).filter(Boolean);
      renderTabs(); renderView();
    })
    .catch(()=>{ ISSUES=[]; });
}
function reqStatus(x){ return x.state==='closed' ? '<span class="badge b-ok">✅ 처리완료</span>' : '<span class="badge b-wait">🛠 처리중</span>'; }
function requestsPanel(key, chLabel){
  const list=channelIssues(key);
  const open=list.filter(x=>x.state!=='closed').length;
  let h='<div class="panel" style="border-color:#d9c2ee;background:#fcfaff"><div class="sect-h" style="margin:0 0 10px"><h3>✏️ 수정요청 게시판 · '+esc(chLabel)+'</h3><span class="muted">'+(ISSUES===null?'불러오는 중…':('🛠 처리중 '+open+'건 · 총 '+list.length+'건'))+'</span></div>';
  if(list.length){
    h+='<table><tr><th style="width:92px">상태</th><th>요청 내용</th><th style="width:100px">등록일</th><th style="width:52px"></th></tr>'+
      list.map(x=>'<tr><td>'+reqStatus(x)+'</td><td>'+esc(x.titleClean)+'</td><td class="muted">'+String(x.created_at||'').slice(0,10)+'</td><td><a href="'+esc(x.html_url)+'" target="_blank">보기↗</a></td></tr>').join('')+'</table>';
  } else if(ISSUES!==null){
    h+='<div class="empty" style="padding:8px">아직 등록된 수정요청이 없습니다. 아래에 바로 작성해 보세요.</div>';
  }
  h+='<div style="margin-top:12px"><textarea id="reqtext-'+esc(key)+'" class="reqta" rows="3" placeholder="수정하고 싶은 내용을 적어주세요. 예) 3번 카드 문구를 더 짧게 / 커버 이미지 톤을 밝게 / 해시태그에 #청담맛집 추가"></textarea>'+
    '<div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap"><button class="btn fb" onclick="submitReq(\''+esc(key)+'\',\''+esc(chLabel)+'\')">✏️ 수정요청 등록</button>'+
    '<span class="muted">등록을 누르면 깃허브 창이 열립니다 — 초록색 “Submit new issue” 버튼만 누르면 접수 완료. 처리 상태는 이 게시판에 자동 표시됩니다.</span></div></div></div>';
  return h;
}

const BRAND_FIELDS=[

function sparkline(arr){
  if(!arr||arr.length<2) return '';
  const w=160,h=34,mx=Math.max(...arr,1),mn=Math.min(...arr,0);
  const dx=w/(arr.length-1);
  const pts=arr.map((v,i)=>[i*dx,h-((v-mn)/(mx-mn||1))*(h-6)-3]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return '<svg class="spark" width="'+w+'" height="'+h+'"><path d="'+d+'" fill="none" stroke="#2b6fff" stroke-width="2"/></svg>';
}

// 네이버 붙여넣기용 평문(마크다운 기호 제거, 이미지 위치는 마커로)
function plainPostText(it){
  let n=0;
  return String(it.captionBody||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img){ n++; return '\n[📷 이미지'+n+' 삽입]\n'; }
    if(t.startsWith('## ')) return '\n■ '+t.slice(3);
    if(t.startsWith('# ')) return t.slice(2);
    if(t==='>'||t.startsWith('> ')) return t.replace(/^>\s?/,'');
    return line.replace(/\*\*([^*]+)\*\*/g,'$1');
  }).join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

// 블로그/대본 등 본문의 가벼운 마크다운(## 소제목, [HOOK] 등)을 보기 좋게
function mdInline(x){ return esc(x).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function fmtCaption(s){
  return String(s||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img) return '<img class="md-img" src="'+esc(img[2])+'" alt="'+esc(img[1])+'" loading="lazy"/>';
    if(t.startsWith('## ')) return '<h4 class="md-h">'+mdInline(t.slice(3))+'</h4>';
    if(t.startsWith('# ')) return '<h3 class="md-h1">'+mdInline(t.slice(2))+'</h3>';
    if(t==='>'||t.startsWith('> ')) return '<div class="md-quote">'+mdInline(t.replace(/^>\s?/,''))+'</div>';
    if(t.indexOf('🔖')===0) return '<div class="md-tags">'+esc(t)+'</div>';
    if(/^\[.+\]$/.test(t)) return '<div class="md-tag">'+esc(t)+'</div>';
    if(t==='---'||t==='') return '<div class="md-sp"></div>';
    return '<div>'+mdInline(line)+'</div>';
  }).join('');
}
function channelDetail(client, c){
  const chLabel=(DATA.channels.find(x=>x.key===c.key)||{}).label||c.key;
  let h='';
  // ① 수정요청 게시판 — 채널 최상단 (작성 + 처리 현황)
  h+=requestsPanel(c.key, chLabel);
  // ② 운영 기간 선택 — 아래 데이터/히스토리에 모두 적용
  h+=periodBar();
  // ③ 이 채널의 콘텐츠 가이드(운영자 지침) — 생성에 자동 반영됨
  h+=channelGuidePanel(client, c.key);
  // 기획안 패널
  const planTitle='['+client.name+'/'+chLabel+'] 기획안 피드백';
  const planBody='이 채널 기획안에 대한 피드백/수정사항을 적어주세요.\n\n[현재 기획안]\n- 키워드: '+client.keywords.join(', ')+'\n- 브랜드 말투: '+client.brandTone+'\n- 발행시간: '+client.schedule.join(', ')+'\n- 디자인 스타일: '+client.designStyle.mood+' / '+client.designStyle.palette+'\n\n[수정 요청]\n';
  h+='<div class="panel"><div class="sect-h" style="margin:0 0 8px"><h3>📋 기획안</h3><a class="btn fb" href="'+issue(planTitle,planBody)+'" target="_blank">✏️ 기획안 피드백</a></div>'+
     '<div>'+client.keywords.map(k=>'<span class="tag">#'+esc(k)+'</span>').join('')+'</div>'+
     '<div class="muted" style="margin-top:8px">말투: '+esc(client.brandTone)+' · 발행 '+client.schedule.join(', ')+' · 검수 '+esc(client.reviewMode)+' · 디자인 v'+client.designVersion+'</div>'+
     '<div class="muted">디자인 스타일: '+esc(client.designStyle.mood)+' / '+esc(client.designStyle.palette)+' / '+esc(client.designStyle.composition)+'</div></div>';
  if(!c.active){
    h+='<div class="panel"><div class="empty">이 채널은 아직 <b>연결되지 않았습니다</b>. 설정표(targets)에 '+chLabel+'을 추가하고 키를 연결하면 자동 발행이 시작됩니다.</div></div>';
  }
  // 선택 기간으로 필터한 히스토리·데이터
  const pubF=c.published.filter(p=>inPeriod(p.time));
  const planPubF=c.pending.filter(it=>it.status==='published'&&inPeriod(it.publishedAt||it.scheduledFor));
  const waiting=c.pending.filter(it=>it.status!=='published');
  // KPI (기간 반영) — 사이클 발행분(pubF) + 기획 발행분(planPubF) 합산
  const mAll=pubF.map(p=>({t:p.time,v:p.views,l:p.likes,e:p.engagementRate}))
    .concat(planPubF.map(it=>{const m=it.metrics||{};return {t:it.publishedAt||it.scheduledFor,v:m.views||0,l:m.likes||0,e:m.engagementRate||0};}));
  const avgF=mAll.length?mAll.reduce((a,x)=>a+x.e,0)/mAll.length:0;
  h+='<div class="kpis">'+
    kpi(mAll.length,'발행됨'+(period.key!=='all'?' (기간)':''))+
    kpi(waiting.length,'발행 대기')+
    kpi(pct(avgF)+' '+tIcon(c.stats.trend),'평균 참여율',true)+
    kpi(mAll.reduce((a,x)=>a+x.v,0),'누적 조회')+
    kpi(mAll.reduce((a,x)=>a+x.l,0),'누적 좋아요')+'</div>';
  const seriesF=mAll.slice().sort((a,b)=>String(a.t||'').localeCompare(String(b.t||''))).map(x=>x.e*100);
  if(seriesF.length>1){h+='<div class="panel"><h3>반응도 추세 (참여율 %) · '+periodLabel()+'</h3>'+sparkline(seriesF.slice(-12))+'</div>';}
  // 발행 콘텐츠 데이터(성과 + 인사이트 코멘트) — 기간 반영
  h+=pubDataRows(planPubF);
  // 네이버 블로그 → blogdex 스타일
  if(c.key==='naver-blog'){ h+=blogSection(client); }
  // 발행 대기 (발행 전 콘텐츠만)
  h+='<div class="sect-h"><h2>🕓 발행 대기 콘텐츠 ('+waiting.length+')</h2></div>';
  h+= waiting.length? '<div class="cards">'+waiting.map(it=>planCard(client,chLabel,it)).join('')+'</div>' : '<div class="empty">예정된 콘텐츠가 없습니다. 다음 사이클에 자동 생성됩니다.</div>';
  // 발행됨 — 기간 반영 히스토리 (기획 발행분 + 사이클 발행분)
  h+='<div class="sect-h"><h2>✅ 발행된 콘텐츠 · '+periodLabel()+' ('+(planPubF.length+pubF.length)+')</h2></div>';
  const pubCards=planPubF.map(it=>planCard(client,chLabel,it)).concat(pubF.map(p=>publishedCard(p,'<span class="badge b-ok">발행</span>')));
  h+= pubCards.length? '<div class="cards">'+pubCards.join('')+'</div>' : '<div class="empty">이 기간에 발행된 콘텐츠가 없습니다.</div>';
  return h;
}

function pubDataRows(items){
  // 발행된 콘텐츠의 채널별 성과 데이터 + 인사이트 코멘트
  const pub=items.filter(it=>it.status==='published'&&it.metrics);
  if(!pub.length) return '';
  pub.sort((a,b)=>(b.publishedAt||'').localeCompare(a.publishedAt||''));
  const rows=pub.map(it=>{const m=it.metrics||{};
    return '<tr><td><b>'+esc(plainHead(it))+'</b><div class="muted">'+ftime(it.publishedAt)+(it.variant?' · '+esc(it.variant)+'안':'')+'</div>'+
      (it.insightComment?'<div style="color:#15803d;font-size:12px;margin-top:4px">💬 '+esc(it.insightComment)+'</div>':'')+'</td>'+
      '<td>'+(m.views||0)+'</td><td>'+(m.likes||0)+'</td><td>'+(m.comments||0)+'</td><td>'+pct(m.engagementRate||0)+'</td>'+
      '<td>'+(it.publishedUrl?'<a href="'+esc(it.publishedUrl)+'" target="_blank">열기↗</a>':'')+'</td></tr>';
  }).join('');
  return '<div class="panel"><div class="sect-h" style="margin:0 0 8px"><h3>📊 발행 콘텐츠 데이터</h3><span class="muted">'+pub.length+'건 · 성과+인사이트</span></div>'+

}

      const iss=channelIssues(c.key); const openN=iss.filter(x=>x.state!=='closed').length;
      const reqCell=iss.length?(openN?'<span class="badge b-wait">🛠 처리중 '+openN+'</span>':'<span class="badge b-ok">✅ 완료 '+iss.length+'</span>'):'<span class="muted">-</span>';
      return '<tr><td>'+lab.icon+' '+lab.label+'</td><td>'+(c.active?'<span class="badge b-ok">연결</span>':'<span class="badge b-hold">미연결</span>')+'</td><td>'+c.stats.publishedCount+'</td><td>'+c.stats.pendingCount+'</td><td>'+pct(c.stats.avgEngagement)+' '+tIcon(c.stats.trend)+'</td><td>'+reqCell+'</td></tr>';}).join('')+'</table></div>';
  // 발행 전 콘텐츠 기획안 — 메인에는 발행 전(예정·수동대기)만 보여준다
  const plan=client.planCards||[];
  const pre=plan.filter(p=>p.status!=='published');
  const fbTitle='['+client.name+'] 기획안 전체 피드백';
  const fbBody='이번 달 기획안에 대한 의견/수정사항을 적어주세요.\n\n';
  const mon=new Date(DATA.generatedAt).getMonth()+1;
  h+='<div class="sect-h"><h2>🕓 '+mon+'월 발행 전 콘텐츠 ('+pre.length+')</h2><a class="btn fb" href="'+issue(fbTitle,fbBody)+'" target="_blank">✏️ 기획안 피드백</a></div>';
  if(!pre.length){ h+='<div class="empty">발행 전 콘텐츠가 없습니다. 다음 사이클에 자동 생성됩니다.</div>'; }
  else {
    for(const chDef of DATA.channels){
      const items=pre.filter(p=>(p.channels||[]).includes(chDef.key));
      if(!items.length) continue;
      const lab=chDef.icon+' '+chDef.label;
      h+='<div class="chgrp"><div class="chgrp-h">'+lab+' <span class="muted">'+items.length+'건 · '+esc((items[0].format)||'')+'</span></div>'+
         '<div class="cards">'+items.map(p=>planCard(client,chDef.label,p)).join('')+'</div></div>';
    }
  }
  // 선택한 기간의 발행 게시물 (기획 발행분 + 사이클 발행분)
  const planPub=plan.filter(p=>p.status==='published'&&inPeriod(p.publishedAt||p.scheduledFor))
    .sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));
  const recent=[].concat(...client.channels.map(c=>c.published)).filter(p=>inPeriod(p.time))
    .sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,12);
  h+='<div class="sect-h"><h2>✅ 발행된 게시물 · '+periodLabel()+' ('+(planPub.length+recent.length)+')</h2></div>';
  const pubCards=planPub.map(p=>{
    const chDef=DATA.channels.find(x=>x.key===((p.channels||[])[0]))||{label:''};
    return planCard(client,chDef.label,p);
  }).concat(recent.map(p=>publishedCard(p,'<span class="badge b-ok">발행</span>')));
  h+= pubCards.length?'<div class="cards">'+pubCards.join('')+'</div>':'<div class="empty">이 기간에 발행된 게시물이 없습니다.</div>';
  // 경쟁사
  h+='<div class="panel" style="margin-top:16px"><h3>벤치마킹 경쟁사</h3><div>'+(client.competitors.length?client.competitors.map(x=>'<span class="tag">@'+esc(x)+'</span>').join(''):'<span class="muted">미설정</span>')+'</div></div>';
  return h;
}
function kpi(v,l,accent){return '<div class="kpi"><div class="v'+(accent?' accent':'')+'">'+v+'</div><div class="l">'+l+'</div></div>';}
function renderClients(){
  document.getElementById('clients').innerHTML = DATA.clients.length>1 ? DATA.clients.map((c,i)=>'<button class="cbtn'+(i===ci?' on':'')+'" onclick="setClient('+i+')">'+esc(c.name)+'</button>').join('') : '';
}
function renderTabs(){
  const c=DATA.clients[ci];
  const tabs=[{key:'all',label:'전체',icon:'🏠',active:true}]
    .concat(DATA.channels.map(ch=>{const cc=c.channels.find(x=>x.key===ch.key);return {key:ch.key,label:ch.label,icon:ch.icon,active:cc&&cc.active};}))
    .concat([{key:'guide',label:'지침',icon:'🧭',active:true,noDot:true}]);
  document.getElementById('tabs').innerHTML = tabs.map(t=>{
    // 수정요청 진행상황 아이콘 — 🛠 처리중 n건 / ✅ 전부 처리완료
    let req='';
    if(t.key!=='all'){
      const iss=channelIssues(t.key);
      const openN=iss.filter(x=>x.state!=='closed').length;
      req = openN ? '<span class="treq open" title="수정요청 처리중 '+openN+'건">🛠'+openN+'</span>'
          : (iss.length ? '<span class="treq done" title="수정요청 전부 처리완료">✅</span>' : '');
    }
    return '<button class="tab'+(t.key===ch?' on':'')+'" onclick="setCh(\''+t.key+'\')">'+t.icon+' '+t.label+(t.key!=='all'&&!t.noDot?'<span class="dot '+(t.active?'live':'off')+'"></span>':'')+req+'</button>';
  }).join('');
}
function renderView(){
  const c=DATA.clients[ci];
  document.getElementById('view').innerHTML = ch==='all'?overview(c):(ch==='guide'?guideView(c):channelDetail(c,c.channels.find(x=>x.key===ch)));
  document.getElementById('gen').textContent = ftime(DATA.generatedAt)+' (UTC)';
}
function setClient(i){ci=i;ch='all';renderClients();renderTabs();renderView();window.scrollTo(0,0);}
function setCh(k){ch=k;renderTabs();renderView();window.scrollTo(0,0);}
try {
  renderClients(); renderTabs(); renderView(); loadIssues();
} catch (e) {
  var v = document.getElementById('view');
  if (v) v.innerHTML = '<div style="padding:24px;line-height:1.7;color:#b91c1c">표시 중 오류: '
    + ((e && e.message) || e)
    + '<br><br><button onclick="location.reload(true)" style="padding:10px 16px;border-radius:8px;border:0;background:#2b6fff;color:#fff;font-size:15px">새로고침</button></div>';
}
</script>
</body>
</html>

ver-blog"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"","headline":"\"로고 금색으로 인쇄해주세요\" — 잠깐만요, 그건 금색 그림이에요","sub":"진짜 금속광이 앉는 금박의 원리와, 박 색상 고르는 법","dayLabel":"","captionNote":"진짜 금속광이 앉는 금박의 원리와, 박 색상 고르는 법","captionBody":"🎯 결론부터요! 금박은 잉크가 아니라 \"박 필름\"을 동판으로 눌러 앉히는 거예요. 그래서 진짜 금속광이 살아있어요 ✨\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n상담하다 보면 \"로고를 금색 잉크로 인쇄하면 안 되나요?\" 하고 물으세요.\n되긴 되는데, 금색 잉크는 \"금색 그림\"이고 금박은 \"진짜 금속\"이라 느낌이 완전히 달라요.\n\n![금박 스탬핑 매크로](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_81853556-0749-49e7-b9ce-73d0c3904360.png)\n\n🔥 박이 앉는 원리, 생각보다 아날로그해요\n세 가지가 만나서 완성돼요.\n① 로고 모양대로 새긴 동판(도장처럼요) ② 금·은 금속광 박 필름 ③ 열과 압력\n뜨거운 동판이 박 필름을 종이에 \"꾹\" 눌러 붙여요.\n그래서 살짝 눌린 자국과 반짝임이 함께 생기는데, 이 손맛이 오히려 고급스러워요.\n\n🌈 금박만 있는 게 아니에요\n· 금박 — 홍삼·주류·명절 세트의 정석\n· 은박 — 모던하고 세련된 화장품·테크 제품에\n· 먹박 — 검정 유광, \"블랙 온 블랙\"의 조용한 럭셔리 🖤\n· 홀로그램박 — 각도마다 무지개빛, 한정판·굿즈에 인기\n\n![형압 매크로](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203156_00d77cc7-d8bb-4c6a-83ca-75867ee131d9.png)\n\n💡 팁 하나 — 무광 위에서 제일 예뻐요\n박은 무광 코팅된 어두운 종이 위에서 가장 극적으로 빛나요.\n배경이 차분할수록 박이 주인공이 된답니다.\n\n![네이비 박스 + 금박 로고](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n💰 비용 아끼는 포인트\n박 비용은 동판(1회) + 작업비(면적·수량)예요.\n· 같은 로고면 동판을 박스·쇼핑백·명함에 재사용할 수 있어요\n· 박 면적을 줄이고 위치를 영리하게(로고+포인트 라인) 잡으면 효과가 제일 좋아요\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_6e613bae-941f-4791-bc61-e7bd631edb62.png)\n\n🙌 마무리하며\n박은 혼자보다 조합에서 완성돼요. 무광+금박, 형압+박 동시… 저희가 제일 잘하는 거예요.\n로고 파일만 보내주시면 어떤 박이 어울릴지 샘플과 함께 제안해드릴게요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#금박인쇄 #금박 #은박 #홀로그램박 #인쇄후가공 #패키지제작 #동성특수인쇄","variant":"A","status":"planned"},{"id":"gb-foil","topic":"금박인쇄","format":"블로그","channels":["blogger"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"","headline":"박(포일) 후가공 종류 정리 — 금·은·먹·홀로그램, 뭐가 다를까","sub":"박 색상별 특징과 디자인 데이터 팁 정보 정리본","dayLabel":"","captionNote":"박 색상별 특징과 디자인 데이터 팁 정보 정리본","captionBody":"🎯 핵심부터! 박은 잉크가 아니라 금속 필름을 동판+열+압력으로 눌러 앉히는 후가공이에요. 색상은 금·은·먹·홀로그램 등 다양해요 ✨\n\n안녕하세요, 동성특수인쇄예요 😊\n박은 프리미엄 패키지의 상징이에요.\n종류와 데이터 팁을 정리해드릴게요.\n\n![금박 스탬핑](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_3ac8f543-8286-4050-a520-6f543f41c7b4.png)\n\n🌈 박 색상 도감\n· 금박 — 클래식, 홍삼·주류·명절 (유광/무광)\n· 은박 — 모던·차가운 세련미, 화장품·테크\n· 먹박 — 검정 유광, 블랙 온 블랙\n· 적/청/녹박 — 브랜드 컬러 포인트\n· 홀로그램박 — 각도별 무지개빛, 한정판·굿즈\n\n🔬 원리 (3요소)\n동판(로고 모양) + 박 필름 + 열·압력.\n도장 찍듯 눌러서 금속광을 앉혀요. 살짝 눌린 자국이 오히려 고급감이에요.\n\n![형압+박 느낌](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203156_00d77cc7-d8bb-4c6a-83ca-75867ee131d9.png)\n\n🖥️ 디자인 데이터 팁\n· 박 영역은 별도 레이어/별색으로 분리\n· 0.3mm 이하 가는 선은 뭉갤 수 있어 조정 권장\n· 박과 인쇄를 딱 겹치는 디자인은 오차 여유를 두기\n파일 검토 때 저희가 다 봐드리니 걱정 마세요.\n\n![박 적용 박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_9a74772e-e25c-4a89-b77c-226ac90308f1.png)\n\n💰 비용 절약 포인트\n· 같은 로고면 동판을 박스·쇼핑백·명함에 재사용\n· 박 면적은 로고+포인트로 절제\n· 시즌 물량을 묶어 동판 개발비 1회로\n\n![공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_24fd98d8-e690-4aef-9a3b-bd9720d64adb.png)\n\n✅ 정리\n박은 조합에서 완성돼요 — 무광+금박, 형압+박 동시 등.\n로고 파일만 주시면 어울리는 박과 조합을 샘플로 제안해드릴게요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#금박인쇄 #박후가공 #은박 #먹박 #홀로그램박 #인쇄후가공 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-structure","topic":"지기구조","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-25T09:00:00.000Z","kicker":"","headline":"예쁜 박스보다 중요한 것, 눈에 안 보이는 \"지기구조\" 이야기","sub":"좋은 상자는 목형에서 태어나요 — 구조가 곧 원가입니다","dayLabel":"","captionNote":"좋은 상자는 목형에서 태어나요 — 구조가 곧 원가입니다","captionBody":"🎯 결론부터! 박스의 성패는 겉디자인이 아니라 \"지기구조(설계 도면)\"에서 갈려요. 구조가 곧 원가거든요 📐\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n박스를 쫙 펼치면 나오는 납작한 전개도, 보신 적 있으세요?\n어디를 자르고 어디를 접을지 그린 그 도면이 바로 \"지기구조\"예요.\n디자인이 얼굴이라면, 지기구조는 뼈대와 관절 의 정체 — 구조·견적·납기까지 실장이 풀어드려요","dayLabel":"","captionNote":"버리기 아까운 그 상자의 정체 — 구조·견적·납기까지 실장이 풀어드려요","captionBody":"🎯 결론부터 말씀드리면요, 백화점 선물세트의 그 묵직한 상자는 대부분 \"싸바리박스\"예요. 두꺼운 합지에 좋은 종이를 손으로 감싸 붙인, 패키지의 끝판왕이죠 ✨\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n명절에 홍삼 세트 받아보면, 내용물 다 먹고도 상자는 못 버리고 화장대에 올려두신 적 있으시죠?\n저는 그 마음을 정말 잘 알아요. 잘 만든 상자는 그 자체로 \"간직하고 싶은 것\"이 되거든요.\n\n![딥네이비 싸바리 기프트박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n🎁 싸바리박스가 뭐냐면요\n쉽게 말해 \"단단한 뼈대에 예쁜 옷을 입힌 상자\"예요.\n2~3mm 두께의 합지(보드지)로 몸통을 잡고, 그 위에 인쇄한 수입지를 한 장 한 장 감싸 붙여요.\n이 \"싸서 바른다\"는 공정에서 이름이 왔답니다.\n그래서 형태가 안 무너지고, 종이 질감이 그대로 살아요.\n\n✨ 형태도 생각보다 다양해요\n· 상하짝(뚜껑+몸통) — 홍삼·건기식 세트의 기본이에요\n· 자석형 — 뚜껑이 \"탁\" 닫히는 그 느낌, 화장품·VIP 기프트에 인기 만점 🧲\n· 서랍형 — 여는 동작 자체가 특별해져요\n여기에 병이나 앰플이 들어가면, 흔들리지 않게 잡아주는 트레이(내지)까지 같이 설계해요.\n\n![자석박스 개봉 장면](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203149_b26af749-afcc-4d8f-a0b6-75c3cfa90139.png)\n\n💰 견적은 이렇게 정해져요\n많이들 궁금해하시는데, 싸바리 견적은 네 가지예요.\n① 개발비(목형·동판) — 처음 딱 한 번만 들어가요\n② 자재(합지 두께·겉지 종류) ③ 후가공(박·형압 등) ④ 수량\n개발비가 고정이라, 수량이 늘수록 개당 값은 뚝 떨어져요 📉\n그래서 500개와 3,000개의 개당 가격이 꽤 달라진답니다.\n\n![금박 스탬핑 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_81853556-0749-49e7-b9ce-73d0c3904360.png)\n\n⏰ 납기는 넉넉히 잡아주세요\n싸바리는 손이 많이 가서 보통 1~2주, 여기에 디자인 확정과 샘플 확인까지 하면 한 달 가까이 봐요.\n특히 명절 시즌엔 8월부터 주문이 몰려서, 늦으면 원하는 사양을 포기하게 되더라고요 🥲\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_6e613bae-941f-4791-bc61-e7bd631edb62.png)\n\n🙌 마무리하며\n저희는 본 제작 전에 실물 가제본으로 색·후가공을 꼭 확인시켜 드려요.\n포장상자 구조 실용신안도 여러 개 갖고 있어서, 구조부터 검수까지 안심하고 맡기실 수 있어요.\n\"우리 브랜드엔 어떤 상자가 어울릴까?\" 고민되시면, 제품 사진만 들고 편하게 문의 주세요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#싸바리박스 #패키지제작 #박스제작 #고급박스 #선물세트박스 #화장품박스 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-cosmetic","topic":"화장품박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-17T09:00:00.000Z","kicker":"","headline":"화장품 박스 처음 맡기신다면, 이 순서만 기억하세요","sub":"구조 먼저, 후가공은 그 다음 — 발주 전 알아두면 실패 없는 이야기","dayLabel":"","captionNote":"구조 먼저, 후가공은 그 다음 — 발주 전 알아두면 실패 없는 이야기","captionBody":"🎯 결론부터요! 화장품 박스는 \"구조(지기구조)\"를 먼저 정하고, \"후가공\"은 그 다음이에요. 이 순서만 지켜도 첫 발주에서 실패가 확 줄어요 💄\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n브랜드 막 시작하신 분들이 \"뭐부터 정해야 해요?\" 하고 물으시면, 저는 늘 같은 답을 드려요.\n예쁜 디자인보다, 상자의 \"뼈대\"가 먼저라고요.\n\n![미니멀 화장품 단상자](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_202831_f6ba7464-cbe6-4542-8bda-a19e64361f12.png)\n\n📦 1단계 — 구조를 정해요\n단상자(한 장을 접어 만드는 상자)는 바닥 모양으로 나뉘어요.\n· 맞뚜껑 — 가볍고 단정, 크림·쿠션에 좋아요\n· 십자조립 — 더 튼튼해서 유리 용기도 안심 💪\n· 삼면접착(오토바닥) — 옆을 누르면 바닥이 촤악, 라인 포장이 빨라져요\n앰플처럼 흔들리면 안 되는 제품은 칸막이·트레이까지 같이 설계한답니다.\n\n✨ 2단계 — 후가공으로 얼굴을 입혀요\n구조가 몸이라면 후가공은 표정이에요.\n· 무광 코팅 + 금박 로고 — 제일 실패 없는 클래식이에요\n· 형압 — 눌러 새겨서, 만졌을 때 \"어?\" 하는 고급감 👆\n· 부분UV — 무광 위에 유광 포인트, 미니멀 브랜드에 딱\n\n![형압 디테일 매크로](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203156_00d77cc7-d8bb-4c6a-83ca-75867ee131d9.png)\n\n📝 3단계 — 파일 점검은 저희가 해요\n디자인 파일 주시면 칼선·여백·해상도, 박 영역 분리까지 저희가 먼저 확인해요.\n이 단계에서 잘 맞춰두면 재작업이 없어요.\n\"이게 인쇄가 될까?\" 싶은 것도 그냥 보내주세요, 봐드릴게요 😊\n\n![금박 로고 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_3ac8f543-8286-4050-a520-6f543f41c7b4.png)\n\n🎨 종이 하나로도 톤이 바뀌어요\n같은 구조·같은 후가공이라도 종이가 다르면 완성품이 달라져요.\n차분한 스킨케어는 무광 수입지, 화사한 메이크업은 펄지, 내추럴 컨셉은 크라프트가 잘 어울려요.\n상담 오시면 지류 샘플북 펼쳐놓고 같이 만져보며 골라드려요 🖐️\n\n![화장품 단상자 스튜디오 컷](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_202831_1a7b53c8-7d07-4f72-885a-08ef2d363136.png)\n\n🙌 마무리하며\n대량 인쇄 전엔 가제본 샘플로 색과 후가공을 꼭 확인받으세요.\n저희는 최소수량도 조율 가능하고, 낱개 샘플까지 만들어드려요.\n처음이라 불안한 브랜드일수록, 오히려 편하게 문의 주세요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#화장품박스 #단상자 #패키지제작 #지기구조 #금박인쇄 #형압 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-chuseok","topic":"선물세트박스","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-19T09:00:00.000Z","kicker":"","headline":"아직 7월인데요? 추석 선물세트 박스는 지금이 골든타임이에요","sub":"공장 달력은 두 달 빨라요 — 홍삼·건기식 세트 납기 역산 이야기","dayLabel":"","captionNote":"공장 달력은 두 달 빨라요 — 홍삼·건기식 세트 납기 역산 이야기","captionBody":"🎯 결론부터! 9월 말 추석이면, 선물세트 박스 발주는 \"지금 7월\"이 딱 좋아요. 8월엔 주문이 몰려서 늦으면 사양을 포기하게 되거든요 ⏰\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n한여름에 웬 추석이냐 하시겠지만, 패키지 공장 달력은 세상보다 두 달 빨리 가요.\n매년 이맘때 미리 오시는 브랜드가 제일 여유롭게, 제일 예쁘게 나가시더라고요.\n\n![홍삼 선물세트 + 트레이 내지](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151252_bd1d11a5-3749-4cfe-ae82-a41d34e76e47.png)\n\n📅 왜 지금이냐면요\n제작 기간을 역산해볼게요.\n· 9월 중순 — 백화점·온라인 입점, 판매 시작\n· 9월 초 — 납품 완료, 제품 담기\n· 8월 — 본 제작 (이때부터 공장 성수기 🔥)\n· 7월 — 사양 상담·견적·디자인 ← 바로 지금!\n싸바리 1~2주, 조립가공 2~4주에 샘플 확인까지 더하면, 진짜 시간이 빠듯해요.\n\n🎁 선물세트는 이렇게 챙겨요\n· 구성품 확정 — 병 몇 개, 스틱 몇 포인지에 따라 내지가 달라져요\n· 구조 — 상하짝은 클래식, 자석형은 개봉감이 좋아요\n· 후가공 — 금박 로고 + 형압이 명절 세트의 정석이에요 ✨\n\n![프리미엄 기프트박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_9a74772e-e25c-4a89-b77c-226ac90308f1.png)\n\n💡 예를 들어볼게요\n홍삼 스틱 30포 세트라면요,\n딥레드 무광 싸바리 + 금박 로고 + 스틱 3단 트레이 + 같은 톤 쇼핑백.\n이게 정석 조합이에요.\n예산을 줄이고 싶으면 겉지를 바꾸거나 형압을 빼고, 더 높이고 싶으면 자석형이나 보자기를 더해요.\n이런 조율이 저희가 하는 일이에요 😊\n\n![리본 쇼핑백](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151940_ad790e3f-deb4-4854-ab27-8f1bf71cd46b.png)\n\n🙌 마무리하며\n설·추석 물량을 같이 계획하면 개발비가 한 번으로 끝나서 개당 값이 유리해져요.\n구성품이 아직 안 정해졌어도 괜찮아요, 후보 2~3안으로 상담 시작하셔도 돼요.\n이번 주에 구성품 리스트만 들고 연락 주셔도 좋아요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#추석선물세트 #선물세트박스 #홍삼패키지 #싸바리박스 #패키지제작 #명절선물포장 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-shoppingbag","topic":"쇼핑백제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-21T09:00:00.000Z","kicker":"","headline":"손님이 들고 걷는 쇼핑백, 사실 돈 안 드는 광고예요","sub":"자동 vs 수동, 손잡이, 박스와 톤 맞추기 — 후회 없는 쇼핑백 이야기","dayLabel":"","captionNote":"자동 vs 수동, 손잡이, 박스와 톤 맞추기 — 후회 없는 쇼핑백 이야기","captionBody":"🎯 결론부터요! 쇼핑백은 \"걸어다니는 광고판\"이에요. 박스와 톤만 맞춰도 브랜드 완성도가 확 올라가요 🛍️\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n매장을 나선 손님의 쇼핑백은 지하철에서, 카페에서 계속 노출돼요.\n그런데 의외로 박스 다 만들고 \"아 맞다 쇼핑백!\" 하고 급하게 준비하는 경우가 많더라고요 🥲\n\n![프리미엄 쇼핑백](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151940_aa0802a8-caf0-4fde-a17b-c5db6cc9a45c.png)\n\n⚙️ 자동 vs 수동, 뭐가 다를까요\n· 자동 쇼핑백 — 기계 생산이라 대량·단가·납기에 유리해요\n· 수동(수제) 쇼핑백 — 두꺼운 종이, 특수지, 비규격 사이즈까지 자유로워요\n백화점 명품관 쇼핑백이 유독 단단한 이유가, 수제 공정 + 두꺼운 지류 + 후가공 조합이에요.\n\n🎀 손잡이 하나로 급이 달라져요\n· 종이 트위스트 — 기본, 경제적\n· 새틴 리본 — 손에 닿는 감촉이 부드러워 화장품·기프트에 인기 ✨\n· 아일렛(금속 링) 마감 — 오래 들어도 튼튼하고 디테일이 살아요\n\n![네이비 기프트박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n🎨 박스와 세트로 맞추면요\n같은 지류, 같은 박 색으로 맞추면 매장 진열부터 선물하는 순간까지 톤이 이어져요.\n로고 동판을 박스와 공유하면 개발비도 아낄 수 있고요 💰\n\n![금박 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_81853556-0749-49e7-b9ce-73d0c3904360.png)\n\n📏 실패의 90%는 사이즈예요\n박스가 꽉 껴서 안 예쁘거나, 헐렁해서 놀거나…\n저희는 실제 박스(또는 가제본)를 놓고 여유 폭을 계산해 도면을 잡아드려요.\n박스랑 쇼핑백을 같은 곳에서 만들면 이 과정이 한 번에 끝나는 것도 장점이에요 😊\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_24fd98d8-e690-4aef-9a3b-bd9720d64adb.png)\n\n🙌 마무리하며\n명절 시즌엔 쇼핑백 물량도 같이 몰려요.\n선물세트 준비하신다면 박스와 함께 미리 문의 주세요.\n실측부터 손잡이까지, 딱 맞게 잡아드릴게요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#쇼핑백제작 #종이쇼핑백 #수제쇼핑백 #브랜드쇼핑백 #패키지제작 #고급쇼핑백 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-boxtypes","topic":"박스제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-22T09:00:00.000Z","kicker":"","headline":"박스 종류가 너무 많다고요? 단상자·합지·싸바리 딱 정리해드려요","sub":"제품 무게·판매 채널·예산, 세 가지로 우리 박스 고르는 법","dayLabel":"","captionNote":"제품 무게·판매 채널·예산, 세 가지로 우리 박스 고르는 법","captionBody":"🎯 결론부터! 박스는 단상자 → 합지박스 → 싸바리박스 순으로 튼튼함과 고급감이 올라가요. 제품 무게·판매 채널·예산, 이 세 가지만 정리하면 답이 보여요 📦\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n\"박스 만들고 싶은데 종류가 너무 많아서 뭐가 뭔지 모르겠어요.\"\n처음 오시는 분들이 제일 많이 하시는 말씀이에요. 오늘 이 글 하나로 정리해드릴게요!\n\n![단상자](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_202831_f6ba7464-cbe6-4542-8bda-a19e64361f12.png)\n\n📦 단상자 — 가볍고 경제적인 기본기\n한 장의 종이를 접어 만드는 상자예요. 화장품 단상자가 대표적이죠.\n가볍고 단가 낮고, 접어서 납품돼 보관이 편해요.\n인쇄·후가공을 얹으면 충분히 고급스러워서 단품 판매에 딱이에요.\n\n📦 합지박스 — 튼튼함이 필요할 때\n두꺼운 판지에 인쇄지를 겹붙여 만들어요.\n단상자보다 훨씬 견고해서 무게 있는 제품, 택배가 잦은 제품에 좋아요.\n\"튼튼한데 예산은 아껴야 할 때\"의 현실적인 답이에요 💪\n\n![싸바리 고급박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_9a74772e-e25c-4a89-b77c-226ac90308f1.png)\n\n📦 싸바리박스 — 프리미엄의 기준\n2~3mm 합지에 수입지를 손으로 감싸 붙이는 최고급 방식이에요.\n화장품·홍삼·주류·VIP 선물세트의 표준이죠.\n자석형·서랍형에 트레이 내지까지 더하면 \"간직하고 싶은 박스\"가 돼요 ✨\n\n![홍삼 세트 박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151252_bd1d11a5-3749-4cfe-ae82-a41d34e76e47.png)\n\n🧭 우리 제품엔 뭐가 맞을까요\n· 가벼운 제품(크림·마스크팩) → 단상자\n· 무겁거나 배송 잦음 → 합지박스\n· 백화점·기프트 → 싸바리박스\n실제 브랜드들은 하나만 쓰지 않아요. 단품은 단상자, 명절 세트는 싸바리, 배송은 합지 — 이렇게 나눠요.\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_6e613bae-941f-4791-bc61-e7bd631edb62.png)\n\n🙌 마무리하며\n같은 로고 동판과 지류 톤을 공유하면 개발비를 아끼면서 통일감도 지켜요.\n제품 사진과 대략 수량만 들고 오세요.\n구조부터 소재·원가까지 상담으로 풀어드릴게요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#박스제작 #단상자 #합지박스 #싸바리박스 #패키지제작 #포장박스 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-foil","topic":"금박인쇄","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-24T09:00:00.000Z","kicker":"","headline":"\"로고 금색으로 인쇄해주세요\" — 잠깐만요, 그건 금색 그림이에요","sub":"진짜 금속광이 앉는 금박의 원리와, 박 색상 고르는 법","dayLabel":"","captionNote":"진짜 금속광이 앉는 금박의 원리와, 박 색상 고르는 법","captionBody":"🎯 결론부터요! 금박은 잉크가 아니라 \"박 필름\"을 동판으로 눌러 앉히는 거예요. 그래서 진짜 금속광이 살아있어요 ✨\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n상담하다 보면 \"로고를 금색 잉크로 인쇄하면 안 되나요?\" 하고 물으세요.\n되긴 되는데, 금색 잉크는 \"금색 그림\"이고 금박은 \"진짜 금속\"이라 느낌이 완전히 달라요.\n\n![금박 스탬핑 매크로](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_81853556-0749-49e7-b9ce-73d0c3904360.png)\n\n🔥 박이 앉는 원리, 생각보다 아날로그해요\n세 가지가 만나서 완성돼요.\n① 로고 모양대로 새긴 동판(도장처럼요) ② 금·은 금속광 박 필름 ③ 열과 압력\n뜨거운 동판이 박 필름을 종이에 \"꾹\" 눌러 붙여요.\n그래서 살짝 눌린 자국과 반짝임이 함께 생기는데, 이 손맛이 오히려 고급스러워요.\n\n🌈 금박만 있는 게 아니에요\n· 금박 — 홍삼·주류·명절 세트의 정석\n· 은박 — 모던하고 세련된 화장품·테크 제품에\n· 먹박 — 검정 유광, \"블랙 온 블랙\"의 조용한 럭셔리 🖤\n· 홀로그램박 — 각도마다 무지개빛, 한정판·굿즈에 인기\n\n![형압 매크로](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203156_00d77cc7-d8bb-4c6a-83ca-75867ee131d9.png)\n\n💡 팁 하나 — 무광 위에서 제일 예뻐요\n박은 무광 코팅된 어두운 종이 위에서 가장 극적으로 빛나요.\n배경이 차분할수록 박이 주인공이 된답니다.\n\n![네이비 박스 + 금박 로고](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n💰 비용 아끼는 포인트\n박 비용은 동판(1회) + 작업비(면적·수량)예요.\n· 같은 로고면 동판을 박스·쇼핑백·명함에 재사용할 수 있어요\n· 박 면적을 줄이고 위치를 영리하게(로고+포인트 라인) 잡으면 효과가 제일 좋아요\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_6e613bae-941f-4791-bc61-e7bd631edb62.png)\n\n🙌 마무리하며\n박은 혼자보다 조합에서 완성돼요. 무광+금박, 형압+박 동시… 저희가 제일 잘하는 거예요.\n로고 파일만 보내주시면 어떤 박이 어울릴지 샘플과 함께 제안해드릴게요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#금박인쇄 #금박 #은박 #홀로그램박 #인쇄후가공 #패키지제작 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-structure","topic":"지기구조","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-25T09:00:00.000Z","kicker":"","headline":"예쁜 박스보다 중요한 것, 눈에 안 보이는 \"지기구조\" 이야기","sub":"좋은 상자는 목형에서 태어나요 — 구조가 곧 원가입니다","dayLabel":"","captionNote":"좋은 상자는 목형에서 태어나요 — 구조가 곧 원가입니다","captionBody":"🎯 결론부터! 박스의 성패는 겉디자인이 아니라 \"지기구조(설계 도면)\"에서 갈려요. 구조가 곧 원가거든요 📐\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n박스를 쫙 펼치면 나오는 납작한 전개도, 보신 적 있으세요?\n어디를 자르고 어디를 접을지 그린 그 도면이 바로 \"지기구조\"예요.\n디자인이 얼굴이라면, 지기구조는 뼈대와 관절이에요.\n\n![인쇄·재단 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_24fd98d8-e690-4aef-9a3b-bd9720d64adb.png)\n\n🧩 지기구조가 정하는 것들\n· 보호력 — 제품이 흔들리는지, 눌림에 버티는지\n· 조립성 — 포장 라인에서 1개 접는 데 몇 초 걸리는지 (물량 크면 인건비예요!)\n· 개봉 경험 — 어디서 어떻게 열리는지, 언박싱 첫인상\n· 원가 — 전개도가 종이 원단에 몇 개 앉느냐로 종이값이 달라져요\n같은 크기라도 구조를 바꾸면 종이가 절약되고 조립이 빨라져요.\n\n![단상자 구조](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_202831_1a7b53c8-7d07-4f72-885a-08ef2d363136.png)\n\n🔨 목형 — 구조를 현실로 만드는 틀\n확정된 구조는 목형(칼틀)으로 만들어요.\n나무판에 자르는 칼날과 접는 오시날을 심은 틀인데, 이걸로 종이를 \"따내는\" 거예요.\n최초 1회 개발비지만, 한 번 만들면 계속 재생산돼요.\n그래서 처음에 구조를 제대로 잡는 게 장기적으로 경제적이에요.\n\n![개봉 구조](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203149_b26af749-afcc-4d8f-a0b6-75c3cfa90139.png)\n\n💬 이런 요청이 구조 설계예요\n· \"뚜껑을 열면 제품이 살짝 올라오게\" → 리프트 구조\n· \"테이프 없이 봉인됐으면\" → 봉인 구조 (저희 실용신안 분야예요!)\n· \"택배에서 안 눌리게\" → 이중벽 보강 구조\n· \"포장 빨리 접히게\" → 오토바닥 원터치\n\n![완성된 구조 박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_9a74772e-e25c-4a89-b77c-226ac90308f1.png)\n\n🙌 마무리하며\n지금 쓰는 박스가 불편하다면 — 접는 데 오래 걸리거나, 자주 파손되거나 — 구조 점검부터 받아보세요.\n도면 없이 실물만 들고 오셔도 돼요. 목업으로 만들어 만져보며 정해요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#지기구조 #목형 #박스설계 #패키지컨설팅 #박스제작 #실용신안 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-estimate","topic":"패키지제작","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-27T09:00:00.000Z","kicker":"","headline":"\"왜 500개랑 3천 개 개당 가격이 달라요?\" 견적서 읽는 법","sub":"개발비·자재·후가공·수량 — 어디서 아끼고 어디에 쓸지 이야기","dayLabel":"","captionNote":"개발비·자재·후가공·수량 — 어디서 아끼고 어디에 쓸지 이야기","captionBody":"🎯 결론부터요! 패키지 견적은 개발비(1회) + 자재 + 후가공 + 수량이에요. 수량이 늘수록 개당이 싸지는 건 개발비가 고정이라서예요 💰\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n견적서 처음 받으시면 \"개발비가 뭐예요?\" \"왜 수량마다 개당이 달라요?\" 하고 많이 물으세요.\n오늘 이 구조만 알면 예산 계획도 쉬워지고 협상도 현명해져요!\n\n![인쇄 공정](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151255_6e613bae-941f-4791-bc61-e7bd631edb62.png)\n\n🧾 견적의 4요소\n① 개발비 — 목형·동판, 첫 발주에만 들고 재발주 땐 빠져요\n② 자재 — 종이, 내지, 부자재(자석·리본)\n③ 공정 — 인쇄·코팅·박·형압… 공정 수만큼 올라가요\n④ 수량 — 준비 비용이 고정이라 많을수록 개당이 내려가요\n\n📉 수량의 비밀\n목형·동판 값이 500개면 개당 부담이 크지만, 3,000개면 확 줄어요.\n그래서 저는 늘 여쭤봐요 — \"이 박스, 얼마나 오래 쓰실 거예요?\"\n설·추석 물량을 묶으면 개발비 한 번으로 두 시즌을 커버해요 😊\n\n![후가공 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_3ac8f543-8286-4050-a520-6f543f41c7b4.png)\n\n✂️ 아껴도 티 안 나는 곳\n· 박 면적 — 로고+포인트면 충분, 넓게 깐다고 2배 고급 안 돼요\n· 규격 사이즈 — 종이 로스(버리는 종이)가 줄어요\n· 구조 단순화 — 조립 단계 하나가 물량 전체 인건비를 줄여요\n\n![형압 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203156_00d77cc7-d8bb-4c6a-83ca-75867ee131d9.png)\n\n✨ 쓰면 확 티 나는 곳\n· 겉지 질감 — 손에 닿는 첫 감촉이라 투자 대비 효과 최고\n· 형압 — 은은하지만 만지는 순간 급이 달라져요\n· 내지 — 뚜껑 연 순간의 정돈감, 선물세트라면 특히요\n\n![완성 박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n🙌 마무리하며\n견적은 흥정이 아니라 설계예요.\n예산을 먼저 말씀해주시면 그 안에서 최대 효과가 나는 조합을 짜드려요.\n\"이 예산으로 될까요?\" 하는 단계의 문의도 언제든 환영이에요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#패키지제작 #박스제작 #패키지견적 #원가절감 #목형 #동판 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-redginseng","topic":"홍삼패키지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-28T09:00:00.000Z","kicker":"","headline":"홍삼 선물세트, 뚜껑 여는 순간 \"우와\"는 사실 내지가 만들어요","sub":"병·스틱·앰플 내지 설계와, 어르신도 열기 편한 뚜껑 이야기","dayLabel":"","captionNote":"병·스틱·앰플 내지 설계와, 어르신도 열기 편한 뚜껑 이야기","captionBody":"🎯 결론부터! 홍삼·건기식 세트의 완성도는 \"내지(트레이)\"가 반이에요. 병이 달그락거리는 순간 프리미엄이 무너지거든요 🎁\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n홍삼은 \"내 몸에 들어가는 것\"이라, 소비자가 패키지에서 신뢰를 읽어요.\n상자가 얇거나 병이 흔들리면 내용물까지 가벼워 보이더라고요.\n\n![홍삼 세트 + 트레이 내지](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151252_bd1d11a5-3749-4cfe-ae82-a41d34e76e47.png)\n\n🧩 구성품마다 내지가 달라요\n· 병(농축액·환) — 병목까지 잡아주는 트레이가 필요해요\n· 스틱(포) — 30포·60포를 3단으로 가지런히, 정돈감이 프리미엄을 만들어요\n· 앰플·유리병 — 스폰지·EVA로 감싸요, 택배 물량 많으면 필수예요 🛡️\n· 혼합 세트(병+스틱) — 2단 트레이와 칸막이로 풀어요\n\n![선물세트 트레이 디테일](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_151252_5a641140-3894-43e4-9c32-871b1e9034d7.png)\n\n🎀 박스는 역시 싸바리가 정석\n명절·효도 선물이 크다 보니 상하짝 싸바리가 표준이에요.\n딥레드·골드 톤에 금박 로고, 형압 라인 — 이게 \"몸에 좋은 프리미엄\"의 문법이죠 ✨\n요즘 젊은 브랜드는 화이트+은박 같은 모던한 변주도 많이 하세요.\n\n![프리미엄 기프트박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_9a74772e-e25c-4a89-b77c-226ac90308f1.png)\n\n👵 놓치기 쉬운 것 — 개봉 편의성\n받는 분이 어르신인 경우가 많잖아요.\n뚜껑이 너무 꽉 끼면 열기 힘들고, 헐거우면 고급감이 떨어져요.\n저희는 가제본 단계에서 뚜껑을 직접 열어보며 끼움 정도를 조정해드려요 😊\n\n![금박 로고](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150502_81853556-0749-49e7-b9ce-73d0c3904360.png)\n\n🙌 마무리하며\n건강기능식품은 인증마크·표시사항 넣을 자리도 미리 계획해야 해요.\n구성품 리스트(병 몇 개, 스틱 몇 포)만 주시면 내지 설계안과 견적을 드릴게요.\n추석은 8월부터 몰리니 이달에 시작하시는 걸 추천드려요 💬\n\n📍 동성특수인쇄\n· 위치(네이버 지도): https://naver.me/xk1Oro3N\n· 전화: 02-2272-5771 · 휴대폰: 010-2793-3837\n\n#홍삼패키지 #건강기능식품박스 #선물세트박스 #싸바리박스 #내지설계 #동성특수인쇄","variant":"A","status":"planned"},{"id":"nv-liquor","topic":"주류패키지","format":"블로그","channels":["naver-blog"],"scheduledFor":"2026-07-30T09:00:00.000Z","kicker":"","headline":"1kg 유리병을 모시는 법 — 주류·VIP 패키지 이야기","sub":"무게를 견디는 구조와, 블랙&골드로 품격 내는 공식","dayLabel":"","captionNote":"무게를 견디는 구조와, 블랙&골드로 품격 내는 공식","captionBody":"🎯 결론부터요! 주류 패키지는 예쁘기 전에 \"버텨야\" 해요. 무게를 견디는 구조와 병 고정 내지가 1순위예요 🍾\n\n안녕하세요, 동성특수인쇄 실장이에요 😊\n전통주 열풍에 위스키 선물까지, 요즘 주류 패키지 문의가 부쩍 늘었어요.\n그런데 주류는 난이도가 높은 편이에요. 병은 무겁고 깨지기 쉬운데, 기대치는 가장 높거든요.\n\n![프리미엄 박스](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_150458_936db9ad-87f5-4d70-b47f-3e7852e9e521.png)\n\n💪 1순위 — 무게를 견디는 구조\n750ml 병 하나가 1kg를 넘어요. 2병 세트면 부자재까지 3kg에 가깝죠.\n· 바닥 보강 — 합지를 두껍게, 또는 이중 바닥으로\n· 이중벽 구조 — 택배 배송이면 완충까지 (저희 이중구조 상자 실용신안 경험이 빛나요)\n\n🎯 2순위 — 병이 놀지 않게\n병은 \"세워서 꼭 맞게\"가 원칙이에요.\n어깨와 바닥을 함께 잡는 성형 트레이, 목을 잡는 넥홀더, 2병 칸막이까지 병 실물을 놓고 설계해요.\n\n![개봉 장면](https://d8j0ntlcm91z4.cloudfront.net/user_3GObHnwJ1UMUu9vETRNq0YG4Q5L/hf_20260714_203149_b26af749-afcc-4d8f-a0b6-75c3cfa90139.png)\n\n🖤 3순위 — 품격의 마감 공식\n검증된 두 공식이 있어요   else if(period.key==='30d'){ to=now; from=new Date(now.getTime()-29*864e5); }
  else if(period.key==='month'){ from=new Date(now.getFullYear(),now.getMonth(),1); to=now; }
  else if(period.key==='prev'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=new Date(now.getFullYear(),now.getMonth(),0); }
  else if(period.key==='custom'){
    if(!period.from&&!period.to) return null;
    from=period.from?new Date(period.from):new Date(0);
    to=period.to?new Date(period.to):now;
  } else return null;
  const f=new Date(from); f.setHours(0,0,0,0);
  const t=new Date(to); t.setHours(23,59,59,999);
  return [f.getTime(), t.getTime()];
}
function inPeriod(s){ const r=periodRange(); if(!r) return true; if(!s) return false; const t=new Date(s).getTime(); return t>=r[0]&&t<=r[1]; }

  const r=periodRange();

  return names[period.key]+(r?' ('+d(r[0])+' ~ '+d(r[1])+')':'');

// 네이버 붙여넣기용 평문(마크다운 기호 제거, 이미지 위치는 마커로)
function plainPostText(it){
  let n=0;
  return String(it.captionBody||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img){ n++; return '\n[📷 이미지'+n+' 삽입]\n'; }
    if(t.startsWith('## ')) return '\n■ '+t.slice(3);
    if(t.startsWith('# ')) return t.slice(2);
    if(t==='>'||t.startsWith('> ')) return t.replace(/^>\s?/,'');
    return line.replace(/\*\*([^*]+)\*\*/g,'$1');
  }).join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function flash(id,msg){ const b=document.getElementById(id); if(b){const o=b.textContent;b.textContent=msg;setTimeout(()=>b.textContent=o,1500);} }

function mdInline(x){ return esc(x).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }
function fmtCaption(s){
  return String(s||'').split('\n').map(line=>{
    const t=line.trim();
    const img=t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img) return '<img class="md-img" src="'+esc(img[2])+'" alt="'+esc(img[1])+'" loading="lazy"/>';
    if(t.startsWith('## ')) return '<h4 class="md-h">'+mdInline(t.slice(3))+'</h4>';
    if(t.startsWith('# ')) return '<h3 class="md-h1">'+mdInline(t.slice(2))+'</h3>';
    if(t==='>'||t.startsWith('> ')) return '<div class="md-quote">'+mdInline(t.replace(/^>\s?/,''))+'</div>';
    if(t.indexOf('🔖')===0) return '<div class="md-tags">'+esc(t)+'</div>';
    if(/^\[.+\]$/.test(t)) return '<div class="md-tag">'+esc(t)+'</div>';
    if(t==='---'||t==='') return '<div class="md-sp"></div>';
    return '<div>'+mdInline(line)+'</div>';
  }).join('');
}

  }).join('');
  return '<div class="panel"><div class="sect-h" style="margin:0 0 8px"><h3>📊 발행 콘텐츠 데이터</h3><span class="muted">'+pub.length+'건 · 성과+인사이트</span></div>'+
    '<table><tr><th>콘텐츠 / 인사이트</th><th>조회</th><th>좋아요</th><th>댓글</th><th>참여율</th><th></th></tr>'+rows+'</table></div>';
}
function setupPanel(){
  const s=DATA.setup||{};
  const settingsUrl='https://github.com/'+REPO+'/settings/secrets/actions';
  const varsUrl='https://github.com/'+REPO+'/settings/variables/actions';
  const row=(ok,name,todo,url)=>'<tr><td style="width:34px;font-size:16px">'+(ok?'✅':'⬜')+'</td><td><b>'+esc(name)+'</b>'+(ok?'':'<div class="muted" style="margin-top:2px">'+todo+(url?' · <a href="'+url+'" target="_blank">설정 열기 ↗</a>':'')+'</div>')+'</td></tr>';
  const done=[s.instagram,s.threads,s.telegram,s.anthropic,s.realPublish].filter(Boolean).length;
  return '<div class="panel" style="border-color:#2b6fff">'+
    '<div class="sect-h" style="margin:0 0 8px"><h3>🚀 오픈 준비 체크리스트</h3><span class="muted">'+done+'/5 완료</span></div>'+
    '<table>'+
    row(s.instagram,'인스타그램 연결','발행 토큰 미설정 — PSLAB_INSTAGRAM_ACCESS_TOKEN 시크릿',settingsUrl)+
    row(s.threads,'스레드 연결','발행 토큰 미설정 — PSLAB_THREADS_ACCESS_TOKEN 시크릿',settingsUrl)+
    row(s.telegram,'텔레그램 푸시','@BotFather로 봇 생성 → TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID 시크릿',settingsUrl)+
    row(s.blogger,'구글 블로그 자동발행','선택 — Blogger OAuth(클라이언트/리프레시 토큰/블로그ID) 시크릿',settingsUrl)+
    row(s.anthropic,'AI 글·코멘트','ANTHROPIC_API_KEY 시크릿 (없으면 규칙기반으로 동작)',settingsUrl)+
    row(s.realPublish,'실제 자동발행 ON','예약 발행을 켜려면 Variables에 PSLAB_DRY_RUN=false (지금은 안전 시뮬레이션)',varsUrl)+
    '</table>'+
    '<div class="muted" style="margin-top:8px"><b>구글 블로그</b>는 API로 자동발행됩니다. <b>네이버 블로그·유튜브</b>는 공식 자동발행 API가 없어 <b>수동(복붙)</b> 채널입니다.</div>'+
    '</div>';
}
// 채널 바로가기 — 채널별 그라데이션 카드(클릭 시 관리로 이동)
function chGrad(key){
  return ({youtube:'linear-gradient(135deg,#fdecec,#fbdcdc)',instagram:'linear-gradient(135deg,#fceaf5,#f6d8ec)',threads:'linear-gradient(135deg,#ecf5f5,#dcecec)','naver-blog':'linear-gradient(135deg,#eafaf0,#d8f0e2)',blogger:'linear-gradient(135deg,#fdf3e6,#f8e6cc)',linkedin:'linear-gradient(135deg,#ecf2fc,#dce8f8)'})[key]||'linear-gradient(135deg,#f4f6fa,#e9edf5)';
}
function chBorder(key){ return ({youtube:'#f0b8b8',instagram:'#eab8d8',threads:'#b8d8d8','naver-blog':'#a8dcbe',blogger:'#ecca9e',linkedin:'#b8cef0'})[key]||'#dfe4ec'; }
function channelLinksPanel(client){
  const links=client.channelLinks||[];
  if(!links.length) return '';
  const cards=links.map(l=>
    '<a href="'+esc(l.url)+'" target="_blank" rel="noopener" style="flex:1 1 200px;min-width:180px;text-decoration:none;border-radius:14px;padding:16px 18px;border:1px solid '+chBorder(l.key)+';background:'+chGrad(l.key)+';display:block">'+
    '<div style="font-weight:800;font-size:18px;color:#14171d;margin-bottom:4px">'+l.icon+' '+esc(l.label)+'</div>'+
    '<div style="font-size:13px;color:#4a5264;opacity:.9">'+esc(l.sub)+'</div></a>').join('');
  return '<div class="panel"><div class="sect-h" style="margin:0 0 10px"><h3>🔗 채널 바로가기</h3><span class="muted">클릭하면 각 채널 관리로 이동</span></div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+cards+'</div></div>';
}
function overview(client){
  let h=tokenBanner(client);
  h+=setupPanel();
  h+=channelLinksPanel(client);
  h+=weeklyPanel(client);
  h+=periodBar();
  h+='<div class="kpis">'+
    kpi(client.totalCycles,'총 사이클')+
    kpi(client.totalPublished,'총 발행')+
    kpi(client.heldCount,'승인 대기',client.heldCount>0)+
    kpi('v'+client.designVersion,'디자인 진화')+'</div>';
  h+=learningPanel(client);
  h+='<div class="panel"><h3>채널별 요약</h3><table><tr><th>채널</th><th>상태</th><th>발행</th><th>대기</th><th>평균 참여율</th><th>수정요청</th></tr>'+
    client.channels.map(c=>{const lab=(DATA.channels.find(x=>x.key===c.key)||{});
      const iss=channelIssues(c.key); const openN=iss.filter(x=>x.state!=='closed').length;
      const reqCell=iss.length?(openN?'<span class="badge b-wait">🛠 처리중 '+openN+'</span>':'<span class="badge b-ok">✅ 완료 '+iss.length+'</span>'):'<span class="muted">-</span>';
      return '<tr><td>'+lab.icon+' '+lab.label+'</td><td>'+(c.active?'<span class="badge b-ok">연결</span>':'<span class="badge b-hold">미연결</span>')+'</td><td>'+c.stats.publishedCount+'</td><td>'+c.stats.pendingCount+'</td><td>'+pct(c.stats.avgEngagement)+' '+tIcon(c.stats.trend)+'</td><td>'+reqCell+'</td></tr>';}).join('')+'</table></div>';
  // 발행 전 콘텐츠 기획안 — 메인에는 발행 전(예정·수동대기)만 보여준다
  const plan=client.planCards||[];
  const pre=plan.filter(p=>p.status!=='published');
  const fbTitle='['+client.name+'] 기획안 전체 피드백';
  const fbBody='이번 달 기획안에 대한 의견/수정사항을 적어주세요.\n\n';
  const mon=new Date(DATA.generatedAt).getMonth()+1;
  h+='<div class="sect-h"><h2>🕓 '+mon+'월 발행 전 콘텐츠 ('+pre.length+')</h2><a class="btn fb" href="'+issue(fbTitle,fbBody)+'" target="_blank">✏️ 기획안 피드백</a></div>';
  if(!pre.length){ h+='<div class="empty">발행 전 콘텐츠가 없습니다. 다음 사이클에 자동 생성됩니다.</div>'; }
  else {
    for(const chDef of DATA.channels){
      const items=pre.filter(p=>(p.channels||[]).includes(chDef.key));
      if(!items.length) continue;
      const lab=chDef.icon+' '+chDef.label;
      h+='<div class="chgrp"><div class="chgrp-h">'+lab+' <span class="muted">'+items.length+'건 · '+esc((items[0].format)||'')+'</span></div>'+
         '<div class="cards">'+items.map(p=>planCard(client,chDef.label,p)).join('')+'</div></div>';
    }
  }
  // 선택한 기간의 발행 게시물 (기획 발행분 + 사이클 발행분)
  const planPub=plan.filter(p=>p.status==='published'&&inPeriod(p.publishedAt||p.scheduledFor))
    .sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||'')));
  const recent=[].concat(...client.channels.map(c=>c.published)).filter(p=>inPeriod(p.time))
    .sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,12);
  h+='<div class="sect-h"><h2>✅ 발행된 게시물 · '+periodLabel()+' ('+(planPub.length+recent.length)+')</h2></div>';
  const pubCards=planPub.map(p=>{
    const chDef=DATA.channels.find(x=>x.key===((p.channels||[])[0]))||{label:''};
    return planCard(client,chDef.label,p);
  }).concat(recent.map(p=>publishedCard(p,'<span class="badge b-ok">발행</span>')));
  h+= pubCards.length?'<div class="cards">'+pubCards.join('')+'</div>':'<div class="empty">이 기간에 발행된 게시물이 없습니다.</div>';
  // 경쟁사
  h+='<div class="panel" style="margin-top:16px"><h3>벤치마킹 경쟁사</h3><div>'+(client.competitors.length?client.competitors.map(x=>'<span class="tag">@'+esc(x)+'</span>').join(''):'<span class="muted">미설정</span>')+'</div></div>';
  return h;
}
function kpi(v,l,accent){return '<div class="kpi"><div class="v'+(accent?' accent':'')+'">'+v+'</div><div class="l">'+l+'</div></div>';}
function renderClients(){
  document.getElementById('clients').innerHTML = DATA.clients.length>1 ? DATA.clients.map((c,i)=>'<button class="cbtn'+(i===ci?' on':'')+'" onclick="setClient('+i+')">'+esc(c.name)+'</button>').join('') : '';
}
function renderTabs(){
  const c=DATA.clients[ci];
  const tabs=[{key:'all',label:'전체',icon:'🏠',active:true}]
    .concat(DATA.channels.map(ch=>{const cc=c.channels.find(x=>x.key===ch.key);return {key:ch.key,label:ch.label,icon:ch.icon,active:cc&&cc.active};}))
    .concat([{key:'guide',label:'지침',icon:'🧭',active:true,noDot:true}]);
  document.getElementById('tabs').innerHTML = tabs.map(t=>{
    // 수정요청 진행상황 아이콘 — 🛠 처리중 n건 / ✅ 전부 처리완료
    let req='';
    if(t.key!=='all'){
      const iss=channelIssues(t.key);
      const openN=iss.filter(x=>x.state!=='closed').length;
      req = openN ? '<span class="treq open" title="수정요청 처리중 '+openN+'건">🛠'+openN+'</span>'
          : (iss.length ? '<span class="treq done" title="수정요청 전부 처리완료">✅</span>' : '');
    }
    return '<button class="tab'+(t.key===ch?' on':'')+'" onclick="setCh(\''+t.key+'\')">'+t.icon+' '+t.label+(t.key!=='all'&&!t.noDot?'<span class="dot '+(t.active?'live':'off')+'"></span>':'')+req+'</button>';
  }).join('');
}
function renderView(){
  const c=DATA.clients[ci];
  document.getElementById('view').innerHTML = ch==='all'?overview(c):(ch==='guide'?guideView(c):channelDetail(c,c.channels.find(x=>x.key===ch)));
  document.getElementById('gen').textContent = ftime(DATA.generatedAt)+' (UTC)';
}
function setClient(i){ci=i;ch='all';renderClients();renderTabs();renderView();window.scrollTo(0,0);}
function setCh(k){ch=k;renderTabs();renderView();window.scrollTo(0,0);}
try {
  renderClients(); renderTabs(); renderView(); loadIssues();
} catch (e) {
  var v = document.getElementById('view');
  if (v) v.innerHTML = '<div style="padding:24px;line-height:1.7;color:#b91c1c">표시 중 오류: '
    + ((e && e.message) || e)
    + '<br><br><button onclick="location.reload(true)" style="padding:10px 16px;border-radius:8px;border:0;background:#2b6fff;color:#fff;font-size:15px">새로고침</button></div>';
}
</script>
</body>
</html>
